    correct_answer: 1
    explanations:
      correct: "ECC provides equivalent security to RSA with much smaller key sizes: a 256-bit ECC key provides approximately the same security as a 3072-bit RSA key. Smaller keys mean faster computation, less bandwidth consumption, and lower power requirements — critical for mobile devices and IoT. Both are vulnerable to quantum attacks (Shor's algorithm)."
      incorrect:
