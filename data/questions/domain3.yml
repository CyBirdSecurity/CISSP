  - id: q-d3-029
    domain: domain3
    question: "What is a 'rainbow table' attack and what is the most effective defense against it?"
    options:
      - "An attack using multiple encryption algorithms; defended by using a single strong algorithm"
      - "An attack using precomputed hash-to-password mappings; defended by adding a unique salt to each password before hashing"
      - "A brute force attack against network authentication; defended by account lockout"
      - "An attack against color-coded network cable labels; defended by physical security"
    correct_answer: 1
    explanations:
      correct: "A rainbow table is a precomputed lookup table mapping password hashes to their plaintext values. Attackers can quickly reverse stolen password hashes without computing. Defense: salt each password with a unique random value before hashing — this ensures the same password produces different hashes, making precomputed tables useless."
      incorrect:
        - "Rainbow tables target password hashes, not encryption algorithms — salting is the defense, not algorithm selection."
        - "Precomputed hash-to-password mappings defeated by unique per-user salting is the correct description of rainbow tables and their defense."
        - "Account lockout addresses online brute force — rainbow tables are offline attacks against stolen hash databases."
        - "This is a deliberate distractor — rainbow tables are cryptographic attacks, not physical cable attacks."
    difficulty: "medium"
    tags: ["cryptography", "passwords", "attacks"]

