        - "A Faraday cage blocks electromagnetic signals — it does not control physical personnel access."
    difficulty: "easy"
    tags: ["physical-security", "controls"]

  - id: q-d3-035
    domain: domain3
    question: "What is the primary security purpose of a 'Trusted Platform Module' (TPM)?"
    options:
      - "To provide additional RAM for security applications"
      - "To store cryptographic keys and measurements in tamper-resistant hardware, enabling platform integrity verification"
      - "To block unauthorized network connections at the hardware level"
      - "To provide a secure backup of user passwords"
    correct_answer: 1
    explanations:
      correct: "A TPM is a dedicated security chip that stores cryptographic keys (including disk encryption keys like BitLocker), certificates, and platform configuration registers (PCRs) that record boot measurements. It enables secure boot (verifying boot integrity), full disk encryption key protection, and attestation."
      incorrect:
        - "TPMs do not provide RAM — they are dedicated security chips with limited storage for keys and measurements."
        - "Tamper-resistant storage of crypto keys and platform integrity measurements (enabling secure boot) is the correct TPM purpose."
        - "Network filtering is a firewall function — TPMs operate at the platform/hardware level for cryptographic operations."
        - "TPMs store cryptographic keys and boot measurements — not user passwords (those are stored in OS credential stores)."
    difficulty: "medium"
    tags: ["hardware", "trusted-computing"]
