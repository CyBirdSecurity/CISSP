        - "Password complexity may slow brute force but doesn't defeat precomputed rainbow tables if no salt is used."
        - "Cryptographic salting (adding unique random values to each password before hashing) is the missing control that would defeat precomputed hash attacks."
        - "Account lockout prevents online brute-force attempts but has no effect on offline hash cracking from a leaked database."
