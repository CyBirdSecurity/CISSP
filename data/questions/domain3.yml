        - "Only key secrecy (not algorithm secrecy) is required — this is the correct statement of Kerckhoffs's principle."
        - "Equal dependence on both is not Kerckhoffs's principle — the algorithm should be fully public; only the key needs to remain secret."
        - "Physical security is important but Kerckhoffs's principle specifically addresses the design philosophy for the algorithm/key relationship, not physical security."
    difficulty: "easy"
    tags: ["cryptography", "principles", "Kerckhoffs"]

  - id: q-d3-048
    domain: domain3
    question: "UEFI Secure Boot primarily protects against which threat?"
