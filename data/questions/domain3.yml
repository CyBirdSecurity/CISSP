  - id: q-d3-031
    domain: domain3
    question: "What does 'hybrid encryption' mean, and why is it used?"
    options:
      - "Using two symmetric algorithms together for stronger encryption"
      - "Using asymmetric encryption to securely exchange a symmetric session key, then using symmetric encryption for bulk data"
      - "Mixing hardware and software encryption in the same system"
      - "Applying different encryption to different sensitivity levels within the same document"
    correct_answer: 1
    explanations:
      correct: "Hybrid encryption combines the key distribution advantage of asymmetric cryptography with the speed of symmetric cryptography. A symmetric session key (e.g., AES-256) is generated, encrypted with the recipient's public key (asymmetric), then used to encrypt the actual data. TLS uses this approach."
      incorrect:
        - "Using two symmetric algorithms is a cascaded encryption approach — not hybrid encryption."
        - "Using asymmetric to exchange a symmetric key, then symmetric for bulk data — this correctly describes hybrid encryption."
        - "Mixing hardware and software encryption is an implementation architecture choice — not hybrid encryption."
        - "Applying different encryption to different sensitivity levels is tiered encryption — not hybrid."
    difficulty: "medium"
    tags: ["cryptography", "hybrid"]

  - id: q-d3-032
    domain: domain3
    question: "What is the primary difference between a 'block cipher' using CBC mode and one using CTR mode?"
    options:
      - "CBC is faster; CTR is more secure"
      - "CBC chains blocks sequentially and requires padding; CTR uses a counter to generate a keystream and can be parallelized"
      - "CBC uses symmetric keys; CTR uses asymmetric keys"
      - "CTR requires an IV; CBC does not"
    correct_answer: 1
    explanations:
      correct: "CBC (Cipher Block Chaining) XORs each plaintext block with the previous ciphertext block, creating a chain that must be processed sequentially. CTR (Counter) mode uses an incrementing counter encrypted to generate a keystream, which is XORed with plaintext. CTR enables parallel encryption/decryption and doesn't require padding."
      incorrect:
        - "CTR is often faster because it can be parallelized — CBC is sequential. Neither is universally 'more secure.'"
        - "CBC chains sequentially with padding requirement; CTR uses a counter keystream with parallelization — this correctly describes the difference."
        - "Both modes use symmetric keys — the key type is independent of the mode of operation."
        - "Both CBC and CTR require an initialization value (IV or nonce) — this is not a distinguishing factor."
    difficulty: "hard"
    tags: ["cryptography", "symmetric"]

  - id: q-d3-033
    domain: domain3
    question: "What is 'key escrow' and what is the primary controversy surrounding it?"
    options:
      - "The practice of generating backup copies of public keys; controversial because it increases storage costs"
      - "Storing copies of encryption keys with a trusted third party; controversial because it creates a high-value target and potential for government access"
      - "The process of exchanging keys between two parties; controversial because of performance overhead"
      - "A hardware mechanism for protecting keys at rest; controversial because of high hardware costs"
    correct_answer: 1
    explanations:
