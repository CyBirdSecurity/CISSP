  - id: q-d3-043
    domain: domain3
    question: "Perfect Forward Secrecy (PFS) protects against which specific attack scenario?"
    options:
      - "An attacker performing a brute-force attack on current session keys"
      - "An attacker who records encrypted traffic now and later obtains the server's private key"
      - "An attacker intercepting authentication credentials during transmission"
      - "An attacker performing a replay attack using captured session tokens"
    correct_answer: 1
    explanations:
      correct: "PFS protects against the scenario where an attacker records encrypted traffic today and later compromises the server's private key. Without PFS, past sessions could be decrypted. With PFS (using ephemeral key exchange like ECDHE), each session uses a unique temporary key that is discarded afterward — the private key cannot be used to derive past session keys."
      incorrect:
        - "Brute-force attacks on session keys are addressed by key length and algorithm strength — not specifically PFS."
        - "Recording traffic now to decrypt later after obtaining the private key is the exact threat that PFS defends against — this is correct."
        - "Protecting authentication credentials in transit is a function of TLS encryption generally — not specifically PFS."
        - "Replay attacks are prevented by nonces, timestamps, and session tokens — not specifically by PFS."
    difficulty: "hard"
    tags: ["cryptography", "PFS", "TLS"]

