questions:
  - id: q-d3-001
    domain: domain3
    question: "Which security model uses the properties 'No Read Up' and 'No Write Down' to enforce confidentiality?"
    options:
      - "Biba Integrity Model"
      - "Bell-LaPadula Model"
      - "Clark-Wilson Model"
      - "Brewer-Nash Model"
    correct_answer: 1
    explanations:
      correct: "The Bell-LaPadula model protects confidentiality. The Simple Security Property (No Read Up) prevents subjects from reading data at higher classification levels. The *-Property (No Write Down) prevents subjects from writing to lower classification levels."
      incorrect:
        - "The Biba model protects integrity and uses opposite rules: No Read Down and No Write Up."
        - "Bell-LaPadula is correct — No Read Up and No Write Down enforce confidentiality."
        - "Clark-Wilson protects integrity using well-formed transactions and separation of duties, not simple read/write rules."
        - "The Brewer-Nash (Chinese Wall) model prevents conflicts of interest based on prior access history."
    difficulty: "medium"
    tags: ["security-models", "confidentiality"]

  - id: q-d3-002
    domain: domain3
    question: "What is the primary security concern with Electronic Codebook (ECB) mode encryption?"
    options:
      - "It requires more processing power than other modes"
      - "Identical plaintext blocks produce identical ciphertext blocks, revealing patterns"
      - "It is vulnerable to timing attacks"
      - "It requires a larger key size than other modes"
    correct_answer: 1
    explanations:
      correct: "ECB mode encrypts each block independently. Identical plaintext blocks produce identical ciphertext blocks, which can reveal patterns in the data. The classic example is the 'ECB penguin' where an image remains recognizable after ECB encryption."
      incorrect:
        - "ECB mode is not particularly more computationally expensive than other modes — pattern revelation is the security concern."
        - "Identical plaintext producing identical ciphertext is the fundamental weakness of ECB mode."
        - "Timing attacks are a side-channel attack technique not specifically associated with ECB mode."
        - "ECB mode does not require a larger key than other modes of the same cipher."
    difficulty: "hard"
    tags: ["cryptography", "symmetric"]

  - id: q-d3-003
    domain: domain3
    question: "What property of cryptographic hash functions means that finding two different inputs that produce the same hash output should be computationally infeasible?"
    options:
      - "Pre-image resistance"
      - "Second pre-image resistance"
      - "Collision resistance"
      - "Avalanche effect"
    correct_answer: 2
    explanations:
      correct: "Collision resistance means it should be computationally infeasible to find any two different inputs (m1 ≠ m2) such that H(m1) = H(m2). MD5 and SHA-1 have known collision vulnerabilities, making them unsuitable for security uses."
      incorrect:
        - "Pre-image resistance means that given a hash output H, it should be infeasible to find any input m such that H(m) = H. This is one-way property."
        - "Second pre-image resistance means that given a specific input m1, it should be infeasible to find a different m2 such that H(m1) = H(m2)."
        - "Collision resistance is correct — finding any two inputs with the same hash is infeasible."
        - "The avalanche effect means that a small change in input produces a dramatically different hash output — it is not about two inputs having the same hash."
    difficulty: "hard"
    tags: ["cryptography", "hashing"]

  - id: q-d3-004
    domain: domain3
    question: "In PKI, what is the purpose of a Certificate Revocation List (CRL)?"
    options:
      - "A list of certificates that have expired naturally"
      - "A list of certificates that have been revoked before their expiration date"
      - "A list of trusted Certificate Authorities"
      - "A list of pending certificate signing requests"
    correct_answer: 1
    explanations:
      correct: "A CRL is a list maintained by the CA of certificates that have been revoked before their scheduled expiration date. Reasons for revocation include: key compromise, CA compromise, affiliation change, or certificate superseded."
      incorrect:
        - "Expired certificates are not on the CRL — they are simply no longer valid after their expiration date."
        - "The CRL contains revoked certificates (invalidated before expiration) — this is the correct answer."
        - "Trusted CAs are listed in trust stores, not in a CRL. The CRL only contains revoked certificates from a specific CA."
        - "Pending certificate signing requests (CSRs) are processed by the RA/CA — they are not listed in a CRL."
    difficulty: "medium"
    tags: ["PKI", "cryptography"]

  - id: q-d3-005
    domain: domain3
    question: "Which symmetric encryption algorithm is the current federal standard, using block sizes of 128 bits and key sizes of 128, 192, or 256 bits?"
    options:
      - "DES (Data Encryption Standard)"
      - "3DES (Triple DES)"
      - "AES (Advanced Encryption Standard)"
      - "Blowfish"
    correct_answer: 2
    explanations:
      correct: "AES (Advanced Encryption Standard, aka Rijndael) is the current NIST standard. It uses 128-bit block size with 128, 192, or 256-bit keys. It replaced DES and 3DES as the federal standard in 2001."
      incorrect:
        - "DES uses 56-bit keys (too small) and was broken in 1999. It is no longer considered secure."
        - "3DES applies DES three times with 112 or 168-bit effective key length. It is being phased out — NIST deprecated it in 2023."
        - "AES is the correct answer — current federal standard with 128-bit blocks and up to 256-bit keys."
        - "Blowfish uses variable key length (32-448 bits) but is not a federal standard and was replaced by Twofish and AES in competition."
    difficulty: "easy"
    tags: ["cryptography", "symmetric"]

  - id: q-d3-006
    domain: domain3
    question: "What is the primary security principle behind Kerckhoffs's principle?"
    options:
      - "The encryption key should be the same length as the message"
      - "A cryptosystem should be secure even if everything except the key is public knowledge"
      - "Only government-approved cryptographic algorithms should be used"
      - "Encryption keys should be rotated every 90 days"
    correct_answer: 1
    explanations:
      correct: "Kerckhoffs's principle states that a cryptosystem should remain secure even if the attacker knows everything about the system except the key. This is the basis for using open, publicly vetted cryptographic algorithms rather than secret 'proprietary' ones."
      incorrect:
        - "Key length equal to message length describes the One-Time Pad (OTP) — not Kerckhoffs's principle."
        - "Security depends only on the secret key, not the secrecy of the algorithm — this is the core of Kerckhoffs's principle."
        - "Kerckhoffs's principle does not specify government approval — it is about not relying on algorithm secrecy."
        - "Key rotation is a key management best practice, not Kerckhoffs's principle."
    difficulty: "medium"
    tags: ["cryptography", "principles"]

  - id: q-d3-007
    domain: domain3
    question: "A digital signature provides which three security services?"
    options:
      - "Confidentiality, integrity, and availability"
      - "Authentication, integrity, and non-repudiation"
      - "Confidentiality, authentication, and authorization"
      - "Integrity, availability, and non-repudiation"
    correct_answer: 1
    explanations:
      correct: "A digital signature provides: Authentication (verifies the sender's identity), Integrity (confirms the message was not altered), and Non-repudiation (the sender cannot deny sending it). It does NOT provide confidentiality — the message itself may be unencrypted."
      incorrect:
        - "Digital signatures do not provide confidentiality or availability — they address authentication, integrity, and non-repudiation."
        - "Authentication, integrity, and non-repudiation are the three services provided by digital signatures."
        - "Digital signatures provide authentication but not confidentiality or authorization. Authorization is a separate access control function."
        - "Digital signatures provide integrity and non-repudiation but not availability."
    difficulty: "medium"
    tags: ["cryptography", "digital-signatures"]

  - id: q-d3-008
    domain: domain3
    question: "The Trusted Computing Base (TCB) must satisfy three conditions to properly implement the reference monitor concept. Which of the following is NOT one of those conditions?"
    options:
      - "It must be tamper-resistant"
      - "It must always be invoked for every access attempt"
      - "It must be large enough to cover all system functions"
      - "It must be small enough to be fully verified and tested"
    correct_answer: 2
    explanations:
      correct: "The TCB must be SMALL enough to be verified and tested — not large. The three requirements for a reference monitor are: 1) Always invoked (no bypass), 2) Tamper-resistant, 3) Small enough to be fully analyzed and tested."
      incorrect:
        - "Tamper-resistant is a required property of the TCB/reference monitor."
        - "Always invoked (cannot be bypassed) is a required property of the reference monitor."
        - "The TCB must be small enough (not large) to be fully verified — being 'large enough to cover all functions' is NOT a requirement."
        - "Small enough to be verified is indeed a correct requirement — the TCB should have a minimal footprint."
    difficulty: "hard"
    tags: ["architecture", "trusted-systems"]

  - id: q-d3-009
    domain: domain3
    question: "What is the main difference between stream ciphers and block ciphers?"
    options:
      - "Stream ciphers use symmetric keys; block ciphers use asymmetric keys"
      - "Stream ciphers encrypt one bit/byte at a time; block ciphers encrypt fixed-size blocks"
      - "Stream ciphers are more secure; block ciphers are faster"
      - "Stream ciphers are used for data at rest; block ciphers are used for data in transit"
    correct_answer: 1
    explanations:
      correct: "Stream ciphers encrypt data one bit or byte at a time using a continuous keystream (e.g., RC4). Block ciphers divide plaintext into fixed-size blocks (e.g., AES uses 128-bit blocks) and encrypt each block."
      incorrect:
        - "Both stream and block ciphers can use symmetric keys. Key type is not the distinguishing factor."
        - "Stream ciphers encrypt continuously bit by bit; block ciphers encrypt fixed blocks — this is the correct distinction."
        - "Neither is universally more secure or faster — they have different use cases and trade-offs."
        - "The application (at rest vs. in transit) does not define cipher type — both types can be used in either context."
    difficulty: "medium"
    tags: ["cryptography", "symmetric"]

  - id: q-d3-010
    domain: domain3
    question: "Which physical security control prevents vehicle-based attacks on buildings by blocking vehicles from approaching within a certain distance?"
    options:
      - "Mantrap"
      - "CCTV"
      - "Bollards"
      - "Turnstile"
    correct_answer: 2
    explanations:
      correct: "Bollards are short, sturdy posts installed to prevent vehicles from ramming into buildings or restricted areas. They provide standoff distance protection against vehicle-borne improvised explosive devices (VBIEDs) and accidental vehicle intrusions."
      incorrect:
        - "A mantrap (airlock) controls personnel entry — it prevents tailgating but does not stop vehicles."
        - "CCTV is a detective control for monitoring and recording — it does not physically prevent vehicle attacks."
        - "Bollards correctly prevent vehicle attacks by physically blocking vehicle access."
        - "A turnstile controls pedestrian access — it does not stop vehicles."
    difficulty: "easy"
    tags: ["physical-security", "controls"]

  - id: q-d3-011
    domain: domain3
    question: "What does the 'avalanche effect' mean in the context of cryptographic hash functions?"
    options:
      - "The hash function can process large files quickly"
      - "A small change in input produces a completely different hash output"
      - "The hash output is always larger than the input"
      - "Multiple inputs can produce the same hash value"
    correct_answer: 1
    explanations:
      correct: "The avalanche effect means that a tiny change in the input (even one bit) produces a drastically different hash output. This is a desirable property — it makes it difficult to predict the output or reverse-engineer the input."
      incorrect:
        - "Processing speed is not the avalanche effect — it relates to computational efficiency, not cryptographic properties."
        - "A small input change producing a completely different hash is the correct definition of the avalanche effect."
        - "Hash functions produce fixed-size outputs regardless of input size — the output is not always larger than the input."
        - "Multiple inputs producing the same hash is a collision — the opposite of a desirable property."
    difficulty: "easy"
    tags: ["cryptography", "hashing"]

  - id: q-d3-012
    domain: domain3
    question: "What type of attack attempts to find the original input that produced a specific hash value?"
    options:
      - "Birthday attack"
      - "Collision attack"
      - "Pre-image attack"
      - "Rainbow table attack"
    correct_answer: 2
    explanations:
      correct: "A pre-image attack attempts to find an input m such that hash(m) equals a specific target hash value. It tries to reverse the hash function. Strong hash functions are designed to be pre-image resistant."
      incorrect:
        - "A birthday attack exploits the birthday paradox to find any two inputs with the same hash — not a specific target hash."
        - "A collision attack finds two arbitrary inputs that produce the same hash — not necessarily a specific target hash."
        - "A pre-image attack is the correct term for finding an input that produces a specific target hash."
        - "A rainbow table attack uses precomputed hash-to-password mappings to reverse password hashes — it is a type of pre-image attack but specifically for password cracking."
    difficulty: "hard"
    tags: ["cryptography", "attacks"]

  - id: q-d3-013
    domain: domain3
    question: "Which security model uses a directed graph to dictate how rights can be passed from one subject to another?"
    options:
      - "Bell-LaPadula"
      - "Biba"
      - "Take-Grant"
      - "Clark-Wilson"
    correct_answer: 2
    explanations:
      correct: "The Take-Grant model uses a directed graph to visualize how rights are transitioned or shared between subjects and objects."
      incorrect:
        - "Bell-LaPadula is a lattice-based confidentiality model."
        - "Biba is a lattice-based integrity model."
        - "Clark-Wilson uses an access control triple (subject, software, object) to ensure integrity."
    difficulty: "hard"
    tags: ["models"]

  - id: q-d3-014
    domain: domain3
    question: "In the Common Criteria (ISO 15408), what is the term for the product or system being evaluated?"
    options:
      - "ST (Security Target)"
      - "PP (Protection Profile)"
      - "TOE (Target of Evaluation)"
      - "EAL (Evaluation Assurance Level)"
    correct_answer: 2
    explanations:
      correct: "The Target of Evaluation (TOE) is the specific product or system undergoing assessment."
      incorrect:
        - "The ST is the document describing the security properties of the TOE."
        - "The PP is a set of security requirements for a category of products."
        - "The EAL is the numerical rating (1-7) assigned after evaluation."
    difficulty: "medium"
    tags: ["standards", "common-criteria"]

  - id: q-d3-015
    domain: domain3
    question: "Which cryptographic attack involves the attacker having access to both the plaintext and its corresponding ciphertext?"
    options:
      - "Ciphertext-only attack"
      - "Known-plaintext attack"
      - "Chosen-plaintext attack"
      - "Birthday attack"
    correct_answer: 1
    explanations:
      correct: "In a known-plaintext attack, the attacker has samples of both the original message and the encrypted version to find the key."
      incorrect:
        - "In ciphertext-only, the attacker only has the encrypted data."
        - "In chosen-plaintext, the attacker can encrypt specific messages of their choice."
        - "A birthday attack is a collision attack used against hashes."
    difficulty: "medium"
    tags: ["cryptography", "attacks"]

  - id: q-d3-016
    domain: domain3
    question: "What is the Biba integrity model's 'Simple Integrity Property' (No Read Down)?"
    options:
      - "A subject cannot read data at a higher integrity level than their own"
      - "A subject cannot read data at a lower integrity level than their own"
      - "A subject cannot write to a higher integrity level than their own"
      - "A subject cannot write to a lower integrity level than their own"
    correct_answer: 1
    explanations:
      correct: "Biba's Simple Integrity Property (No Read Down) prevents a subject from reading data at a lower integrity level. Reading low-integrity (potentially corrupt) data could contaminate the subject's high-integrity work. The star property (No Write Up) prevents writing to higher integrity levels."
      incorrect:
        - "Not being able to read higher-level data is Bell-LaPadula's Simple Security Property (No Read Up) — that model protects confidentiality, not integrity."
        - "No Read Down — preventing reading of lower integrity data — is the correct Biba Simple Integrity Property."
        - "Not writing to higher integrity is Biba's star (*) Integrity Property — not the Simple Integrity Property."
        - "Not writing to lower integrity is Bell-LaPadula's star property for confidentiality — not a Biba property."
    difficulty: "hard"
    tags: ["security-models", "integrity"]

  - id: q-d3-017
    domain: domain3
    question: "What is the key characteristic of asymmetric (public-key) cryptography?"
    options:
      - "It uses a single shared key for both encryption and decryption"
      - "It uses a mathematically related key pair — a public key for encryption and a private key for decryption"
      - "It is faster than symmetric encryption for large data volumes"
      - "It requires both parties to exchange keys in person before communicating"
    correct_answer: 1
    explanations:
      correct: "Asymmetric cryptography uses a mathematically linked key pair. Data encrypted with the public key can only be decrypted with the corresponding private key. The public key can be distributed freely; the private key is kept secret. Common algorithms: RSA, ECC, Diffie-Hellman."
      incorrect:
        - "A single shared key is symmetric cryptography (AES, DES) — asymmetric uses a key pair."
        - "A mathematically related key pair with public encryption and private decryption is the defining characteristic of asymmetric cryptography."
        - "Asymmetric cryptography is significantly slower than symmetric — typically used only for key exchange and digital signatures, not bulk data."
        - "The value of asymmetric cryptography is that keys do not need to be exchanged in person — the public key can be distributed openly."
    difficulty: "easy"
    tags: ["cryptography", "asymmetric"]

  - id: q-d3-018
    domain: domain3
    question: "In PKI, what is the role of a Registration Authority (RA)?"
    options:
      - "To sign and issue digital certificates"
      - "To maintain the Certificate Revocation List"
      - "To verify the identity of certificate requestors before the CA issues a certificate"
      - "To manage the private keys of all certificate holders"
    correct_answer: 2
    explanations:
      correct: "The Registration Authority (RA) handles identity verification — it authenticates the identity of certificate requestors and approves or rejects certificate requests before forwarding approved requests to the Certificate Authority (CA) for issuance. The RA offloads the CA from administrative identity verification tasks."
      incorrect:
        - "Signing and issuing certificates is the CA's role — the RA verifies identity but does not sign certificates."
        - "Maintaining the CRL is the CA's responsibility — the RA handles identity verification."
        - "Verifying requestor identity before CA issuance is the correct RA role — this is what the RA does."
        - "Private key management is the individual certificate holder's responsibility — PKI best practice is that the CA and RA never possess subscribers' private keys."
    difficulty: "medium"
    tags: ["PKI", "cryptography"]

  - id: q-d3-019
    domain: domain3
    question: "Which type of cipher substitutes one letter for another based on a fixed shift value (e.g., A→D, B→E)?"
    options:
      - "Transposition cipher"
      - "Vigenère cipher"
      - "Caesar cipher"
      - "One-time pad"
    correct_answer: 2
    explanations:
      correct: "The Caesar cipher is a substitution cipher that shifts each letter by a fixed number of positions in the alphabet (e.g., shift 3: A→D, B→E). Julius Caesar used a shift of 3. It is trivially broken and has no modern security use — it is studied as a foundational cryptographic concept."
      incorrect:
        - "A transposition cipher rearranges the positions of characters without substituting them — it does not shift letter values."
        - "The Vigenère cipher uses a keyword to apply multiple different shift values — it is a polyalphabetic substitution cipher, stronger than Caesar."
        - "A Caesar cipher with a fixed letter shift is the correct answer."
        - "A one-time pad uses a truly random key the same length as the message — it is theoretically unbreakable, not a simple shift cipher."
    difficulty: "easy"
    tags: ["cryptography", "historical"]

  - id: q-d3-020
    domain: domain3
    question: "What is the purpose of 'certificate pinning' in mobile applications?"
    options:
      - "To speed up TLS handshake performance"
      - "To bind an application to a specific expected certificate or public key, preventing acceptance of rogue certificates even from trusted CAs"
      - "To store private keys securely on the device"
      - "To compress certificate data for mobile networks"
    correct_answer: 1
    explanations:
      correct: "Certificate pinning hard-codes (pins) the expected certificate or public key into an application. Even if an attacker obtains a fraudulent certificate from a legitimate CA (through compromise or social engineering), the app rejects it because it doesn't match the pinned value. This protects against CA compromises and MitM attacks."
      incorrect:
        - "Certificate pinning adds overhead during validation — it does not speed up TLS handshakes."
        - "Binding the app to a specific expected certificate to prevent rogue certificate acceptance is the correct purpose of pinning."
        - "Private key storage is managed by the device's secure enclave or keystore — not certificate pinning."
        - "Certificate compression is not a function of certificate pinning — it is a security control."
    difficulty: "hard"
    tags: ["PKI", "mobile-security"]

  - id: q-d3-021
    domain: domain3
    question: "What is the Diffie-Hellman key exchange protocol used for?"
    options:
      - "Encrypting large volumes of data efficiently"
      - "Securely establishing a shared secret key over an untrusted channel without transmitting the key itself"
      - "Creating digital signatures for email authentication"
      - "Generating one-time passwords for multi-factor authentication"
    correct_answer: 1
    explanations:
      correct: "Diffie-Hellman allows two parties to independently compute a shared secret key using public information exchanged over an untrusted channel — neither party ever transmits the actual secret. It solves the key distribution problem. It is widely used in TLS, SSH, and IPsec for session key establishment."
      incorrect:
        - "DH does not encrypt data — it establishes a shared key that is then used with symmetric algorithms (like AES) for bulk encryption."
        - "Securely establishing a shared secret without transmitting it is the correct description of Diffie-Hellman."
        - "Digital signatures use RSA or DSA/ECDSA — not Diffie-Hellman."
        - "One-time passwords use TOTP/HOTP algorithms — not Diffie-Hellman."
    difficulty: "medium"
    tags: ["cryptography", "key-exchange"]

  - id: q-d3-022
    domain: domain3
    question: "What security property does a Message Authentication Code (MAC) provide?"
    options:
      - "Confidentiality — the message cannot be read by unauthorized parties"
      - "Integrity and authentication — verifies the message has not been altered and came from a holder of the shared key"
      - "Non-repudiation — the sender cannot deny sending the message"
      - "Availability — ensures the message is delivered"
    correct_answer: 1
    explanations:
      correct: "A MAC (e.g., HMAC) uses a shared secret key to compute an authentication code appended to a message. It provides integrity (detects tampering) and authentication (proves the message came from someone with the shared key). Unlike digital signatures, MACs do not provide non-repudiation since both parties share the key."
      incorrect:
        - "MACs do not encrypt the message — confidentiality requires encryption. A MAC is appended to the message but doesn't hide it."
        - "Integrity and authentication from a shared-key holder is the correct description of MAC's security properties."
        - "Non-repudiation requires asymmetric cryptography (digital signatures) — MACs use shared keys, so either party could have created it."
        - "Availability is not provided by MACs — they are cryptographic authentication tools."
    difficulty: "medium"
    tags: ["cryptography", "MAC", "integrity"]

  - id: q-d3-023
    domain: domain3
    question: "What does 'perfect forward secrecy' (PFS) protect against?"
    options:
      - "Brute force attacks against session keys"
      - "Compromise of long-term private keys being used to decrypt previously recorded session traffic"
      - "Replay attacks using captured session tokens"
      - "Side-channel timing attacks during key generation"
    correct_answer: 1
    explanations:
      correct: "Perfect Forward Secrecy (PFS) ensures that session keys are generated freshly for each session using ephemeral key exchange (e.g., ECDHE). If a long-term private key is later compromised, an attacker cannot use it to decrypt previously recorded sessions because each session used a unique ephemeral key that was discarded."
      incorrect:
        - "Brute force resistance is addressed by key length — PFS specifically protects against long-term key compromise."
        - "Protecting recorded past sessions from future long-term key compromise is the correct purpose of PFS."
        - "Replay attacks are prevented by nonces and timestamps — not PFS."
        - "Side-channel attacks are mitigated by implementation hardening — not PFS."
    difficulty: "hard"
    tags: ["cryptography", "TLS"]

  - id: q-d3-024
    domain: domain3
    question: "What is the Clark-Wilson integrity model primarily concerned with protecting?"
    options:
      - "Confidentiality of classified data using security labels"
      - "Integrity of commercial data through well-formed transactions and separation of duties"
      - "Preventing conflicts of interest in consulting relationships"
      - "Physical security of computing equipment"
    correct_answer: 1
    explanations:
      correct: "Clark-Wilson protects data integrity in commercial environments. It uses Constrained Data Items (CDIs) that can only be modified through Transformation Procedures (TPs) — well-formed transactions that maintain integrity. It also enforces separation of duties through Access Control Triples (subject, TP, CDI)."
      incorrect:
        - "Confidentiality with security labels is the Bell-LaPadula model — Clark-Wilson focuses on integrity, not confidentiality."
        - "Commercial data integrity through well-formed transactions and SoD is the correct description of Clark-Wilson."
        - "Preventing conflicts of interest is the Brewer-Nash (Chinese Wall) model — not Clark-Wilson."
        - "Physical security is not addressed by any of the named security models."
    difficulty: "medium"
    tags: ["security-models", "integrity"]

  - id: q-d3-025
    domain: domain3
    question: "What is the primary weakness of WEP (Wired Equivalent Privacy)?"
    options:
      - "It uses symmetric encryption which is inherently insecure"
      - "Its use of short, static keys and a flawed RC4 implementation with weak IVs allows traffic to be decrypted"
      - "It requires physical access to crack"
      - "It only supports networks with fewer than 10 devices"
    correct_answer: 1
    explanations:
      correct: "WEP is cryptographically broken. It uses 24-bit Initialization Vectors (IVs) that repeat, combined with a flawed RC4 implementation. Attackers can capture enough traffic to statistically derive the encryption key in minutes. WEP should never be used — replaced by WPA, WPA2, and WPA3."
      incorrect:
        - "Symmetric encryption is not inherently insecure — AES (symmetric) is the current standard. WEP's specific implementation flaws are the problem."
        - "Short/static keys, flawed RC4, and weak repeating IVs allowing key derivation from captured traffic is the correct description of WEP's weakness."
        - "WEP can be cracked remotely by capturing wireless traffic — no physical access needed."
        - "WEP's failure is cryptographic, not limited to device count."
    difficulty: "medium"
    tags: ["wireless", "cryptography"]

  - id: q-d3-026
    domain: domain3
    question: "Which EAL (Evaluation Assurance Level) in Common Criteria represents 'formally verified design and tested'?"
    options:
      - "EAL1"
      - "EAL4"
      - "EAL7"
      - "EAL3"
    correct_answer: 2
    explanations:
      correct: "EAL7 is the highest Common Criteria assurance level, representing 'formally verified design and tested.' It requires formal mathematical verification of the security design. EAL7 is very rare and typically reserved for high-security systems like cryptographic modules used in national security applications."
      incorrect:
        - "EAL1 is the lowest level — 'functionally tested' with minimal assurance requirements."
        - "EAL4 represents 'methodically designed, tested, and reviewed' — the highest level commercially practical without formal mathematical verification."
        - "EAL7 — formally verified design and tested — is the highest and correct answer."
        - "EAL3 represents 'methodically tested and checked' — not formally verified."
    difficulty: "hard"
    tags: ["standards", "common-criteria"]

  - id: q-d3-027
    domain: domain3
    question: "What is 'steganography' and how does it differ from cryptography?"
    options:
      - "They are the same technique — both hide message content"
      - "Steganography hides the existence of a message within another medium; cryptography scrambles message content but doesn't hide that a message exists"
      - "Steganography is stronger than cryptography for protecting sensitive data"
      - "Steganography uses mathematical algorithms; cryptography uses physical techniques"
    correct_answer: 1
    explanations:
      correct: "Steganography hides the very existence of communication by concealing a secret message within an innocuous carrier (image, audio, video file). Cryptography makes a message unreadable but doesn't hide that communication occurred. Combining both (hiding an encrypted message) provides stronger security."
      incorrect:
        - "They serve different purposes — cryptography obscures content; steganography hides existence."
        - "Steganography conceals the existence of a message; cryptography scrambles content — this correctly distinguishes them."
        - "Neither is universally 'stronger' — they address different aspects of secure communication and are often used together."
        - "Both use mathematical/algorithmic techniques — the distinction is about what they hide (content vs. existence)."
