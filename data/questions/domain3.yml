      incorrect:
        - "Key escrow stores private keys (not public keys) — public keys are freely shared and don't need escrow."
        - "Storing keys with a trusted third party, controversial due to creating a central target and government access concerns — this correctly describes key escrow and its controversy."
        - "Key exchange (Diffie-Hellman) is a different concept — key escrow is about depositing copies of existing keys."
        - "Hardware key protection (HSM) is a security best practice — not what key escrow refers to."
    difficulty: "hard"
    tags: ["cryptography", "key-management"]

  - id: q-d3-034
