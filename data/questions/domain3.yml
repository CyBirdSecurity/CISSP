  - id: q-d3-039
    domain: domain3
    question: "What property distinguishes a cryptographic hash function from a standard checksum?"
    options:
      - "Hash functions are faster to compute than checksums"
      - "Hash functions provide collision resistance and one-way properties; checksums are designed only for error detection"
      - "Hash functions require a key; checksums do not"
      - "Hash functions produce longer outputs than checksums"
    correct_answer: 1
    explanations:
      correct: "Cryptographic hash functions provide security properties checksums lack: one-way (preimage resistance — cannot reverse hash to input), second preimage resistance (cannot find a different input with same hash), and collision resistance (computationally infeasible to find two inputs with the same hash). Checksums (CRC32) are designed only to detect accidental errors, not withstand deliberate manipulation."
      incorrect:
        - "Checksums are often faster than cryptographic hashes — cryptographic strength requires more computation."
        - "Collision resistance and one-way properties distinguish cryptographic hashes from simple checksums — this is the correct answer."
        - "Most cryptographic hash functions are keyless (like SHA-256). HMAC adds a key to a hash — but a basic hash doesn't require a key."
        - "Output length varies — MD5 produces 128 bits, CRC32 produces 32 bits. Length alone does not define a cryptographic hash."
    difficulty: "medium"
    tags: ["cryptography", "hashing"]

  - id: q-d3-040
    domain: domain3
    question: "A digital signature provides which three security properties?"
    options:
      - "Confidentiality, Integrity, Availability"
      - "Authentication, Integrity, Non-repudiation"
      - "Authentication, Authorization, Accounting"
      - "Confidentiality, Authentication, Non-repudiation"
    correct_answer: 1
    explanations:
      correct: "A digital signature provides: Authentication (verifies the signer's identity — only the holder of the private key can create it), Integrity (any modification to the signed message invalidates the signature), and Non-repudiation (the signer cannot later deny signing — only they had the private key). Digital signatures do NOT provide confidentiality."
      incorrect:
        - "Digital signatures do not provide confidentiality — the signed message may still be readable by anyone. Encryption provides confidentiality."
        - "Authentication, Integrity, and Non-repudiation are the three properties provided by digital signatures — this is the correct answer."
        - "Authentication, Authorization, and Accounting (AAA) is a security framework for access control — not the properties of digital signatures."
        - "Confidentiality is not provided by digital signatures — signing does not encrypt the content."
    difficulty: "medium"
    tags: ["cryptography", "digital-signatures"]

