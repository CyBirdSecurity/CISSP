    tags: ["standards", "Common-Criteria", "evaluation"]

  - id: q-d3-051
    domain: domain3
    question: "A covert storage channel differs from a covert timing channel in which way?"
    options:
      - "Covert storage channels use time delays; timing channels use file modifications"
      - "Covert storage channels communicate through storage mechanisms; timing channels communicate through observable timing behavior"
      - "Covert channels are legal; timing channels are illegal"
      - "Covert storage channels are always detectable; timing channels are always invisible"
    correct_answer: 1
    explanations:
      correct: "A covert storage channel communicates by modifying a shared storage resource (e.g., file existence, database entries, file sizes, lock states). A covert timing channel communicates by modulating observable timing behavior (e.g., CPU utilization patterns, network timing, process scheduling). Both violate security policy by transferring information through unintended paths."
      incorrect:
        - "This is reversed — covert timing channels use time delays/patterns; storage channels use storage modifications."
        - "Storage channels use storage mechanisms; timing channels use observable timing behavior — this is the correct distinction."
        - "Both covert channel types violate security policy — the distinction is technical (how they work), not legal."
        - "Detection difficulty varies for both types — timing channels can be detected through statistical analysis; storage channels can be detected through monitoring."
    difficulty: "hard"
    tags: ["architecture", "covert-channels"]

  - id: q-d3-052
    domain: domain3
    question: "An HMAC differs from a plain cryptographic hash in which critical way?"
    options:
      - "HMAC uses symmetric encryption; plain hashes use asymmetric algorithms"
      - "HMAC requires a secret key, providing both integrity and authentication; a plain hash provides only integrity"
      - "HMAC is faster than a plain hash because it skips key derivation"
      - "HMAC produces a longer output than equivalent hash algorithms"
    correct_answer: 1
    explanations:
      correct: "HMAC (Hash-based Message Authentication Code) combines a cryptographic hash with a shared secret key. Without the key, an attacker cannot generate a valid HMAC — this provides authentication (proof the MAC was created by someone with the key). A plain hash provides only integrity (detects modification) but anyone can compute it — an attacker could modify a message and recompute the hash."
      incorrect:
        - "HMAC uses hash functions (like SHA-256), not symmetric encryption algorithms — though it does require a symmetric secret key."
        - "HMAC requiring a secret key and providing both integrity and authentication (vs. hash providing only integrity) is the correct distinction."
        - "HMAC is slightly slower than a plain hash because it performs additional operations involving the key."
        - "HMAC output size equals the underlying hash output size (e.g., HMAC-SHA256 produces 256 bits, same as SHA-256)."
    difficulty: "medium"
    tags: ["cryptography", "HMAC", "integrity"]

  - id: q-d3-053
    domain: domain3
    question: "What is the primary threat that post-quantum cryptography (PQC) is designed to address?"
    options:
      - "Improved GPU-based password cracking attacks"
      - "Quantum computers using Shor's algorithm to break RSA and ECC"
      - "Nation-state actors intercepting symmetric encrypted communications"
      - "AI-assisted cryptanalysis of block cipher modes"
    correct_answer: 1
    explanations:
      correct: "Shor's algorithm, run on a sufficiently powerful quantum computer, can factor large integers and solve discrete logarithm problems exponentially faster than classical computers — directly breaking RSA and ECC. NIST has standardized quantum-resistant algorithms (CRYSTALS-Kyber for key exchange, CRYSTALS-Dilithium for signatures) to replace vulnerable public-key cryptography."
      incorrect:
        - "GPU-based cracking affects password hashing — addressed by slow hashing algorithms (Argon2, bcrypt), not quantum-resistant cryptography."
        - "Quantum computers using Shor's algorithm to break RSA and ECC is the primary threat PQC addresses."
        - "Nation-state interception of symmetric communications is addressed by key length (AES-256 is quantum-resistant to Grover's algorithm with doubled key) — not the primary PQC concern."
        - "AI-assisted cryptanalysis is a theoretical concern but not the specific threat driving the PQC standardization effort."
    difficulty: "hard"
    tags: ["cryptography", "quantum", "PQC"]

  - id: q-d3-054
    domain: domain3
    question: "The 'Reference Monitor' concept requires which of the following properties?"
    options:
      - "It must be implemented in software only, for easy auditing"
      - "It must be always invoked, tamper-proof, and small enough to be verifiably correct"
      - "It must log all access attempts to a centralized SIEM"
      - "It must be separated across multiple redundant systems"
    correct_answer: 1
    explanations:
      correct: "The Reference Monitor must be: always invoked (no access request can bypass it — complete mediation), tamper-proof (cannot be modified by any subject — including privileged ones), and verifiable (small and simple enough to be thoroughly analyzed and formally proved correct). The security kernel implements this concept as the TCB's access mediation component."
      incorrect:
        - "Reference Monitors can be implemented in hardware, firmware, or software — the requirement is tamper-resistance and correctness, not any specific implementation medium."
        - "Always invoked, tamper-proof, and small enough for verification are the three required reference monitor properties."
        - "Logging is important for audit but is not one of the three formal reference monitor requirements — complete mediation, tamper-resistance, and verifiability are."
        - "Distribution across redundant systems is an availability strategy — not a reference monitor requirement."
    difficulty: "hard"
    tags: ["architecture", "TCB", "reference-monitor"]

  - id: q-d3-055
    domain: domain3
    question: "Key escrow raises which primary security concern?"
    options:
      - "Escrowed keys expire sooner than non-escrowed keys"
      - "The key escrow system becomes a high-value target whose compromise exposes all protected data"
      - "Escrowing keys prevents the use of public key cryptography"
      - "Key escrow systems are incompatible with TLS/SSL protocols"
    correct_answer: 1
    explanations:
      correct: "Key escrow creates a centralized repository of encryption keys held by a trusted third party or government entity. This repository becomes an extremely high-value attack target — compromising it would expose all data protected by the escrowed keys. This 'single point of failure for all secrets' is the primary security concern that led to widespread opposition to government-mandated key escrow proposals."
      incorrect:
        - "Key escrow does not affect key expiration — key lifecycle management is handled separately from escrow."
        - "The escrow system becoming a high-value target whose compromise exposes all protected data is the primary security concern."
        - "Key escrow does not prevent use of public key cryptography — it applies to the private or symmetric keys used in public key systems."
        - "Key escrow is a key management policy that can be applied alongside TLS/SSL — they are not incompatible."
    difficulty: "hard"
    tags: ["cryptography", "key-management", "escrow"]
