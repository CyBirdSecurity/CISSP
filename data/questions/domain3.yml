  - id: q-d3-047
    domain: domain3
    question: "Kerckhoffs's principle states that the security of a cryptosystem should depend on:"
    options:
      - "The secrecy of the algorithm itself"
      - "Only the secrecy of the key, not the secrecy of the algorithm"
      - "Both the secrecy of the algorithm and the key equally"
      - "Physical security of the devices running the cryptographic software"
    correct_answer: 1
    explanations:
      correct: "Kerckhoffs's principle states that a cryptosystem should be secure even if everything about the system — except the key — is publicly known. Security should rest entirely on key secrecy, not algorithm secrecy. This is why AES, RSA, and all modern cryptographic algorithms are public — only the keys need to be secret."
      incorrect:
