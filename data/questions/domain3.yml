        - "Bootkit/rootkit malware loading before the OS is the primary threat Secure Boot addresses."
        - "Network-based attacks during startup would require network-level security controls — Secure Boot addresses local boot integrity."
        - "Physical theft of storage media is addressed by full-disk encryption (BitLocker, FileVault) — Secure Boot addresses boot integrity, not data confidentiality."
    difficulty: "medium"
    tags: ["hardware", "trusted-systems", "boot-security"]

