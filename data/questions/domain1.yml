questions:
  - id: q-d1-001
    domain: domain1
    question: "Which component of the CIA triad ensures that data is accurate, complete, and has not been altered by unauthorized parties?"
    options:
      - "Confidentiality"
      - "Integrity"
      - "Availability"
      - "Non-repudiation"
    correct_answer: 1
    explanations:
      correct: "Integrity ensures data is accurate, complete, and has not been modified by unauthorized parties. Controls like hashing, digital signatures, and checksums protect integrity."
      incorrect:
        - "Confidentiality ensures only authorized users can access data — it does not address data accuracy or modification."
        - "Integrity is the correct answer — it directly addresses protection against unauthorized alteration."
        - "Availability ensures systems and data are accessible when needed — it does not address data accuracy."
        - "Non-repudiation is not a core CIA triad component — it provides proof that an action occurred and cannot be denied."
    difficulty: "easy"
    tags: ["CIA", "fundamentals"]

  - id: q-d1-002
    domain: domain1
    question: "A company identifies a risk of $50,000 and determines the cost to mitigate it would be $75,000. What is the most appropriate risk response?"
    options:
      - "Mitigate the risk by implementing the $75,000 control"
      - "Transfer the risk to an insurance provider"
      - "Accept the risk and document it"
      - "Avoid the risk by eliminating the business activity"
    correct_answer: 2
    explanations:
      correct: "When the cost of mitigation exceeds the value of what is being protected, risk acceptance is appropriate. The risk should be formally accepted, documented, and monitored."
      incorrect:
        - "Spending $75,000 to mitigate a $50,000 risk is not cost-effective. The control cost exceeds the potential loss."
        - "Risk transfer (insurance) may be appropriate but is not the most obvious answer when acceptance is directly justified by cost comparison."
        - "Risk acceptance is the correct response when mitigation costs exceed the risk value."
        - "Risk avoidance would eliminate a business activity — this is extreme and often not practical for a single risk scenario."
    difficulty: "medium"
    tags: ["risk", "management"]

  - id: q-d1-003
    domain: domain1
    question: "What distinguishes 'due care' from 'due diligence' in information security?"
    options:
      - "Due care is the research; due diligence is the action taken"
      - "Due care is the action taken; due diligence is the ongoing research and investigation"
      - "They are interchangeable terms describing the same security obligation"
      - "Due care applies to executives; due diligence applies to technical staff"
    correct_answer: 1
    explanations:
      correct: "Due care is the action — implementing controls and doing what a reasonable person would do. Due diligence is the research — investigating and understanding risks before acting."
      incorrect:
        - "This is reversed. Due diligence is the research; due care is the action taken."
        - "Due care is doing something (implementing controls); due diligence is knowing what needs to be done (research and investigation)."
        - "They are distinct concepts. Both are legally important but address different aspects of security responsibility."
        - "Both concepts apply to all levels of an organization — they are not role-specific distinctions."
    difficulty: "medium"
    tags: ["governance", "legal"]

  - id: q-d1-004
    domain: domain1
    question: "During a BIA, the maximum time a critical business function can be disrupted before causing unacceptable damage is called the:"
    options:
      - "Recovery Time Objective (RTO)"
      - "Recovery Point Objective (RPO)"
      - "Maximum Tolerable Downtime (MTD)"
      - "Mean Time to Repair (MTTR)"
    correct_answer: 2
    explanations:
      correct: "MTD (also called Maximum Tolerable Outage or MTO) defines the absolute maximum time a business can survive without a function. RTO must be less than or equal to MTD."
      incorrect:
        - "RTO is the targeted time to restore a system — it must be equal to or less than the MTD, but it is not the definition of maximum acceptable disruption."
        - "RPO relates to data loss tolerance (how much data can be lost), not disruption duration."
        - "MTD is the correct answer — it is the threshold beyond which business damage becomes unacceptable."
        - "MTTR is an operational metric for how long repairs take, not a BIA planning metric for business tolerance."
    difficulty: "medium"
    tags: ["BCP", "BIA"]

  - id: q-d1-005
    domain: domain1
    question: "Which security policy document provides step-by-step instructions for implementing a specific security task?"
    options:
      - "Policy"
      - "Standard"
      - "Guideline"
      - "Procedure"
    correct_answer: 3
    explanations:
      correct: "Procedures provide specific, detailed, step-by-step instructions for implementing tasks. They are the most granular policy document and are mandatory."
      incorrect:
        - "A policy is a high-level management statement of intent — it defines what must be done but not how."
        - "A standard defines specific, mandatory requirements (e.g., AES-256 encryption) but does not provide step-by-step instructions."
        - "A guideline provides recommendations and best practices but is not mandatory and does not provide step-by-step instructions."
        - "A procedure is the correct answer — it provides specific, actionable steps for completing a task."
    difficulty: "easy"
    tags: ["governance", "policy"]

  - id: q-d1-006
    domain: domain1
    question: "What is the primary purpose of a Business Continuity Plan (BCP)?"
    options:
      - "To restore IT systems after a disaster"
      - "To ensure critical business functions continue during and after a disruption"
      - "To document security incidents and their resolution"
      - "To train employees on emergency evacuation procedures"
    correct_answer: 1
    explanations:
      correct: "BCP focuses on keeping critical business functions operational during and after any disruption — not just IT systems. It encompasses people, processes, and technology."
      incorrect:
        - "Restoring IT systems is the purpose of a Disaster Recovery Plan (DRP), which is a technical subset of the BCP."
        - "BCP is focused on maintaining business operations during disruptions — it is not primarily about documenting incidents."
        - "Emergency evacuation is part of physical security and emergency management, which may be included in BCP but is not its primary purpose."
    difficulty: "easy"
    tags: ["BCP", "continuity"]

  - id: q-d1-007
    domain: domain1
    question: "An organization is considering the four responses to risk. Which response involves shifting the financial impact of a risk to a third party?"
    options:
      - "Risk avoidance"
      - "Risk mitigation"
      - "Risk transfer"
      - "Risk acceptance"
    correct_answer: 2
    explanations:
      correct: "Risk transfer (also called risk sharing) shifts the financial impact to a third party through insurance, contracts, or outsourcing. The organization still faces the risk but limits its financial exposure."
      incorrect:
        - "Risk avoidance eliminates the activity that causes the risk — it does not shift responsibility to a third party."
        - "Risk mitigation reduces the likelihood or impact of a risk through controls — it does not transfer responsibility."
        - "Risk transfer is the correct answer — it shifts financial impact, not risk itself, to another party."
        - "Risk acceptance means acknowledging the risk and choosing to deal with it if it occurs — no shifting to third party."
    difficulty: "easy"
    tags: ["risk", "management"]

  - id: q-d1-008
    domain: domain1
    question: "Which framework is specifically designed for evaluating and improving an organization's cybersecurity posture, organized around five core functions: Identify, Protect, Detect, Respond, Recover?"
    options:
      - "ISO/IEC 27001"
      - "NIST Cybersecurity Framework (CSF)"
      - "COBIT"
      - "ITIL"
    correct_answer: 1
    explanations:
      correct: "The NIST Cybersecurity Framework (CSF) is organized around five core functions: Identify, Protect, Detect, Respond, and Recover. It provides a risk-based approach to managing cybersecurity."
      incorrect:
        - "ISO/IEC 27001 is an international standard for establishing an Information Security Management System (ISMS) — it does not use the five-function structure."
        - "NIST CSF is the correct framework with the five core functions."
        - "COBIT (Control Objectives for IT) focuses on IT governance and management, not specifically on the five cybersecurity functions."
        - "ITIL is an IT service management framework focused on service delivery, not cybersecurity posture."
    difficulty: "medium"
    tags: ["frameworks", "governance"]

  - id: q-d1-009
    domain: domain1
    question: "What type of risk assessment assigns numerical values to assets, threats, and vulnerabilities to calculate annualized loss expectancy?"
    options:
      - "Qualitative risk assessment"
      - "Quantitative risk assessment"
      - "Delphi technique"
      - "Fault tree analysis"
    correct_answer: 1
    explanations:
      correct: "Quantitative risk assessment uses numerical values and formulas: Asset Value × Exposure Factor = Single Loss Expectancy (SLE); SLE × Annual Rate of Occurrence (ARO) = Annualized Loss Expectancy (ALE)."
      incorrect:
        - "Qualitative risk assessment uses descriptive ratings (High/Medium/Low) rather than numeric values. It is more subjective but easier and faster to perform."
        - "Quantitative assessment assigns numbers and calculates ALE — this is the correct answer."
        - "The Delphi technique is a qualitative method using expert consensus — not numerical calculations."
        - "Fault tree analysis is a diagram-based technique for analyzing system failures — it does not calculate ALE."
    difficulty: "medium"
    tags: ["risk", "assessment"]

  - id: q-d1-010
    domain: domain1
    question: "The principle that no single person should have complete control over a critical process or transaction is known as:"
    options:
      - "Least privilege"
      - "Need to know"
      - "Separation of duties"
      - "Job rotation"
    correct_answer: 2
    explanations:
      correct: "Separation of duties (SoD) divides critical functions among multiple people so no single individual can complete a sensitive transaction alone. This prevents fraud and reduces errors."
      incorrect:
        - "Least privilege limits access to what is minimally necessary — it doesn't specifically divide tasks among multiple people."
        - "Need to know restricts access to information required for a specific task — it is about information access, not task division."
        - "Separation of duties is the correct principle — it requires multiple people for critical processes."
        - "Job rotation periodically moves people between roles but doesn't prevent a single person from controlling a process while in that role."
    difficulty: "easy"
    tags: ["principles", "access-control"]

  - id: q-d1-011
    domain: domain1
    question: "A company's RPO is set at 4 hours. What does this mean for their backup strategy?"
    options:
      - "Systems must be restored within 4 hours of a disaster"
      - "Backups must be performed at least every 4 hours"
      - "Recovery systems must be available within 4 hours"
      - "Data can only be retained for 4 hours"
    correct_answer: 1
    explanations:
      correct: "RPO is the maximum acceptable data loss measured in time. An RPO of 4 hours means the organization can tolerate losing up to 4 hours of data, so backups must occur at least every 4 hours."
      incorrect:
        - "Restoring systems within a set time is RTO (Recovery Time Objective), not RPO. RPO defines data loss tolerance, not recovery speed."
        - "Backups must be performed at least every 4 hours — this correctly reflects what RPO of 4 hours means."
        - "System availability is related to RTO, not RPO. RPO specifically measures how much data (in time) can be lost."
        - "RPO is about backup frequency to prevent data loss, not about how long data is retained."
    difficulty: "medium"
    tags: ["BCP", "DRP", "metrics"]

  - id: q-d1-012
    domain: domain1
    question: "Which of the following best describes 'threat modeling'?"
    options:
      - "Creating a visual map of network vulnerabilities"
      - "A structured process for identifying and prioritizing potential threats to a system"
      - "Building a threat intelligence database from external feeds"
      - "Simulating attacks against a production system"
    correct_answer: 1
    explanations:
      correct: "Threat modeling is a structured process (using frameworks like STRIDE, PASTA, or VAST) to identify, categorize, and prioritize potential threats during the design phase to inform security controls."
      incorrect:
        - "Network vulnerability mapping is vulnerability scanning, not threat modeling. Threat modeling is broader and design-focused."
        - "Threat modeling is a structured process to identify and address threats — this is the correct answer."
        - "Threat intelligence feeds provide information about real-world threats — threat modeling is about modeling risks to a specific system."
        - "Simulating attacks against production is penetration testing, not threat modeling. Threat modeling is proactive and design-phase focused."
    difficulty: "medium"
    tags: ["threat-modeling", "risk"]
    
  - id: q-d1-013
    domain: domain1
    question: "Which of the following is considered a 'detective' administrative control?"
    options:
      - "Security awareness training"
      - "Job rotation"
      - "Separation of duties"
      - "A security guard at the gate"
    correct_answer: 1
    explanations:
      correct: "Job rotation is a detective administrative control because it allows a new person to review the work of a predecessor, which may uncover fraud or errors."
      incorrect:
        - "Security awareness training is a preventive administrative control."
        - "Separation of duties is a preventive administrative control designed to stop a single person from completing a sensitive task alone."
        - "A security guard is a physical control, not an administrative one."
    difficulty: "medium"
    tags: ["controls", "governance"]

  - id: q-d1-014
    domain: domain1
    question: "In the context of the Canons of the (ISC)² Code of Ethics, which canon takes the highest priority?"
    options:
      - "Provide diligent and competent service to principals"
      - "Advance and protect the profession"
      - "Protect society, the common good, necessary public trust and confidence, and the infrastructure"
      - "Act honorably, honestly, justly, responsibly, and legally"
    correct_answer: 2
    explanations:
      correct: "The canons are in order of priority. The first canon—protecting society and the common good—is always the highest priority."
      incorrect:
        - "Diligent service to principals is the third canon."
        - "Advancing the profession is the fourth canon."
        - "Acting honorably and legally is the second canon."
    difficulty: "easy"
    tags: ["ethics", "legal"]

  - id: q-d1-015
    domain: domain1
    question: "Which of the following describes the 'Scoping' activity in the context of security standards?"
    options:
      - "The process of tailoring a baseline to a specific system"
      - "Identifying which specific controls from a baseline are applicable to an organization"
      - "Researching new threats to update an existing security policy"
      - "The physical inspection of a data center"
    correct_answer: 1
    explanations:
      correct: "Scoping involves reviewing a baseline and selecting only those controls that apply to the systems you are actually using."
      incorrect:
        - "Tailoring is the process of adjusting the specific settings of the controls you have already 'scoped' into your project."
        - "Updating policies based on threat research is part of a continuous improvement cycle, not scoping."
        - "Physical inspection is part of an audit or assessment."
    difficulty: "medium"
    tags: ["compliance", "frameworks"]

  - id: q-d1-016
    domain: domain1
    question: "What is the primary goal of Change Management?"
    options:
      - "To prevent all changes to the production environment"
      - "To ensure changes are implemented as quickly as possible"
      - "To ensure that changes are recorded, evaluated, and authorized to minimize impact"
      - "To delegate authority to junior admins for system updates"
    correct_answer: 2
    explanations:
      correct: "Change Management's primary goal is to ensure that all changes are handled in a controlled manner to prevent unauthorized changes and minimize service disruption."
      incorrect:
        - "Change management does not stop changes; it controls them."
        - "Speed is a factor, but 'controlled' implementation is the primary goal over 'fast' implementation."
        - "Delegation is part of internal workflows but not the goal of the change management process itself."
    difficulty: "medium"
    tags: ["governance", "operations"]

  - id: q-d1-017
    domain: domain1
    question: "Under the GDPR, what is the role of a 'Data Processor'?"
    options:
      - "The entity that determines the purposes and means of processing personal data"
      - "The individual to whom the personal data belongs"
      - "The entity that processes data on behalf of a data controller"
      - "The government agency responsible for data protection enforcement"
    correct_answer: 2
    explanations:
      correct: "A Data Processor handles personal data only on behalf of and according to the instructions of a Data Controller."
      incorrect:
        - "The entity determining the purpose is the Data Controller."
        - "The individual is the Data Subject."
        - "The enforcement agency is the Supervisory Authority (SA)."
    difficulty: "medium"
    tags: ["legal", "GDPR", "privacy"]

  - id: q-d1-018
    domain: domain1
    question: "Which risk calculation involves calculating the Single Loss Expectancy (SLE)?"
    options:
      - "Asset Value (AV) x Exposure Factor (EF)"
      - "Asset Value (AV) / Annual Rate of Occurrence (ARO)"
      - "Annualized Loss Expectancy (ALE) x Exposure Factor (EF)"
      - "Single Loss Expectancy (SLE) / Annual Rate of Occurrence (ARO)"
    correct_answer: 0
    explanations:
      correct: "SLE = AV x EF. This represents the dollar amount lost from a single realized threat."
      incorrect:
        - "AV / ARO is not a standard risk formula."
        - "ALE x EF is not used for SLE; ALE is usually the end result of SLE x ARO."
        - "SLE / ARO is not a standard risk formula."
    difficulty: "easy"
    tags: ["risk", "quantitative"]

  - id: q-d1-019
    domain: domain1
    question: "Which of the following would be an example of 'Risk Avoidance'?"
    options:
      - "Purchasing an insurance policy"
      - "Installing a firewall to block malicious traffic"
      - "Deciding not to launch a high-risk web application"
      - "Outsourcing data storage to a third-party cloud provider"
    correct_answer: 2
    explanations:
      correct: "Risk avoidance is the decision to eliminate the risk by not engaging in the activity that creates it."
      incorrect:
        - "Insurance is Risk Transfer."
        - "Firewalls are Risk Mitigation."
        - "Outsourcing can be Risk Transfer or Mitigation depending on the contract."
    difficulty: "easy"
    tags: ["risk"]

  - id: q-d1-020
    domain: domain1
    question: "The STRIDE threat model was developed by Microsoft. What does the 'I' in STRIDE stand for?"
    options:
      - "Information Disclosure"
      - "Insecure Defaults"
      - "Integrity Violation"
      - "Identity Theft"
    correct_answer: 0
    explanations:
      correct: "STRIDE stands for Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, and Elevation of Privilege."
      incorrect:
        - "Insecure Defaults is a configuration issue, not part of the STRIDE acronym."
        - "Tampering covers integrity violations, but 'I' specifically stands for Information Disclosure."
        - "Spoofing covers identity issues, but 'I' is Information Disclosure."
    difficulty: "medium"
    tags: ["threat-modeling"]

  - id: q-d1-021
    domain: domain1
    question: "What is the primary difference between a 'Policy' and a 'Guideline'?"
    options:
      - "Policies are long; guidelines are short"
      - "Policies are mandatory; guidelines are suggested"
      - "Policies are technical; guidelines are administrative"
      - "Guidelines must be signed by the CEO; policies do not"
    correct_answer: 1
    explanations:
      correct: "Policies are high-level, mandatory management statements. Guidelines are non-mandatory recommendations or best practices."
      incorrect:
        - "Length does not determine the type of document."
        - "Both can be administrative; technical details usually live in Standards or Procedures."
        - "The CEO typically signs high-level Policies, not guidelines."
    difficulty: "easy"
    tags: ["governance"]

  - id: q-d1-022
    domain: domain1
    question: "Which of the following is a 'Technical' control?"
    options:
      - "Security policy"
      - "Encryption"
      - "Background checks"
      - "Fences"
    correct_answer: 1
    explanations:
      correct: "Technical (or logical) controls use technology to enforce security, such as encryption, firewalls, and IDS."
      incorrect:
        - "Security policy is an Administrative control."
        - "Background checks are Administrative controls."
        - "Fences are Physical controls."
    difficulty: "easy"
    tags: ["controls"]

  - id: q-d1-023
    domain: domain1
    question: "In Business Continuity Planning, what is the 'Maximum Tolerable Downtime' (MTD) composed of?"
    options:
      - "RPO + WRT"
      - "RTO + WRT"
      - "RTO + SLE"
      - "ALE + ARO"
    correct_answer: 1
    explanations:
      correct: "MTD is the sum of Recovery Time Objective (RTO) and Work Recovery Time (WRT)."
      incorrect:
        - "RPO is about data loss, not downtime duration."
        - "SLE is a risk metric, not a continuity time metric."
        - "ALE and ARO are quantitative risk assessment metrics."
    difficulty: "hard"
    tags: ["BCP", "BIA"]

  - id: q-d1-024
    domain: domain1
    question: "Which legal system is based primarily on written laws and codes rather than judicial precedents?"
    options:
      - "Common Law"
      - "Civil Law"
      - "Religious Law"
      - "Criminal Law"
    correct_answer: 1
    explanations:
      correct: "Civil Law (not to be confused with civil/tort law in common law systems) relies on codified statutes and is the most prevalent legal system globally."
      incorrect:
        - "Common Law relies heavily on judicial precedent (case law)."
        - "Religious Law is based on religious texts."
        - "Criminal Law is a branch of law, not a total legal system type like Civil or Common law."
    difficulty: "medium"
    tags: ["legal"]

  - id: q-d1-025
    domain: domain1
    question: "A 'Supply Chain Risk Management' (SCRM) program should primarily focus on:"
    options:
      - "Reducing the cost of hardware"
      - "Identifying and mitigating risks throughout the entire lifecycle of a product"
      - "Ensuring all vendors use the same encryption"
      - "Eliminating all third-party dependencies"
    correct_answer: 1
    explanations:
      correct: "SCRM involves identifying and managing risks associated with the entire supply chain, from raw materials to final delivery and disposal."
      incorrect:
        - "Cost reduction is procurement's job, not the primary focus of security risk management."
        - "While standards are good, 'entire lifecycle' management is the broader and more correct goal."
        - "Eliminating all dependencies is impossible in modern business."
    difficulty: "medium"
    tags: ["risk", "supply-chain"]

  - id: q-d1-026
    domain: domain1
    question: "The 'Delphi Technique' is used in risk assessment to:"
    options:
      - "Calculate exact ALE values"
      - "Obtain a consensus from a group of experts anonymously"
      - "Automate vulnerability scanning"
      - "Predict the exact date of the next breach"
    correct_answer: 1
    explanations:
      correct: "The Delphi Technique is a qualitative method used to reach a consensus among experts while avoiding 'groupthink' by using anonymous questionnaires."
      incorrect:
        - "It is a qualitative method, not used for exact quantitative calculations like ALE."
        - "It is a human-based process, not an automated scanning tool."
        - "No technique can predict exact dates of future breaches."
    difficulty: "medium"
    tags: ["risk", "assessment"]

  - id: q-d1-027
    domain: domain1
    question: "Which of the following best describes 'Residual Risk'?"
    options:
      - "The risk that exists before any controls are applied"
      - "The risk that remains after security controls have been implemented"
      - "The risk associated with a retired asset"
      - "The cost of the security control itself"
    correct_answer: 1
    explanations:
      correct: "Residual Risk = Inherent Risk - Impact of Controls. It is the risk left over after management has taken action."
      incorrect:
        - "Risk before controls is 'Inherent Risk'."
        - "Retired assets should have their risk mitigated through proper disposal (sanitization)."
        - "The cost of a control is part of a Cost-Benefit Analysis, not the definition of residual risk."
    difficulty: "easy"
    tags: ["risk"]

  - id: q-d1-028
    domain: domain1
    question: "What is the primary purpose of 'Security Awareness Training'?"
    options:
      - "To satisfy legal requirements only"
      - "To change user behavior and reduce the human risk factor"
      - "To teach employees how to perform penetration testing"
      - "To ensure everyone knows the password to the guest Wi-Fi"
    correct_answer: 1
    explanations:
      correct: "The goal of awareness is to influence behavior and foster a security-conscious culture, thereby reducing risks like social engineering."
      incorrect:
        - "Compliance is a driver, but the 'primary purpose' is risk reduction through behavior change."
        - "General employees do not need to know how to perform penetration tests."
        - "Knowing Wi-Fi passwords is not the goal of a security awareness program."
    difficulty: "easy"
    tags: ["awareness", "personnel"]

  - id: q-d1-029
    domain: domain1
    question: "Which type of law deals with wrongs against society and usually results in imprisonment or fines?"
    options:
      - "Civil (Tort) Law"
      - "Administrative Law"
      - "Criminal Law"
      - "Contract Law"
    correct_answer: 2
    explanations:
      correct: "Criminal law addresses conduct that is perceived as threatening, harmful, or otherwise endangering to the property, health, safety, and moral welfare of people inclusive of the state."
      incorrect:
        - "Civil law deals with disputes between individuals or organizations, usually resulting in financial compensation."
        - "Administrative law deals with the procedures and regulations of government agencies."
        - "Contract law is a subset of civil law."
    difficulty: "easy"
    tags: ["legal"]

  - id: q-d1-030
    domain: domain1
    question: "A Business Impact Analysis (BIA) should be performed:"
    options:
      - "Only after a major disaster has occurred"
      - "At the very beginning of the BCP process"
      - "By the IT department alone"
      - "Once every ten years"
    correct_answer: 1
    explanations:
      correct: "The BIA is a foundational step in BCP. It identifies critical functions and requirements, which informs the rest of the plan."
      incorrect:
        - "Waiting for a disaster is reactive; BCP/BIA is proactive."
        - "BIA requires input from business process owners across the whole organization, not just IT."
        - "Ten years is far too long; it should be reviewed regularly or when significant business changes occur."
    difficulty: "medium"
    tags: ["BCP", "BIA"]

  - id: q-d1-031
    domain: domain1
    question: "Which of the following is an example of 'Non-repudiation'?"
    options:
      - "A user logging in with a password"
      - "A digital signature on an email"
      - "An encrypted hard drive"
      - "A redundant power supply"
    correct_answer: 1
    explanations:
      correct: "A digital signature provides non-repudiation because it proves the sender's identity and that the message wasn't altered, so the sender cannot deny sending it."
      incorrect:
        - "Passwords can be shared or stolen, and don't provide strong non-repudiation on their own."
        - "Encryption provides confidentiality."
        - "Redundancy provides availability."
    difficulty: "medium"
    tags: ["CIA", "fundamentals"]

  - id: q-d1-032
    domain: domain1
    question: "What is the primary objective of 'Succession Planning'?"
    options:
      - "To ensure employees are promoted every two years"
      - "To identify and develop internal people with the potential to fill key leadership positions"
      - "To automate all executive decision-making"
      - "To reduce the salary of incoming managers"
    correct_answer: 1
    explanations:
      correct: "Succession planning ensures that if a key leader leaves, there is a trained and ready replacement to maintain continuity of operations."
      incorrect:
        - "It's about capability and readiness, not a guaranteed timeline for promotion."
        - "Automation cannot replace leadership."
        - "Succession planning is a continuity and talent management strategy, not a cost-cutting measure."
    difficulty: "easy"
    tags: ["governance", "personnel"]
