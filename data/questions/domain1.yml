  - id: q-d1-046
    domain: domain1
    question: "An organization performs a risk assessment and determines that a control costing $5,000/year reduces expected annual losses from $50,000 to $30,000. What is the value of this control?"
    options:
      - "The control has negative value — it costs more than it prevents"
      - "$15,000 — the control provides a net benefit of $15,000 per year"
      - "$20,000 reduction in risk but the control only costs $5,000, providing $15,000 net benefit"
      - "$50,000 — the full value of the protected asset"
    correct_answer: 2
    explanations:
      correct: "Control value = Risk Reduction - Control Cost. The control reduces losses by $20,000 ($50,000 - $30,000) and costs $5,000, providing a net annual benefit of $15,000. This cost-benefit analysis justifies implementing the control."
      incorrect:
        - "The control costs $5,000 but saves $20,000 — it has significant positive value."
        - "$15,000 net benefit is correct but this answer doesn't explain the calculation fully."
        - "$20,000 reduction minus $5,000 cost = $15,000 net benefit — this is the correct cost-benefit analysis."
        - "$50,000 is the total asset risk, not the value of the specific control."
    difficulty: "medium"
    tags: ["risk", "quantitative"]

