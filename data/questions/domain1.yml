  - id: q-d1-050
    domain: domain1
    question: "What is the key principle behind the concept of 'defense in depth'?"
    options:
      - "Using the single strongest security control available"
      - "Layering multiple independent security controls so that failure of one does not compromise the entire system"
      - "Defending only the most critical assets"
      - "Keeping security mechanisms secret to prevent attackers from understanding them"
    correct_answer: 1
    explanations:
