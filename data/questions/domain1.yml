  - id: q-d1-053
    domain: domain1
    question: "An organization calculates that a server valued at $500,000 would be 40% destroyed on average in a fire event, and fires are expected to occur approximately once every 10 years. What is the Annualized Loss Expectancy (ALE)?"
    options:
      - "$200,000"
      - "$500,000"
      - "$20,000"
      - "$50,000"
    correct_answer: 2
    explanations:
      correct: "SLE = Asset Value × Exposure Factor = $500,000 × 0.40 = $200,000. ARO = 1/10 = 0.1 (once every 10 years). ALE = SLE × ARO = $200,000 × 0.1 = $20,000."
      incorrect:
        - "$200,000 is the SLE (Single Loss Expectancy), not the ALE. The ALE accounts for how often the event occurs annually."
        - "$500,000 is the total asset value before applying the exposure factor — it ignores both the exposure factor and ARO."
        - "$20,000 is correct: ALE = SLE ($200,000) × ARO (0.1) = $20,000."
        - "$50,000 would result from incorrectly using ARO = 0.25 or misapplying the exposure factor."
    difficulty: "hard"
    tags: ["risk", "quantitative", "ALE"]

