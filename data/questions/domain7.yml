  - id: q-d7-033
    domain: domain7
    question: "During a forensic investigation, an analyst needs to collect RAM contents from a running system. According to the order of volatility, when should RAM be collected relative to hard disk imaging?"
    options:
      - "After imaging the hard disk, because disk data is more important"
      - "Before imaging the hard disk, because RAM is more volatile and will be lost on shutdown"
      - "Simultaneously with disk imaging using automated tools"
      - "RAM collection is unnecessary if the disk contains log files"
    correct_answer: 1
    explanations:
      correct: "The order of volatility requires collecting the most transient evidence first. RAM contents are lost immediately when power is removed and contain critically valuable data: running processes, network connections, decrypted content, malware in memory, passwords, and encryption keys. Hard disk data persists — it can be imaged after volatile data is captured."
      incorrect:
        - "Imaging the hard disk first is incorrect — disk data persists, but RAM is lost on shutdown. Volatile data must always be collected first."
        - "Collecting RAM before disk imaging to preserve volatile evidence is the correct approach per the order of volatility."
        - "Simultaneous collection is impractical and unnecessary — the order of volatility provides a clear prioritization sequence."
        - "Log files on disk persist and can be collected later — RAM contains evidence not found anywhere else (live network connections, decrypted data, running malware)."
    difficulty: "easy"
    tags: ["forensics", "evidence", "volatility"]

  - id: q-d7-034
    domain: domain7
    question: "An organization's IDS generates 500 alerts per day, of which only 3 are actual incidents. Security analysts are overwhelmed and begin ignoring low-priority alerts. This describes which security operations problem?"
    options:
      - "High false negative rate"
      - "Alert fatigue"
      - "Signature drift"
      - "Detection gap"
    correct_answer: 1
    explanations:
      correct: "Alert fatigue occurs when the volume of security alerts — especially false positives — overwhelms analysts, causing them to become desensitized and begin ignoring or quickly dismissing alerts without proper investigation. This dramatically increases the risk that real incidents are missed. The solution requires tuning, automation, and proper alert prioritization."
      incorrect:
        - "A high false negative rate means the IDS is missing attacks — the described scenario has a high false positive rate (many alerts, few real incidents). Alert fatigue is the human consequence of this."
        - "Alert fatigue (analyst desensitization from overwhelming alert volume) is the correct answer."
        - "Signature drift is not a standard security term — the described problem is about alert volume overwhelming analysts."
        - "Detection gap refers to attacks going undetected — the scenario describes detected alerts being ignored due to volume, which is alert fatigue."
    difficulty: "easy"
    tags: ["operations", "monitoring", "alert-fatigue"]

  - id: q-d7-035
    domain: domain7
    question: "Which NIST incident response phase involves activities such as implementing patches, removing malware, and closing attacker-created backdoors?"
    options:
      - "Containment"
      - "Recovery"
      - "Eradication"
      - "Post-Incident Activity"
    correct_answer: 2
    explanations:
      correct: "Eradication is the phase where the root cause of the incident is removed: deleting malware, closing backdoors, patching vulnerabilities exploited during the incident, removing unauthorized accounts. Eradication follows Containment (limiting spread) and precedes Recovery (restoring normal operations). Thorough eradication is critical — skipping it leads to reinfection."
      incorrect:
        - "Containment limits the spread and impact of the incident — it does not remove the threat. Containment might involve isolating systems or blocking network access."
        - "Recovery restores systems to normal operations after eradication — it involves restoring from backups, validating system integrity, and monitoring for recurrence."
        - "Eradication (removing malware, patches, closing backdoors) is the correct NIST IR phase."
        - "Post-Incident Activity involves lessons learned, documentation, and process improvement — it occurs after recovery is complete."
