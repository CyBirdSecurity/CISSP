  - id: q-d7-039
    domain: domain7
    question: "Chain of custody is broken when which of the following occurs during a forensic investigation?"
    options:
      - "Evidence is analyzed by a different analyst than who collected it"
      - "Evidence changes hands without proper documentation"
      - "Evidence is stored in a refrigerated environment"
      - "Multiple copies of digital evidence are created"
    correct_answer: 1
    explanations:
      correct: "Chain of custody documents every transfer, access, and handling of evidence. When evidence changes hands without documentation (who received it, when, under what conditions), the chain is broken. A broken chain of custody can make evidence inadmissible in legal proceedings because the integrity of the evidence can no longer be proven."
      incorrect:
        - "Different analysts handling evidence is normal in investigations — what matters is that each transfer is properly documented to maintain the chain of custody."
        - "Evidence changing hands without proper documentation breaks chain of custody — this is the correct answer."
        - "Proper storage conditions (including refrigeration for physical evidence) support evidence integrity — this does not break chain of custody."
        - "Creating multiple forensic copies (working copies vs. master copy with hash verification) is standard practice and does not break chain of custody if properly documented."
