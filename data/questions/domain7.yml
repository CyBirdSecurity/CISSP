  - id: q-d7-029
    domain: domain7
    question: "What is 'mean time to detect' (MTTD) and why is it an important security metric?"
    options:
      - "The average time for hardware to fail — important for availability planning"
      - "The average time between when a breach occurs and when it is discovered — lower values indicate faster detection and less attacker dwell time"
      - "The time required to deploy security patches — important for vulnerability management"
      - "The average duration of security incidents — important for staffing security operations"
    correct_answer: 1
    explanations:
      correct: "MTTD measures how long attackers dwell in a network before detection. Industry reports (IBM Cost of a Data Breach) show average dwell times exceed 200 days — longer dwell time = more damage and higher breach cost. Improving MTTD through better detection (SIEM, EDR, threat hunting) reduces attacker impact."
      incorrect:
        - "Hardware failure timing is MTBF — MTTD is a security detection metric."
        - "Average time from breach to discovery, with lower values indicating faster detection — this correctly describes MTTD."
        - "Patch deployment time is a vulnerability management metric (SLA compliance) — not MTTD."
        - "Incident duration is a separate metric — MTTD specifically measures the initial detection delay."
