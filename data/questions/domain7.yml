questions:
  - id: q-d7-001
    domain: domain7
    question: "What is the correct order of NIST's incident response phases?"
    options:
      - "Detection, Preparation, Containment, Eradication, Recovery, Post-Incident"
      - "Preparation, Detection & Analysis, Containment, Eradication, Recovery, Post-Incident Activity"
      - "Identification, Containment, Eradication, Recovery, Lessons Learned"
      - "Triage, Investigation, Containment, Resolution, Reporting"
    correct_answer: 1
    explanations:
      correct: "NIST SP 800-61 defines six phases: 1) Preparation, 2) Detection & Analysis, 3) Containment, 4) Eradication, 5) Recovery, 6) Post-Incident Activity (lessons learned). Preparation enables all other phases."
      incorrect:
        - "Preparation must come first — you cannot detect before you're prepared. Also, these aren't the correct NIST phase names."
        - "NIST's six phases are: Preparation, Detection & Analysis, Containment, Eradication, Recovery, Post-Incident Activity."
        - "This describes the SANS/PICERL model (Preparation, Identification, Containment, Eradication, Recovery, Lessons Learned), not NIST."
        - "Triage, Investigation, etc. is not a recognized standard incident response methodology."
    difficulty: "medium"
    tags: ["incident-response", "NIST"]

  - id: q-d7-002
    domain: domain7
    question: "During a digital forensics investigation, why must evidence be collected in order of volatility?"
    options:
      - "To minimize storage space requirements"
      - "To ensure the most transient data is captured before it's lost"
      - "To comply with chain of custody requirements"
      - "To prioritize the most important evidence first"
    correct_answer: 1
    explanations:
      correct: "Volatile data (RAM, CPU registers, network connections) disappears when power is lost or the system is rebooted. Collecting in order of volatility ensures transient data is captured first before it is lost. Non-volatile data (disk) persists and can be collected later."
      incorrect:
        - "Volatility order is about data persistence, not storage efficiency."
        - "Capturing transient data before it's lost is the correct reason for collecting in order of volatility."
        - "Chain of custody is maintained throughout all collection — it is not the reason for the volatility order."
        - "Importance is not the determining factor — volatility (how quickly data disappears) is."
    difficulty: "medium"
    tags: ["forensics", "evidence"]

  - id: q-d7-003
    domain: domain7
    question: "What is the primary purpose of 'chain of custody' in digital forensics?"
    options:
      - "To speed up the investigation process"
      - "To document the handling of evidence to maintain its integrity and admissibility"
      - "To determine the financial cost of a security incident"
      - "To establish which system was attacked first"
    correct_answer: 1
    explanations:
      correct: "Chain of custody documents everyone who handled evidence, when, and how. This maintains evidence integrity and ensures it is admissible in legal proceedings. A broken chain of custody can result in evidence being rejected in court."
      incorrect:
        - "Chain of custody adds procedural requirements — it may slow the investigation but ensures legal admissibility."
        - "Documenting handling to maintain integrity and admissibility is the primary purpose of chain of custody."
        - "Incident cost/impact analysis is a separate process from chain of custody documentation."
        - "Attack timeline reconstruction is done during the investigation — chain of custody is about evidence handling procedures."
    difficulty: "easy"
    tags: ["forensics", "evidence"]

  - id: q-d7-004
    domain: domain7
    question: "An organization wants to recover IT systems as quickly as possible after a disaster and money is not a concern. Which recovery site option is most appropriate?"
    options:
      - "Cold site"
      - "Warm site"
      - "Hot site"
      - "Mobile site"
    correct_answer: 2
    explanations:
      correct: "A hot site is the most expensive option but provides the fastest recovery (minutes to hours) because it maintains real-time or near-real-time data replication and has all hardware, software, and networking pre-configured and ready."
      incorrect:
        - "A cold site has only basic infrastructure (power, space) — everything else must be provisioned, resulting in days to weeks of recovery time."
        - "A warm site has hardware ready but requires data restoration from backups — typically hours to days of recovery time."
        - "A hot site is the fastest recovery option when cost is not a constraint."
        - "A mobile site is a portable solution useful for flexible deployment but generally not faster than a pre-configured hot site."
    difficulty: "easy"
    tags: ["DRP", "recovery-sites"]

  - id: q-d7-005
    domain: domain7
    question: "What is the purpose of 'mandatory vacation' (forced leave) as a security control?"
    options:
      - "To improve employee wellness and reduce burnout"
      - "To detect fraud by requiring another person to perform a role, potentially uncovering irregularities"
      - "To cross-train staff on multiple job functions"
      - "To comply with labor law requirements"
    correct_answer: 1
    explanations:
      correct: "The primary security purpose of mandatory vacation is fraud detection. Many fraud schemes require continuous access to cover tracks. When someone else performs the role during forced absence, they may discover irregularities. This deters and detects fraud."
      incorrect:
        - "Employee wellness may be a benefit, but it is not the security purpose of mandatory vacation."
        - "Fraud detection through forced review of an employee's work is the security purpose of mandatory vacation."
        - "Cross-training is a benefit and side effect, but fraud detection is the primary security rationale."
        - "Legal compliance may be required in some jurisdictions, but the security purpose is fraud detection."
    difficulty: "medium"
    tags: ["operations", "controls", "fraud"]

  - id: q-d7-006
    domain: domain7
    question: "An organization's availability calculation shows 99.9% uptime. Approximately how much downtime does this allow per year?"
    options:
      - "About 5 minutes"
      - "About 52 minutes"
      - "About 8.7 hours"
      - "About 3.65 days"
    correct_answer: 2
    explanations:
      correct: "99.9% uptime ('three nines') = 0.1% downtime per year. 0.001 × 365.25 days × 24 hours = approximately 8.76 hours per year (or ~526 minutes). For comparison: 99.99% = ~52 minutes/year, 99.999% = ~5 minutes/year."
      incorrect:
        - "About 5 minutes per year corresponds to 99.999% ('five nines') uptime, not 99.9%."
        - "About 52 minutes per year corresponds to 99.99% ('four nines') uptime, not 99.9%."
        - "99.9% uptime allows approximately 8.76 hours of downtime per year — this is correct."
        - "About 3.65 days corresponds to approximately 99% uptime, not 99.9%."
    difficulty: "hard"
    tags: ["availability", "metrics"]

  - id: q-d7-007
    domain: domain7
    question: "What is the primary purpose of patch management?"
    options:
      - "Adding new features to software"
      - "Remediating known security vulnerabilities and software defects"
      - "Monitoring system performance"
      - "Backing up system configurations"
    correct_answer: 1
    explanations:
      correct: "Patch management ensures that known security vulnerabilities and software defects are remediated promptly. Unpatched systems are a primary attack vector — major incidents like WannaCry exploited a known, patchable vulnerability (MS17-010)."
      incorrect:
        - "Adding new features is software development/updates — patch management focuses on fixing existing issues."
        - "Remediating vulnerabilities and defects is the primary purpose of patch management."
        - "System performance monitoring is a separate function — patch management is about fixing known issues."
        - "Configuration backup is part of change/configuration management, not patch management."
    difficulty: "easy"
    tags: ["patch-management", "operations"]

  - id: q-d7-008
    domain: domain7
    question: "What is 'separation of duties' in the context of security operations?"
    options:
      - "Having different teams handle different types of security incidents"
      - "Dividing critical functions so no single person can complete a sensitive action or transaction alone"
      - "Separating development and production environments"
      - "Using different tools for detection and response"
    correct_answer: 1
    explanations:
      correct: "Separation of duties divides critical functions among multiple people to prevent fraud, errors, and misuse. No single person can complete a sensitive action alone. Example: The person who initiates a change should not be the same person who approves and implements it."
      incorrect:
        - "Having different incident response teams is specialization, not separation of duties."
        - "Dividing critical functions so no single person can act alone — this correctly describes separation of duties."
        - "Separating dev and production is environment separation, which is related but not the definition of SoD."
        - "Using different security tools is a defense-in-depth approach, not separation of duties."
    difficulty: "easy"
    tags: ["operations", "controls"]

  - id: q-d7-009
    domain: domain7
    question: "During the containment phase of incident response, what is the primary objective?"
    options:
      - "Identifying all affected systems and determining root cause"
      - "Limiting the spread and impact of the incident while preserving evidence"
      - "Returning all systems to normal operations"
      - "Notifying regulatory authorities of the breach"
    correct_answer: 1
    explanations:
      correct: "The containment phase aims to limit the spread and impact of the incident (stop the bleeding) while preserving evidence for investigation. Containment may involve isolating systems, blocking network traffic, or taking affected systems offline."
      incorrect:
        - "Identifying affected systems and root cause is part of Detection & Analysis — containment comes after initial detection."
        - "Limiting spread while preserving evidence is the correct objective of the containment phase."
        - "Returning systems to normal operations is the Recovery phase, which comes after Eradication."
        - "Regulatory notification may be required but is not the primary containment objective — stopping spread is."
    difficulty: "medium"
    tags: ["incident-response", "containment"]

  - id: q-d7-010
    domain: domain7
    question: "What is MTBF and how does it relate to system availability?"
    options:
      - "Mean Time Before Failure — lower is better for availability"
      - "Mean Time Between Failures — higher means more reliable, improving availability"
      - "Maximum Time Before Failover — minimum acceptable uptime"
      - "Mean Time to Backup Files — how often data is backed up"
    correct_answer: 1
    explanations:
      correct: "MTBF (Mean Time Between Failures) measures the average time a system runs before failing. Higher MTBF = more reliable system. Availability = MTBF / (MTBF + MTTR). To improve availability, organizations increase MTBF (better hardware) or decrease MTTR (faster repairs)."
      incorrect:
        - "MTBF stands for Mean Time Between Failures, not 'Before.' And higher (not lower) MTBF is desirable."
        - "Mean Time Between Failures — higher is better, improving availability — this is correct."
        - "MTBF is not about failover thresholds or minimum uptime targets."
        - "MTBF measures hardware reliability between failures, not backup frequency."
    difficulty: "medium"
    tags: ["availability", "metrics"]

  - id: q-d7-011
    domain: domain7
    question: "What is 'job rotation' as a security control and what is its primary security benefit?"
    options:
      - "Assigning multiple roles simultaneously to cross-train employees"
      - "Periodically moving employees between roles to detect fraud and reduce key-person dependency"
      - "Rotating encryption keys on a regular schedule"
      - "Changing system administrator passwords on a regular basis"
    correct_answer: 1
    explanations:
      correct: "Job rotation periodically moves employees between roles. The primary security benefit is fraud detection — the incoming person may discover irregularities left by the previous person. It also reduces key-person dependency and provides cross-training."
      incorrect:
        - "Holding multiple roles simultaneously is not job rotation — rotation involves sequential, not simultaneous, role assignments."
        - "Periodically moving employees to detect fraud and reduce dependency is the correct description of job rotation."
        - "Encryption key rotation is a cryptographic key management practice, not job rotation."
        - "Password rotation is an account management control, not job rotation."
    difficulty: "easy"
    tags: ["operations", "controls", "fraud"]

  - id: q-d7-012
    domain: domain7
    question: "What document should be completed after every security incident to improve future response?"
    options:
      - "Incident response plan"
      - "Lessons learned report"
      - "Business impact analysis"
      - "Risk register"
    correct_answer: 1
    explanations:
      correct: "A lessons learned report (post-incident review) is completed after every incident to document what happened, what was done well, what could be improved, and what changes are needed. This is the Post-Incident Activity phase in NIST's model."
      incorrect:
        - "The incident response plan is prepared before incidents — it is not created after each incident."
        - "A lessons learned report is the document completed after each incident to drive improvement."
        - "A BIA is a planning document for business continuity — not a post-incident review document."
        - "A risk register tracks ongoing risks — it is not specifically created after each incident."
    difficulty: "easy"
    tags: ["incident-response", "post-incident"]

  - id: q-d7-013
    domain: domain7
    question: "What is the primary purpose of 'network-based intrusion prevention systems' (NIPS) compared to network-based IDS (NIDS)?"
    options:
      - "NIPS only detects threats; NIDS detects and blocks them"
      - "NIPS actively blocks or drops malicious traffic inline; NIDS only detects and alerts"
      - "NIPS monitors host activity; NIDS monitors network traffic"
      - "NIPS uses signature detection; NIDS uses anomaly detection"
    correct_answer: 1
    explanations:
      correct: "A NIDS (Network Intrusion Detection System) sits out-of-band and generates alerts when suspicious traffic is detected — it cannot block traffic. A NIPS (Network Intrusion Prevention System) sits inline and can actively drop malicious packets, reset connections, or block traffic in real time, not just alert."
      incorrect:
        - "This is reversed — NIDS only detects; NIPS detects and can actively block."
        - "NIPS blocks inline; NIDS only detects and alerts — this correctly distinguishes them."
        - "Host-based IDS/IPS (HIDS/HIPS) monitors host activity — both NIDS and NIPS monitor network traffic."
        - "Both NIDS and NIPS can use signature-based and anomaly-based detection — detection method is not the distinguishing factor."
    difficulty: "easy"
    tags: ["IDS", "IPS", "monitoring"]

  - id: q-d7-014
    domain: domain7
    question: "What is 'media management' in security operations and why is it important?"
    options:
      - "Managing social media accounts for the security team"
      - "Controlling the handling, storage, labeling, transportation, and disposal of storage media to prevent unauthorized data access"
      - "Managing video surveillance systems for physical security"
      - "Tracking all software media licenses for compliance"
    correct_answer: 1
    explanations:
      correct: "Media management governs the entire lifecycle of storage media — labeling by classification, secure storage, access controls, transportation procedures, and sanitization/destruction at end of life. Poor media management is a leading cause of data breaches (lost/stolen laptops, improperly disposed drives)."
      incorrect:
        - "Social media management is a communications/marketing function — media management in security concerns storage media."
        - "Controlling storage media handling, labeling, transportation, and disposal is the correct description of media management."
        - "Video surveillance is a physical security control — media management concerns data storage media."
        - "Software license management is an IT asset management function — media management is about physical storage media security."
    difficulty: "easy"
    tags: ["operations", "media"]

  - id: q-d7-015
    domain: domain7
    question: "What is 'configuration management' and how does it support security operations?"
    options:
      - "Managing the organization's data center floor layout"
      - "Identifying, controlling, and tracking changes to system configurations to maintain security baselines and prevent unauthorized modifications"
      - "Configuring network routers and switches during installation"
      - "Managing user account configurations and password policies"
    correct_answer: 1
    explanations:
      correct: "Configuration management (CM) establishes and maintains baseline configurations, controls changes through change management, and detects unauthorized deviations (configuration drift). Security benefits: known-good configurations reduce attack surface, unauthorized changes indicate potential compromise, and compliance audits can verify settings."
      incorrect:
        - "Data center floor layout is facilities management — configuration management concerns system and software settings."
        - "Controlling and tracking system configuration changes to maintain security baselines is the correct description of CM."
        - "Initial device configuration is installation — CM manages the ongoing configuration state and changes over the system's lifetime."
        - "User account and password policy configuration is IAM — CM broadly covers all system configuration settings."
    difficulty: "medium"
    tags: ["operations", "configuration"]

  - id: q-d7-016
    domain: domain7
    question: "What is the purpose of 'data backup' verification testing?"
    options:
      - "To verify that backup software is properly licensed"
      - "To confirm that backups are complete, uncorrupted, and can actually be restored to meet RTO and RPO requirements"
      - "To check that backup media is physically stored in a secure location"
      - "To measure the time it takes to create a backup"
    correct_answer: 1
    explanations:
      correct: "Many organizations discover their backups are corrupt or incomplete only when they try to restore during a disaster. Regular restoration testing (not just backup completion) verifies recoverability, tests that the restore meets RPO (data loss) and RTO (time) targets, and validates the DR procedure. 'Backup without restore testing is not a backup.'"
      incorrect:
        - "Software licensing is a compliance concern — backup verification is about confirming recoverability."
        - "Confirming backups are complete, uncorrupted, and restorable within RTO/RPO targets is the correct purpose of backup verification."
        - "Physical security of backup media is a separate control — verification tests the actual ability to restore data."
        - "Backup duration is a performance metric — verification tests whether restored data is usable and complete."
    difficulty: "easy"
    tags: ["DRP", "backup"]

  - id: q-d7-017
    domain: domain7
    question: "What is 'Indicators of Compromise' (IOC) and how are they used in security operations?"
    options:
      - "Legal indicators used to prosecute cybercriminals"
      - "Artifacts or evidence that suggest a system has been breached — used to detect, investigate, and respond to incidents"
      - "Metrics measuring the effectiveness of security controls"
      - "Warning signs that an employee is a potential insider threat"
    correct_answer: 1
    explanations:
      correct: "IOCs are forensic artifacts indicating a compromise — malicious IP addresses, domain names, file hashes, registry keys, behavioral patterns. They are shared via threat intelligence feeds (STIX/TAXII) and loaded into SIEMs, firewalls, and EDR tools to detect and block known-bad activity. IOCs are reactive; TTPs are more proactive."
      incorrect:
        - "IOCs are technical/forensic artifacts — legal indicators for prosecution are evidence handled through legal processes."
        - "Artifacts indicating a breach, used for detection and response, is the correct description of IOCs."
        - "Security effectiveness metrics are KPIs — IOCs are specific threat indicators."
        - "Insider threat behavioral indicators are a separate concept (behavioral analytics) — IOCs are technical artifacts from compromised systems."
    difficulty: "medium"
    tags: ["IOC", "incident-response"]

  - id: q-d7-018
    domain: domain7
    question: "What is 'change management' in security operations and why is it important?"
    options:
      - "Managing organizational leadership transitions"
      - "A formal process for requesting, reviewing, approving, testing, and documenting changes to systems to prevent unauthorized or untested changes that could introduce vulnerabilities"
      - "Updating security policies to reflect new regulations"
      - "Replacing outdated security tools with newer ones"
    correct_answer: 1
    explanations:
      correct: "Change management (change control) ensures all changes to production systems are properly requested, risk-assessed, approved, tested in non-production first, implemented with rollback plans, and documented. Unauthorized changes are a leading cause of security incidents and outages — change management provides oversight and accountability."
      incorrect:
        - "Organizational leadership transitions are HR/executive management — change management in security operations is about system changes."
        - "Formal process for requesting, approving, testing, and documenting system changes to prevent unauthorized/risky modifications — this is correct."
        - "Policy updates follow governance processes — change management in operations governs technical system changes."
        - "Replacing tools is a project/procurement activity — change management governs the process of any change to production systems."
    difficulty: "medium"
    tags: ["operations", "change-management"]

  - id: q-d7-019
    domain: domain7
    question: "What is a 'cold site' recovery facility and when would an organization choose it over a hot site?"
    options:
      - "A secure server room kept at a low temperature — chosen for sensitive hardware"
      - "A facility with basic infrastructure (power, space, connectivity) but no pre-configured systems — chosen when cost savings outweigh rapid recovery needs"
      - "A cloud-based recovery solution — chosen for flexibility"
      - "A mobile recovery unit that can be deployed anywhere — chosen for remote locations"
    correct_answer: 1
    explanations:
      correct: "A cold site has only basic infrastructure — power, HVAC, floor space, and connectivity — with no pre-installed hardware or data. Recovery takes days to weeks as equipment must be procured/shipped and restored. Organizations choose cold sites when they need the lowest cost option and their MTD allows for extended recovery time."
      incorrect:
        - "Temperature control of server hardware is a data center facility feature — cold site refers to the level of preparedness, not temperature."
        - "Basic infrastructure only with cost-driven selection when extended recovery is acceptable — this correctly describes a cold site."
        - "Cloud recovery solutions are a separate category (DRaaS) — a cold site is a physical facility."
        - "Mobile recovery units are a separate category — cold sites are fixed physical locations."
    difficulty: "easy"
    tags: ["DRP", "recovery-sites"]

  - id: q-d7-020
    domain: domain7
    question: "What is 'asset inventory' management and why is it foundational to security operations?"
    options:
      - "Tracking the financial value of IT equipment for accounting purposes"
      - "Maintaining an accurate record of all hardware, software, and data assets — foundational because you cannot protect what you don't know exists"
      - "Managing software licenses to prevent audits"
      - "Tracking employee productivity using asset usage data"
    correct_answer: 1
    explanations:
      correct: "Asset inventory is foundational to security because every security control (patching, vulnerability scanning, access control, monitoring) requires knowing what assets exist. Unknown assets (shadow IT, forgotten servers) cannot be patched, monitored, or controlled — they become entry points for attackers. 'You can't protect what you don't know about.'"
      incorrect:
        - "Financial tracking of IT equipment is an accounting/asset management function — security asset inventory focuses on security visibility."
        - "Maintaining accurate records of all assets as the foundation for all other security controls — this is correct."
        - "License compliance is an IT asset management concern — security asset inventory is about security visibility, not just licensing."
        - "Productivity tracking is an HR concern — asset inventory is about knowing what needs to be protected."
    difficulty: "easy"
    tags: ["operations", "inventory"]

  - id: q-d7-021
    domain: domain7
    question: "What is the purpose of 'disaster recovery testing' beyond simple backup restoration?"
    options:
      - "To satisfy insurance requirements for data protection"
      - "To validate that DR plans work, systems can be recovered within RTO/RPO targets, staff know their roles, and gaps are identified before a real disaster"
      - "To train new IT staff on data center operations"
      - "To identify which systems are most vulnerable to hardware failure"
    correct_answer: 1
    explanations:
      correct: "DR testing validates the entire recovery process — not just backup restoration. It tests that recovery procedures work, recovery time meets the RTO, recovered data meets RPO, staff can execute the plan under stress, and dependencies (network, DNS, external services) are accounted for. Untested DR plans frequently fail in real disasters."
      incorrect:
        - "Insurance requirements may require testing but are not the primary purpose — actual operational recovery capability is."
        - "Validating plans, RTO/RPO targets, staff readiness, and gap identification — this correctly describes the purpose of DR testing."
        - "Staff training is a side benefit — DR testing's primary purpose is validating recovery capability."
        - "Hardware failure risk is identified through reliability analysis and monitoring — DR testing validates recovery from failure, not prediction of failure."
    difficulty: "medium"
    tags: ["DRP", "testing"]

  - id: q-d7-022
    domain: domain7
    question: "What is 'separation of environments' in security operations?"
    options:
      - "Using different physical data centers for different business units"
      - "Maintaining distinct development, testing/staging, and production environments with strict controls on what can flow between them"
      - "Separating the IT department from the security team organizationally"
      - "Running different operating systems on different servers"
    correct_answer: 1
    explanations:
      correct: "Development, staging/UAT, and production environments should be isolated with controls on what can be promoted between them. This prevents developer access to production data, ensures code is tested before deployment, and limits blast radius of development mistakes. Production data should not be used in development without masking."
      incorrect:
        - "Physical data center separation is a DR/availability concern — environment separation is about lifecycle stages (dev/test/prod)."
        - "Separate dev/test/prod environments with promotion controls — this correctly describes separation of environments."
        - "IT and security team organizational structure is a governance concern — environment separation is an operational IT practice."
        - "OS diversity is security-through-heterogeneity — environment separation is about code and data lifecycle management."
    difficulty: "easy"
    tags: ["operations", "SDLC"]

  - id: q-d7-023
    domain: domain7
    question: "What is 'data backup rotation' and what scheme is commonly used for offsite backup management?"
    options:
      - "Rotating backup media between multiple tape drives to extend their lifespan"
      - "Systematically cycling backup media to enable point-in-time restoration — the Grandfather-Father-Son (GFS) scheme is commonly used"
      - "Automatically rotating encryption keys used to protect backup data"
      - "Sending backups to multiple cloud providers in rotation"
    correct_answer: 1
    explanations:
      correct: "Backup rotation manages multiple backup generations for different retention periods. The Grandfather-Father-Son (GFS) scheme uses: daily (son) backups retained for a week, weekly (father) backups retained for a month, and monthly (grandfather) backups retained for a year. This enables recovery to many different points in time with manageable storage."
      incorrect:
        - "Tape drive hardware rotation extends media lifespan but is not what backup rotation means in strategy terms."
        - "Cycling backup media for point-in-time restoration using GFS is the correct description of backup rotation."
        - "Encryption key rotation is a separate security practice — backup rotation concerns the backup media/copies themselves."
        - "Multi-cloud backup distribution is a resilience strategy — GFS rotation manages retention periods, not cloud providers."
    difficulty: "medium"
    tags: ["backup", "DRP"]

  - id: q-d7-024
    domain: domain7
    question: "What is a 'playbook' in incident response?"
    options:
      - "A general security policy document"
      - "A predefined, step-by-step procedure for responding to a specific type of security incident"
      - "A training manual for new security analysts"
      - "A log of all previous security incidents"
    correct_answer: 1
    explanations:
      correct: "An incident response playbook is a documented, step-by-step procedure for responding to a specific incident type (ransomware, phishing, DDoS, insider threat). It defines who does what, in what order, with specific tools and commands. Playbooks enable consistent, faster response and can be automated in SOAR platforms."
      incorrect:
        - "A general security policy document is broad — a playbook is incident-type specific and procedural."
        - "Predefined step-by-step procedures for a specific incident type — this correctly describes an incident response playbook."
        - "Training manuals provide general knowledge — playbooks are operational procedures executed during real incidents."
        - "Incident logs record past incidents — playbooks guide future response."
    difficulty: "easy"
    tags: ["incident-response", "playbook"]

  - id: q-d7-025
    domain: domain7
    question: "What is the purpose of 'log integrity' controls in security operations?"
    options:
      - "To ensure logs are stored in the most efficient format"
      - "To prevent attackers from modifying or deleting logs to cover their tracks, preserving evidence for investigation"
      - "To automatically analyze logs for performance issues"
      - "To compress logs for long-term archival storage"
    correct_answer: 1
    explanations:
      correct: "Log integrity ensures that log records cannot be tampered with or deleted after the fact — preventing attackers from covering their tracks. Controls include: write-once storage, centralized log collection (separate from compromised systems), cryptographic signing of log entries, and immutable cloud storage. Without integrity, logs cannot be trusted as evidence."
      incorrect:
        - "Log storage efficiency is a capacity planning concern — log integrity protects the evidentiary value of logs."
        - "Preventing attacker modification/deletion of logs to preserve evidence is the correct purpose of log integrity controls."
        - "Automated log analysis is a SIEM function — log integrity protects the underlying log data from tampering."
        - "Log compression is a storage optimization — log integrity ensures logs haven't been altered."
    difficulty: "medium"
    tags: ["logs", "forensics"]

  - id: q-d7-026
    domain: domain7
    question: "What is 'Continuity of Operations Planning' (COOP) and how does it differ from Disaster Recovery Planning (DRP)?"
    options:
      - "They are the same — both plans address the same scenarios"
      - "COOP focuses on maintaining essential business functions during and after any disruption (personnel, processes, technology); DRP focuses specifically on IT system recovery"
      - "DRP is for natural disasters; COOP is for cyberattacks"
      - "COOP is required by law; DRP is voluntary"
    correct_answer: 1
    explanations:
      correct: "COOP is a broader plan ensuring essential functions continue — covering people, alternate work sites, succession, communications, and vital records regardless of disruption type. DRP is a technical subset of BCP/COOP specifically addressing IT system and data recovery. DRP supports COOP's technology requirements."
      incorrect:
        - "They address different scopes — COOP is operational continuity; DRP is IT system recovery."
        - "COOP ensures essential business functions continue (people/processes/technology); DRP specifically addresses IT system recovery — this correctly distinguishes them."
        - "Both plans address all types of disruptions — neither is limited to a specific threat type."
        - "Both may be required by regulation in different industries — neither is universally mandatory or voluntary."
