  - id: q-d7-037
    domain: domain7
    question: "In the Cyber Kill Chain framework, which stage involves the attacker establishing a persistent communication channel back to their infrastructure?"
    options:
      - "Delivery"
      - "Exploitation"
      - "Installation"
      - "Command and Control (C2)"
    correct_answer: 3
    explanations:
      correct: "Command and Control (C2) is the sixth stage of the Cyber Kill Chain, where the attacker establishes a persistent communication channel with the compromised system. This allows them to remotely control the implant, execute commands, exfiltrate data, and move to the 'Actions on Objectives' phase. C2 channels often use HTTPS, DNS tunneling, or other evasion techniques."
      incorrect:
        - "Delivery (stage 3) is how the weapon reaches the target — email, USB, watering hole. It precedes exploitation."
        - "Exploitation (stage 4) is the trigger that executes the exploit code — it does not establish the persistent communication channel."
        - "Installation (stage 5) installs a persistent implant/backdoor on the system — but the C2 channel is established in the next stage."
        - "Command and Control (establishing the persistent communication channel) is the correct Kill Chain stage."
