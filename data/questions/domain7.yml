    tags: ["BCP", "DRP", "continuity"]

  - id: q-d7-027
    domain: domain7
    question: "What is 'data replication' versus 'data backup' as resilience strategies?"
    options:
      - "They are equivalent — both protect data equally against all failure scenarios"
      - "Replication provides real-time or near-real-time copies for rapid failover; backup creates point-in-time copies for recovery from corruption, ransomware, or accidental deletion"
      - "Backup is faster to restore than replication"
      - "Replication protects against hardware failure; backup protects against site disasters"
    correct_answer: 1
    explanations:
      correct: "Replication continuously copies data to another location for high availability and fast failover — but if data is corrupted or encrypted by ransomware, the corruption is also replicated. Backups create periodic point-in-time copies that are retained, enabling recovery from events that corrupt all copies. Both strategies are needed for complete resilience."
      incorrect:
        - "They are not equivalent — replication replicates corruption; backups retain clean historical copies. Both are needed."
        - "Replication for rapid failover; backups for corruption/ransomware/deletion recovery — this correctly distinguishes them."
        - "Replication can provide near-instant failover (faster than restoring from backup) — restoration speed favors replication, not backup."
        - "Both replication and backup can protect against hardware failure and site disasters depending on configuration — the real distinction is about ransomware/corruption resilience."
    difficulty: "hard"
    tags: ["DRP", "backup", "replication"]

  - id: q-d7-028
    domain: domain7
    question: "What is the 'eradication' phase of incident response focused on?"
    options:
