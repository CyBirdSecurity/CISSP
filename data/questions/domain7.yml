      - "Collecting forensic evidence from compromised systems"
    correct_answer: 1
    explanations:
      correct: "The eradication phase removes the cause of the incident — deleting malware, removing unauthorized accounts and backdoors, closing exploit vectors, and ensuring the threat actor's persistence mechanisms are eliminated from all affected systems. Incomplete eradication leads to re-infection and incident recurrence."
      incorrect:
        - "Stakeholder and regulatory notification happens during containment and as a continuous activity — eradication focuses on technical removal of the threat."
        - "Removing the threat actor's access, malware, and persistence mechanisms — this correctly describes the eradication phase."
        - "Restoring systems to normal operations is the Recovery phase — eradication removes the threat before recovery begins."
        - "Forensic evidence collection occurs during Detection & Analysis and Containment — before eradication."
