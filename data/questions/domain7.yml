      - "NTP prevents replay attacks by generating time-based tokens"
      - "Accurate time is required for certificate validity checking and Kerberos authentication"
    correct_answer: 1
    explanations:
      correct: "Accurate, synchronized time (via NTP) ensures that logs from different systems (firewalls, servers, workstations) have consistent timestamps, enabling SIEM correlation of events into accurate attack timelines. Time discrepancies make forensic investigation extremely difficult. NTP authentication (NTPsec) prevents NTP poisoning attacks."
      incorrect:
