  - id: q-d7-049
    domain: domain7
    question: "MTBF is used to calculate system availability using which formula?"
    options:
      - "Availability = MTTR / (MTBF + MTTR)"
      - "Availability = MTBF / (MTBF + MTTR)"
      - "Availability = MTBF × MTTR"
      - "Availability = 1 - (MTTR / MTBF)"
    correct_answer: 1
    explanations:
      correct: "Availability = MTBF / (MTBF + MTTR). If a system fails once every 1000 hours (MTBF = 1000h) and takes 10 hours to repair (MTTR = 10h), availability = 1000 / (1000 + 10) = 99.0%. To improve availability: increase MTBF (more reliable components, redundancy) and decrease MTTR (faster repair through spares, good documentation, trained staff)."
      incorrect:
        - "MTTR / (MTBF + MTTR) would give the unavailability (fraction of time the system is down) — not availability."
        - "MTBF / (MTBF + MTTR) is the correct formula for system availability."
        - "Availability is a ratio (dimensionless percentage) — multiplying MTBF × MTTR gives units of hours squared, which is meaningless as an availability metric."
        - "1 - (MTTR/MTBF) is an approximation that doesn't equal the actual formula when MTTR is significant relative to MTBF."
    difficulty: "hard"
    tags: ["metrics", "availability", "BCP"]

  - id: q-d7-050
    domain: domain7
    question: "An incident response team discovers malware on a workstation. Before eradication, what must the team do to ensure evidence is admissible and the full scope is understood?"
    options:
      - "Immediately reimage the workstation to prevent further spread"
      - "Collect and preserve forensic evidence, document findings, and determine the full scope of compromise"
      - "Notify all employees about the malware discovery"
      - "Scan all systems simultaneously to find other infections"
    correct_answer: 1
    explanations:
      correct: "Before eradication, the team must: collect volatile evidence (RAM, network connections), create forensic disk images, document all findings with timestamps and hashes, and conduct scope analysis to determine if other systems are compromised. Premature eradication destroys evidence needed for root cause analysis, legal proceedings, and scope determination."
      incorrect:
        - "Immediate reimaging destroys forensic evidence and may be premature if the scope of compromise is unknown — other connected systems may still be compromised."
        - "Collecting evidence, documenting findings, and determining scope before eradication is the correct pre-eradication requirement."
        - "Employee notification may be premature during investigation and could tip off an insider threat — notification follows after containment and leadership briefing."
        - "Simultaneous scanning of all systems is a scope-determination activity but must not happen before evidence is preserved from the known compromised system."
    difficulty: "medium"
    tags: ["incident-response", "forensics"]

  - id: q-d7-051
    domain: domain7
    question: "A SIEM correlation rule fires when there are more than 10 failed login attempts from the same IP address within 5 minutes, followed by a successful login. What attack is this rule designed to detect?"
    options:
      - "SQL Injection"
      - "Online brute-force or password spraying leading to successful compromise"
      - "Phishing campaign"
      - "Man-in-the-middle attack"
    correct_answer: 1
    explanations:
      correct: "This SIEM rule correlates multiple failed authentication attempts (brute force/password spraying pattern) with a subsequent success, indicating that an attacker likely guessed the correct password after multiple attempts. The pattern 'many failures + success' is a strong indicator of a successful brute-force or spraying attack."
      incorrect:
        - "SQL Injection targets database queries through application input — it would not manifest as authentication failures in login logs."
        - "Brute-force or password spraying followed by successful authentication is the attack pattern this correlation rule detects."
        - "Phishing attacks occur outside the network perimeter and result in credential use from external sources — they would appear as immediate successful logins, not preceded by many failures."
        - "MitM attacks intercept traffic between parties — they would not generate multiple failed login attempts from the same IP."
    difficulty: "easy"
    tags: ["operations", "SIEM", "detection"]

  - id: q-d7-052
    domain: domain7
    question: "Configuration management's primary security benefit is:"
    options:
      - "Increasing system performance by optimizing configurations"
      - "Detecting unauthorized changes to system configurations that could indicate compromise or policy violations"
      - "Reducing hardware procurement costs"
      - "Automating software license management"
    correct_answer: 1
    explanations:
      correct: "Configuration management maintains documented, approved baselines for all systems. By continuously comparing deployed configurations against approved baselines, organizations can detect: unauthorized changes (potential compromise), configuration drift (unintended deviations), and policy violations. Unauthorized configuration changes are often indicators of attacker persistence or privilege escalation."
      incorrect:
        - "Performance optimization may be a side effect of good configuration but is not the primary security benefit."
        - "Detecting unauthorized configuration changes (potential compromise or policy violation indicators) is the primary security benefit."
        - "Hardware procurement cost reduction is a procurement/asset management function — not related to configuration management security benefits."
        - "Software license management is an asset management function — configuration management focuses on security settings and configurations, not licensing."
    difficulty: "medium"
    tags: ["operations", "configuration-management"]
