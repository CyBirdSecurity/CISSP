      incorrect:
        - "Verbal discussion is a tabletop/walkthrough exercise — the least rigorous test type."
        - "Running both primary and alternate sites simultaneously to validate alternate capability — this correctly describes a parallel test."
        - "Physically shutting down the primary site is a full cutover test — the most rigorous and disruptive, with real operational risk."
        - "Running a checklist without activating systems is a structured walkthrough — parallel testing actually activates and validates the alternate site."
    difficulty: "hard"
    tags: ["BCP", "testing"]

  - id: q-d7-031
    domain: domain7
    question: "What is 'sanitization' in the context of incident response and system recovery?"
