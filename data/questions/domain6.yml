questions:
  - id: q-d6-001
    domain: domain6
    question: "A penetration tester is given no information about the target system before beginning the test. What type of test is this?"
    options:
      - "White box test"
      - "Gray box test"
      - "Black box test"
      - "Crystal box test"
    correct_answer: 2
    explanations:
      correct: "A black box (opaque box) test means the tester has no prior knowledge of the target — they simulate an external attacker starting from scratch with only publicly available information."
      incorrect:
        - "White box testing provides the tester with full knowledge (source code, architecture, credentials) — the opposite of this scenario."
        - "Gray box testing provides partial knowledge (e.g., user-level credentials but no source code)."
        - "Black box testing with no prior information correctly describes this scenario."
        - "'Crystal box' is another name for white box testing — full knowledge access."
    difficulty: "easy"
    tags: ["pen-testing", "testing-types"]

  - id: q-d6-002
    domain: domain6
    question: "What does a CVSS score of 9.5 indicate about a vulnerability?"
    options:
      - "Low severity — minimal risk"
      - "Medium severity — limited impact"
      - "High severity — significant risk"
      - "Critical severity — requires immediate attention"
    correct_answer: 3
    explanations:
      correct: "CVSS v3 scoring: Critical (9.0-10.0), High (7.0-8.9), Medium (4.0-6.9), Low (0.1-3.9). A score of 9.5 is Critical, indicating the vulnerability is easy to exploit, requires little or no authentication, and has severe impact. Critical vulnerabilities require immediate patching."
      incorrect:
        - "A score of 9.5 is Critical — not Low (0.1-3.9)."
        - "A score of 9.5 is Critical — not Medium (4.0-6.9)."
        - "A score of 9.5 is Critical — not just High (7.0-8.9)."
        - "Critical (9.0-10.0) is correct for 9.5 — requires immediate remediation."
    difficulty: "easy"
    tags: ["CVSS", "vulnerability"]

  - id: q-d6-003
    domain: domain6
    question: "What is the key difference between vulnerability scanning and penetration testing?"
    options:
      - "Vulnerability scanning is more expensive than penetration testing"
      - "Vulnerability scanning identifies potential weaknesses; penetration testing actively exploits them to confirm impact"
      - "Vulnerability scanning requires explicit authorization; penetration testing does not"
      - "Vulnerability scanning is performed by external parties; penetration testing is internal"
    correct_answer: 1
    explanations:
      correct: "Vulnerability scanning uses automated tools to identify known potential weaknesses. Penetration testing goes further — it actively attempts to exploit found and additional vulnerabilities to demonstrate actual impact and attack paths."
      incorrect:
        - "Penetration testing is generally more expensive and time-intensive than automated vulnerability scanning."
        - "Vulnerability scanning identifies weaknesses; pen testing exploits them to prove impact — this is the key difference."
        - "Both vulnerability scanning AND penetration testing require explicit written authorization. Unauthorized scanning is illegal."
        - "Both can be performed internally or by external parties — who performs the test is not the defining difference."
    difficulty: "medium"
    tags: ["pen-testing", "scanning"]

  - id: q-d6-004
    domain: domain6
    question: "STRIDE is a threat modeling methodology. What does the 'T' in STRIDE stand for?"
    options:
      - "Tracking"
      - "Tampering"
      - "Trust elevation"
      - "Transmission interception"
    correct_answer: 1
    explanations:
      correct: "STRIDE stands for: Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, Elevation of Privilege. Tampering refers to unauthorized modification of data or code."
      incorrect:
        - "Tracking is not a component of STRIDE."
        - "Tampering (unauthorized data modification) is the correct 'T' in STRIDE."
        - "'Trust elevation' is not a STRIDE component — 'Elevation of Privilege' (E) is the related concept."
        - "'Transmission interception' is not a STRIDE component — 'Information Disclosure' (I) covers unauthorized data exposure."
    difficulty: "medium"
    tags: ["threat-modeling", "STRIDE"]

  - id: q-d6-005
    domain: domain6
    question: "A developer integrates SAST tools into the CI/CD pipeline. What category of testing does SAST represent?"
    options:
      - "Dynamic testing — testing the running application"
      - "Static testing — analyzing code without executing it"
      - "Interactive testing — combining static and dynamic approaches"
      - "Manual testing — human review of code"
    correct_answer: 1
    explanations:
      correct: "SAST (Static Application Security Testing) analyzes source code, bytecode, or binaries WITHOUT executing the application. It is a white-box testing technique that finds vulnerabilities in the code itself during development."
      incorrect:
        - "Dynamic testing (DAST) tests the running application — SAST is the opposite; it analyzes static code without execution."
        - "Static testing (no execution, code analysis) correctly describes SAST."
        - "IAST (Interactive Application Security Testing) combines static and dynamic approaches — SAST is purely static."
        - "Manual code review is a human process — SAST is an automated static analysis tool."
    difficulty: "medium"
    tags: ["SAST", "testing"]

  - id: q-d6-006
    domain: domain6
    question: "Which phase of a penetration test involves documenting findings, providing risk ratings, and recommending remediation steps?"
    options:
      - "Reconnaissance"
      - "Exploitation"
      - "Post-exploitation"
      - "Reporting"
    correct_answer: 3
    explanations:
      correct: "The Reporting phase documents all findings, includes risk ratings (typically using CVSS), and provides remediation recommendations. A good pen test report has an executive summary and a technical findings section with reproduction steps."
      incorrect:
        - "Reconnaissance is the information gathering phase — identifying targets and gathering intelligence."
        - "Exploitation is the phase where vulnerabilities are actively attacked — not where findings are documented."
        - "Post-exploitation involves lateral movement, privilege escalation, and maintaining access after initial compromise."
        - "Reporting is the final phase where all findings are documented and presented — this is correct."
    difficulty: "easy"
    tags: ["pen-testing", "phases"]

  - id: q-d6-007
    domain: domain6
    question: "What is the primary purpose of log management in a security program?"
    options:
      - "To improve application performance by reducing log verbosity"
      - "To provide an audit trail for incident investigation, compliance, and detection of security events"
      - "To backup system state for disaster recovery purposes"
      - "To monitor employee productivity"
    correct_answer: 1
    explanations:
      correct: "Log management provides: 1) Incident investigation (forensic audit trail), 2) Compliance evidence (SOX, PCI DSS, HIPAA all require audit logs), 3) Real-time security event detection when fed to SIEM. Logs must be centralized, tamper-proof, and time-synchronized."
      incorrect:
        - "Reducing log verbosity would harm security visibility — logs should be comprehensive, not minimized."
        - "Audit trail for incidents, compliance, and detection is the primary security purpose of log management."
        - "Disaster recovery uses backups of data and system state — log management serves a different, security-focused purpose."
        - "Employee monitoring may be a secondary use, but the primary security purpose is incident investigation and compliance."
    difficulty: "easy"
    tags: ["logs", "monitoring"]

  - id: q-d6-008
    domain: domain6
    question: "What is a 'false positive' in the context of intrusion detection?"
    options:
      - "A real attack that is not detected by the IDS"
      - "A legitimate action incorrectly flagged as malicious by the IDS"
      - "An attack detected and blocked by the IPS"
      - "A vulnerability confirmed as exploitable by penetration testing"
    correct_answer: 1
    explanations:
      correct: "A false positive occurs when the IDS generates an alert for benign, legitimate activity — incorrectly identifying it as malicious. High false positive rates cause alert fatigue, leading analysts to ignore alerts. Tuning IDS/IPS reduces false positives."
      incorrect:
        - "A real attack not detected is a 'false negative' — the most dangerous failure mode for an IDS."
        - "Legitimate activity flagged as malicious is a false positive — causing unnecessary alerts and alert fatigue."
        - "An attack detected and blocked is a 'true positive' — the desired IPS outcome."
        - "Exploitability confirmed by pen testing relates to vulnerability management, not IDS detection accuracy."
    difficulty: "medium"
    tags: ["IDS", "detection"]

  - id: q-d6-009
    domain: domain6
    question: "During a security audit, auditors verify that password complexity requirements are actually enforced by the system. What type of control testing is this?"
    options:
      - "Design review"
      - "Compliance testing"
      - "Substantive testing"
      - "Attribute testing"
    correct_answer: 1
    explanations:
      correct: "Compliance testing (also called tests of controls) verifies that controls are actually operating as designed — i.e., that the password policy is enforced by the system, not just documented. It tests effectiveness of controls."
      incorrect:
        - "Design review examines whether controls are appropriately designed for their purpose — not whether they are operating as intended."
        - "Compliance testing verifies controls are working as designed — this correctly describes verifying password enforcement."
        - "Substantive testing verifies the accuracy of data/transactions (financial audit term) — not control operation."
        - "Attribute testing samples transactions to check for a specific characteristic — more common in financial auditing."
    difficulty: "hard"
    tags: ["audit", "testing"]

  - id: q-d6-010
    domain: domain6
    question: "What is the primary goal of a red team exercise that differs from a standard penetration test?"
    options:
      - "Finding the maximum number of vulnerabilities"
      - "Emulating a specific real-world threat actor to test detection and response capabilities"
      - "Providing a compliance certification for the organization"
      - "Testing only perimeter defenses and internet-facing systems"
    correct_answer: 1
    explanations:
      correct: "Red team exercises emulate real-world adversaries (APT groups, specific threat actors) to test an organization's detection and response capabilities — not just find vulnerabilities. Red teams try to remain undetected; the blue team's ability to detect is part of what's tested."
      incorrect:
        - "Finding maximum vulnerabilities is a vulnerability assessment goal. Red team focuses on realistic adversary emulation and detection testing."
        - "Emulating specific threat actors to test detection and response is the defining goal of red team exercises."
        - "Red team exercises do not provide compliance certifications — they test operational security posture."
        - "Red teams conduct full-scope attacks including physical, social engineering, and internal movement — not just perimeter testing."
    difficulty: "medium"
    tags: ["red-team", "assessment"]

  - id: q-d6-011
    domain: domain6
    question: "Which testing technique sends random, malformed, or unexpected inputs to a program to discover crashes and vulnerabilities?"
    options:
      - "Regression testing"
      - "Unit testing"
      - "Fuzzing"
      - "Integration testing"
    correct_answer: 2
    explanations:
      correct: "Fuzzing (fuzz testing) automatically sends large amounts of random, malformed, or unexpected data to applications to find crashes, assertion failures, and security vulnerabilities like buffer overflows and input validation issues."
      incorrect:
        - "Regression testing verifies that changes haven't broken previously working functionality — it tests known scenarios, not random inputs."
        - "Unit testing tests individual code components with specific expected inputs and outputs — not random/malformed data."
        - "Fuzzing correctly describes the technique of sending unexpected inputs to discover vulnerabilities."
        - "Integration testing verifies that different components work together correctly — not security-focused random input testing."
    difficulty: "easy"
    tags: ["fuzzing", "testing"]

  - id: q-d6-012
    domain: domain6
    question: "What is the difference between a SOC 2 Type I and Type II report?"
    options:
      - "Type I covers security only; Type II covers all five trust service criteria"
      - "Type I tests controls at a point in time; Type II tests effectiveness over a period (typically 6-12 months)"
      - "Type I is for cloud providers; Type II is for on-premises organizations"
      - "Type I is performed by internal auditors; Type II requires an external auditor"
    correct_answer: 1
    explanations:
      correct: "SOC 2 Type I evaluates the design and implementation of controls at a specific point in time. Type II evaluates whether those controls operated effectively over a period, typically 6-12 months. Type II is more valuable and widely required by customers."
      incorrect:
        - "Both Type I and Type II can cover any of the five Trust Service Criteria (Security, Availability, Processing Integrity, Confidentiality, Privacy)."
        - "Type I is point-in-time; Type II is over a period — this is the correct distinction."
        - "Both types apply to any service organization, not specific to cloud or on-premises."
        - "Both Type I and Type II require an independent certified public accountant (CPA) or qualified auditor."
    difficulty: "medium"
    tags: ["SOC2", "audit", "compliance"]

  - id: q-d6-013
    domain: domain6
    question: "What is the primary goal of 'code review' as a security testing technique?"
    options:
      - "To evaluate the visual design of the user interface"
      - "To identify security vulnerabilities and defects in source code before deployment"
      - "To measure the performance of the application under load"
      - "To verify that the code meets functional business requirements"
    correct_answer: 1
    explanations:
      correct: "Security code review examines source code to identify vulnerabilities such as injection flaws, insecure cryptography, improper error handling, and authentication weaknesses before the code is deployed. It can be manual (peer review) or automated (SAST tools). Earlier detection is less expensive to remediate."
      incorrect:
        - "UI design is evaluated by UX review — security code review focuses on vulnerabilities in the logic and implementation."
        - "Identifying security vulnerabilities in source code before deployment is the primary goal of security code review."
        - "Performance testing (load testing, stress testing) is a separate testing discipline — code review focuses on correctness and security."
        - "Functional requirement testing is done by functional/acceptance testing — security code review specifically targets security defects."
    difficulty: "easy"
    tags: ["code-review", "testing"]

  - id: q-d6-014
    domain: domain6
    question: "What is the difference between DAST and SAST tools?"
    options:
      - "DAST tests databases; SAST tests application servers"
      - "DAST tests the running application from the outside (black box); SAST analyzes source code without execution (white box)"
      - "DAST is manual testing; SAST is automated"
      - "DAST tests for performance issues; SAST tests for security issues"
    correct_answer: 1
    explanations:
      correct: "DAST (Dynamic Application Security Testing) sends requests to a running application to find runtime vulnerabilities (like a simulated attacker). SAST (Static Application Security Testing) analyzes code without execution. DAST finds runtime issues SAST misses (like authentication flaws); SAST finds code issues DAST can't reach (like hardcoded credentials)."
      incorrect:
        - "Both test security of applications — neither is limited to specific infrastructure components."
        - "DAST tests the running app externally; SAST analyzes code statically — this correctly distinguishes them."
        - "Both can be automated — the distinction is about execution vs. static analysis, not automation level."
        - "Both DAST and SAST test for security issues — the difference is methodology (dynamic vs. static), not the type of issue."
    difficulty: "medium"
    tags: ["DAST", "SAST", "testing"]

  - id: q-d6-015
    domain: domain6
    question: "What is the 'Common Criteria' (ISO/IEC 15408) and what does an EAL rating signify?"
    options:
      - "A compliance framework for financial reporting — EAL ratings indicate audit quality"
      - "An international standard for evaluating IT security product assurance — EAL ratings indicate the rigor of the evaluation, not the absolute security level"
      - "A US government classification system for security software"
      - "A standard for testing network intrusion prevention systems"
    correct_answer: 1
    explanations:
      correct: "Common Criteria (CC) is an international framework for evaluating security properties of IT products. EAL (Evaluation Assurance Level) 1-7 indicates how thoroughly the product was evaluated — higher EAL = more rigorous testing, not necessarily more features or higher security. A higher EAL means greater confidence in the product behaving as specified."
      incorrect:
        - "Common Criteria is an IT security product evaluation standard, not a financial compliance framework."
        - "International standard for IT product security evaluation with EAL indicating evaluation rigor — this correctly describes Common Criteria."
        - "Common Criteria is international (ISO/IEC) — not a US government classification system, though US DoD uses it."
        - "CC evaluates all types of IT security products — not limited to network intrusion prevention."
    difficulty: "medium"
    tags: ["standards", "common-criteria"]

  - id: q-d6-016
    domain: domain6
    question: "What is the purpose of 'threat intelligence' in a security program?"
    options:
      - "To eliminate all threats before they occur"
      - "To provide actionable information about current and emerging threats to inform security decisions and prioritize defenses"
      - "To replace vulnerability scanning with external data"
      - "To automate incident response without human involvement"
    correct_answer: 1
    explanations:
      correct: "Threat intelligence provides contextualized information about adversary TTPs (Tactics, Techniques, and Procedures), IOCs (Indicators of Compromise), and emerging threats. It informs prioritization of defenses, helps tune detection rules, and enables proactive threat hunting. Sources include ISACs, government feeds (CISA), and commercial providers."
      incorrect:
        - "Threats cannot be completely eliminated — threat intelligence helps prioritize defenses against most likely threats."
        - "Providing actionable information about threats to inform security decisions is the correct purpose of threat intelligence."
        - "Threat intelligence complements vulnerability scanning — it provides context about which vulnerabilities are actively exploited."
        - "Threat intelligence informs human decisions and automated controls but doesn't automate full incident response."
    difficulty: "easy"
    tags: ["threat-intelligence", "monitoring"]

  - id: q-d6-017
    domain: domain6
    question: "What is 'security regression testing' and when should it be performed?"
    options:
      - "Testing security controls from previous years to see if they still work"
      - "Re-testing previously identified vulnerabilities after patches to verify they are fully remediated and no new vulnerabilities were introduced"
      - "Testing backup systems after a security incident"
      - "Annual penetration testing to verify long-term security posture"
    correct_answer: 1
    explanations:
      correct: "Security regression testing verifies that: 1) Previously found vulnerabilities are fully remediated after patching. 2) New code changes haven't re-introduced old vulnerabilities or created new ones. It should be part of every patch cycle and CI/CD pipeline to prevent vulnerability recurrence."
      incorrect:
        - "Testing old controls for continued effectiveness is control effectiveness testing — regression testing specifically re-tests after changes."
        - "Re-testing after patches to verify remediation and catch new issues is the correct description of security regression testing."
        - "Testing backup systems is disaster recovery testing — regression testing focuses on application security after code changes."
        - "Annual penetration testing is a point-in-time assessment — regression testing is done as part of every change cycle."
    difficulty: "medium"
    tags: ["testing", "regression"]

  - id: q-d6-018
    domain: domain6
    question: "What is the purpose of a 'security baseline' configuration?"
    options:
      - "To document the minimum acceptable security configuration for a system type, providing a starting point for hardening"
      - "To record the system's state after it has been fully compromised for forensic purposes"
      - "To measure network bandwidth usage as a performance baseline"
      - "To define the maximum privileges any user can have"
    correct_answer: 0
    explanations:
      correct: "A security baseline defines the minimum acceptable security configuration for a system type (e.g., Windows server baseline, Linux workstation baseline). It covers settings like disabled services, required patches, password policy, and audit logging. Baselines are derived from hardening guides (CIS Benchmarks, STIG) and applied during provisioning."
      incorrect:
        - "Documenting minimum acceptable security configuration for hardening is the correct purpose of a security baseline."
        - "Recording a compromised system's state is forensic imaging — not a security baseline."
        - "Network performance baselines are operational metrics — security baselines define configuration requirements."
        - "Maximum privilege definitions are part of access control policies — baselines focus on system configuration."
    difficulty: "easy"
    tags: ["baselines", "configuration"]

  - id: q-d6-019
    domain: domain6
    question: "What is the OWASP Testing Guide primarily used for?"
    options:
      - "A framework for physical security assessments"
      - "A comprehensive methodology and checklist for testing web application security"
      - "A government standard for penetration testing authorization"
      - "A tool for automated network scanning"
    correct_answer: 1
    explanations:
      correct: "The OWASP Testing Guide provides a comprehensive methodology for testing web application security. It covers all phases from information gathering to vulnerability-specific tests (SQL injection, XSS, authentication testing, business logic flaws). Security testers use it as a structured checklist to ensure complete coverage."
      incorrect:
        - "Physical security assessments use different frameworks — OWASP focuses on web application security."
        - "A comprehensive web application security testing methodology is the correct description of the OWASP Testing Guide."
        - "OWASP is a non-profit organization producing open standards — it is not a government authorization body."
        - "OWASP provides methodology and checklists — not a scanning tool itself (though it references tools like OWASP ZAP)."
    difficulty: "easy"
    tags: ["OWASP", "testing"]

  - id: q-d6-020
    domain: domain6
    question: "What is 'output validation' and why is it important in web application security?"
    options:
      - "Validating that a web server returns HTTP 200 status codes"
      - "Encoding output before rendering it to prevent injection of malicious content into HTML, JavaScript, or other contexts"
      - "Verifying that query results are returned within acceptable time limits"
      - "Checking that all API responses include proper authentication headers"
    correct_answer: 1
    explanations:
      correct: "Output validation (output encoding/escaping) encodes user-controlled data before rendering it in HTML, JavaScript, CSS, or URL contexts. This prevents Stored and Reflected XSS by ensuring that even if malicious content was stored, it is rendered as data (displayed), not executed as code."
      incorrect:
        - "HTTP status codes indicate server response status — not related to output validation for security."
        - "Encoding output before rendering to prevent injection of malicious content is the correct description of output validation."
        - "Query performance timing is a performance/SLA concern — not output validation."
        - "Authentication headers are part of API security configuration — output validation encodes response content to prevent XSS."
    difficulty: "medium"
    tags: ["XSS", "secure-coding", "testing"]

  - id: q-d6-021
    domain: domain6
    question: "What does a 'scope of work' document define in a penetration testing engagement?"
    options:
      - "The skills required of the penetration testers"
      - "The specific systems, networks, and testing methods that are authorized and the boundaries the testers must not cross"
      - "The budget allocated for remediation of findings"
      - "The timeline for patching vulnerabilities after the test"
    correct_answer: 1
    explanations:
      correct: "The scope of work (or Rules of Engagement) defines what is in-scope (systems, IPs, methods), what is out-of-scope (production databases, DoS testing), testing windows, required notifications, and emergency contacts. It provides legal authorization and protects both the tester and client. Testing outside scope is unauthorized and illegal."
      incorrect:
        - "Tester qualifications may be in a contract but are not what the scope of work defines — scope defines what is tested."
        - "Authorized systems, methods, and boundaries is the correct description of what a penetration testing scope defines."
        - "Remediation budgets are financial/project decisions — not part of the testing scope document."
        - "Patch timelines are post-test management decisions — scope defines what is tested, not post-test activities."
    difficulty: "medium"
    tags: ["pen-testing", "governance"]

  - id: q-d6-022
    domain: domain6
    question: "What is a 'SIEM' (Security Information and Event Management) system's primary function?"
    options:
      - "To scan systems for known vulnerabilities"
      - "To collect, correlate, and analyze log data from multiple sources to detect security events and support incident response"
      - "To encrypt log files for compliance storage"
      - "To automatically patch systems when vulnerabilities are detected"
    correct_answer: 1
    explanations:
      correct: "A SIEM aggregates logs from diverse sources (firewalls, servers, endpoints, applications), normalizes the data, applies correlation rules to detect security events, generates alerts, and provides dashboards for security analysts. It is the central hub for security visibility, compliance reporting, and incident investigation."
      incorrect:
        - "Vulnerability scanning is performed by dedicated scanners (Nessus, Qualys) — SIEM processes log data for security events."
        - "Collecting and correlating logs from multiple sources to detect security events is the correct primary SIEM function."
        - "Log encryption for compliance is a log management feature — SIEM's primary purpose is correlation and detection."
        - "Automated patching is a patch management function — SIEM detects and alerts on security events but doesn't patch."
    difficulty: "easy"
    tags: ["SIEM", "monitoring"]

  - id: q-d6-023
    domain: domain6
    question: "What is the purpose of 'continuous monitoring' in a security program?"
    options:
      - "Monitoring employee email communications for policy compliance"
      - "Maintaining ongoing awareness of security controls, vulnerabilities, and threats to support timely risk management decisions"
      - "Continuously running penetration tests against all systems"
      - "Monitoring network bandwidth usage 24/7"
    correct_answer: 1
    explanations:
      correct: "Continuous monitoring (as defined in NIST SP 800-137) maintains ongoing awareness of an organization's security posture — including control effectiveness, vulnerabilities, threat feeds, and configuration drift. This enables timely, risk-based decisions rather than relying only on annual assessments. It is foundational to the NIST RMF."
      incorrect:
        - "Employee communication monitoring is an HR/privacy concern — continuous security monitoring tracks security controls and threats."
        - "Maintaining ongoing awareness of security posture for timely risk decisions is the correct NIST definition of continuous monitoring."
        - "Continuous penetration testing is not operationally feasible and would disrupt systems — continuous monitoring uses passive observation and automated scanning."
        - "Network performance monitoring is operational management — security continuous monitoring tracks controls and threats."
    difficulty: "medium"
    tags: ["monitoring", "NIST"]

  - id: q-d6-024
    domain: domain6
    question: "What is 'interface testing' in the context of application security assessment?"
    options:
      - "Testing that the application's user interface renders correctly on different browsers"
      - "Testing APIs, user interfaces, and system interfaces for security vulnerabilities including improper input handling and authentication flaws"
      - "Testing network interface cards for hardware defects"
      - "Verifying database query interfaces return correct data"
    correct_answer: 1
    explanations:
      correct: "Interface testing evaluates all application interfaces — user interfaces (web forms), APIs (REST, SOAP, GraphQL), and system interfaces (inter-service communications) — for security issues like improper input validation, authentication bypass, unauthorized data exposure, and rate limiting failures."
      incorrect:
        - "Browser rendering compatibility is UX/compatibility testing — security interface testing focuses on vulnerabilities."
        - "Testing all interface types (UI, API, system interfaces) for security vulnerabilities is the correct description."
        - "Testing network interface cards is hardware diagnostics — application interface testing examines software interfaces."
        - "Data correctness is functional testing — security interface testing looks for vulnerabilities in how interfaces handle malformed or malicious input."
    difficulty: "medium"
    tags: ["testing", "API"]

  - id: q-d6-025
    domain: domain6
    question: "What is the purpose of 'log normalization' in a SIEM environment?"
    options:
      - "To reduce log storage costs by deleting duplicate entries"
      - "To convert logs from different sources into a consistent format to enable correlation and analysis"
      - "To encrypt log files before transmission to the SIEM"
      - "To prioritize critical log events for faster analyst review"
    correct_answer: 1
    explanations:
      correct: "Different systems (Windows Event Log, Syslog, CEF, JSON) use different log formats. Normalization converts them into a common schema so the SIEM can correlate events across systems. Without normalization, an authentication event from a Windows server, a firewall, and a Linux system would appear as different, unrelated events."
      incorrect:
        - "Deduplication reduces redundancy but is not the same as normalization — normalization standardizes format."
        - "Converting diverse log formats into a consistent schema for correlation is the correct description of log normalization."
        - "Log encryption is a transport/storage security control — normalization is a data format standardization process."
        - "Event prioritization/triage is correlation rule processing — normalization must happen before correlation is possible."
    difficulty: "medium"
    tags: ["SIEM", "logs"]

  - id: q-d6-026
    domain: domain6
    question: "What is 'attack surface analysis' and when is it most valuable?"
    options:
      - "Physically measuring the size of a server room"
      - "Identifying all possible points where an attacker could interact with or attempt to compromise a system, most valuable during design and architecture review"
      - "Analyzing the spread of malware across a network after an attack"
      - "Measuring network bandwidth to identify unusual traffic patterns"
    correct_answer: 1
    explanations:
      correct: "Attack surface analysis identifies all entry points, interfaces, and interactions that could be exploited — input fields, APIs, network ports, authentication mechanisms, third-party libraries. Reducing attack surface (disabling unused services, removing unnecessary features) is a fundamental security principle. Most valuable during design but valuable throughout development."
      incorrect:
        - "Physical room measurement is facility planning — attack surface analysis is about logical and network attack vectors."
        - "Identifying all potential attacker interaction points, most valuable at design time — this correctly describes attack surface analysis."
        - "Post-attack malware analysis is forensic investigation — attack surface analysis is proactive and pre-attack."
        - "Traffic pattern analysis is network monitoring — attack surface analysis maps what can be attacked, not what is being attacked."
    difficulty: "medium"
    tags: ["threat-modeling", "architecture"]

  - id: q-d6-027
    domain: domain6
    question: "What is the difference between a 'vulnerability' and an 'exploit'?"
    options:
      - "They are the same — all vulnerabilities have an associated exploit"
      - "A vulnerability is a weakness that could be exploited; an exploit is the actual code or technique that takes advantage of a vulnerability"
      - "A vulnerability affects hardware; an exploit affects software"
      - "An exploit is a documented vulnerability; a vulnerability is an undiscovered exploit"
    correct_answer: 1
    explanations:
      correct: "A vulnerability is a flaw or weakness in a system (e.g., unpatched software, misconfiguration). An exploit is the actual mechanism (code, technique) that leverages the vulnerability to cause harm. Not all vulnerabilities have public exploits — an unexploited vulnerability still needs remediation because an exploit could be developed."
      incorrect:
        - "Many vulnerabilities have no known public exploit — the distinction between the two concepts is important for risk assessment."
        - "A vulnerability is a weakness; an exploit is the mechanism to abuse it — this correctly distinguishes them."
        - "Both vulnerabilities and exploits can affect hardware, software, or configurations — no hardware/software distinction."
        - "This is reversed — a vulnerability is the weakness; an exploit is the developed technique to use it."
    difficulty: "easy"
    tags: ["vulnerability", "fundamentals"]

  - id: q-d6-028
    domain: domain6
    question: "What is the purpose of 'patch Tuesday' awareness in vulnerability management?"
    options:
      - "A day when organizations apply all patches simultaneously to reduce effort"
      - "Microsoft's monthly scheduled release of security patches — awareness helps organizations plan testing and deployment timelines"
      - "A weekly vulnerability scanning window"
      - "The Tuesday deadline for reporting newly found vulnerabilities to CISA"
    correct_answer: 1
    explanations:
      correct: "Microsoft releases security patches on the second Tuesday of each month ('Patch Tuesday'). Organizations use this predictable cadence to plan their patch testing and deployment windows. Security teams monitor the patch release to assess severity, identify critical patches requiring emergency deployment, and schedule change management windows."
      incorrect:
        - "Organizations rarely apply all patches simultaneously — they follow risk-based prioritization and change management processes."
        - "Microsoft's monthly patch release cycle that organizations plan around — this correctly describes Patch Tuesday's significance."
        - "Vulnerability scanning is performed on varying schedules — Patch Tuesday is specifically Microsoft's patch release day."
        - "CISA vulnerability reporting uses different processes (CVD programs) — Patch Tuesday is Microsoft's release cycle."
    difficulty: "easy"
    tags: ["patch-management", "vulnerability"]

  - id: q-d6-029
    domain: domain6
    question: "What is 'threat hunting' and how does it differ from reactive incident response?"
    options:
      - "They are the same — both start with an alert from a SIEM"
      - "Threat hunting is proactive searching for threats that evade existing detection; incident response is reactive investigation after an alert or known event"
      - "Threat hunting is automated; incident response is manual"
      - "Threat hunting is performed by external vendors; incident response is internal"
    correct_answer: 1
    explanations:
      correct: "Threat hunting is a proactive, hypothesis-driven search for indicators of adversary activity that automated tools haven't detected. Hunters assume the environment is already compromised and look for subtle signs. Incident response is triggered by a known event or alert. Threat hunting may discover incidents that then transition to incident response."
      incorrect:
        - "Threat hunting doesn't start from an alert — it starts from a hypothesis. Incident response starts from a detected event."
        - "Threat hunting is proactive hypothesis-driven search; incident response is reactive — this correctly distinguishes them."
        - "Both threat hunting and incident response involve skilled humans — automation assists but doesn't replace human judgment."
        - "Both can be performed by internal or external teams — neither is limited by who performs it."
    difficulty: "medium"
    tags: ["threat-hunting", "detection"]

  - id: q-d6-030
    domain: domain6
    question: "What is an 'internal audit' and how does it differ from an 'external audit'?"
    options:
      - "Internal audits test technology; external audits test people and processes"
      - "Internal audits are conducted by the organization's own auditors; external audits are conducted by independent third parties"
      - "Internal audits are informal; external audits produce binding compliance reports"
      - "External audits cost nothing; internal audits consume organizational resources"
    correct_answer: 1
    explanations:
      correct: "Internal audits are conducted by auditors employed by or reporting to the organization — they may lack independence but provide valuable ongoing oversight. External audits are performed by independent third parties — they provide greater credibility, required by regulations (SOX, PCI DSS) or customer requirements. External auditors can issue opinions relied upon by external stakeholders."
      incorrect:
        - "Both internal and external audits can cover technology, people, and processes — neither is limited to a specific domain."
        - "Internal = organization's own auditors; external = independent third parties — this correctly distinguishes them."
        - "Both produce formal reports — internal audit reports may be less formal but still document findings systematically."
        - "External audits are not free — they are typically expensive professional engagements."
    difficulty: "easy"
    tags: ["audit", "governance"]

  - id: q-d6-031
    domain: domain6
    question: "What is the purpose of 'security metrics' in a security program?"
    options:
      - "To satisfy regulatory reporting requirements only"
      - "To measure the effectiveness of security controls, track improvement over time, and communicate security posture to stakeholders"
      - "To compare the organization's security spending to competitors"
      - "To determine which employees need additional security training"
    correct_answer: 1
    explanations:
      correct: "Security metrics measure control effectiveness (e.g., % systems patched within SLA, mean time to detect/respond, phishing click rates). They enable data-driven security decisions, demonstrate improvement over time, justify security investments to leadership, and fulfill reporting obligations. Good metrics are measurable, actionable, and tied to risk reduction."
      incorrect:
        - "Regulatory reporting is one use of metrics, but the broader purpose is measuring effectiveness and driving improvement."
        - "Measuring control effectiveness, tracking improvement, and communicating posture to stakeholders is the correct purpose of security metrics."
        - "Competitive benchmarking may be a use case but is not the primary purpose of internal security metrics."
        - "Identifying training needs may be informed by metrics but is one narrow application — the primary purpose is measuring program effectiveness."
    difficulty: "medium"
    tags: ["metrics", "governance"]

  - id: q-d6-032
    domain: domain6
    question: "What is 'passive reconnaissance' and how does it differ from active reconnaissance?"
    options:
      - "Passive reconnaissance uses automated tools; active reconnaissance is manual"
      - "Passive reconnaissance gathers information without directly interacting with target systems (using public sources); active reconnaissance directly probes the target"
      - "Passive reconnaissance is legal; active reconnaissance requires court authorization"
      - "Passive reconnaissance only works on websites; active reconnaissance targets network infrastructure"
    correct_answer: 1
    explanations:
      correct: "Passive reconnaissance (OSINT) uses publicly available information — WHOIS, DNS records, social media, job postings, Google dorking — without touching target systems. No alerts are generated on the target's IDS. Active reconnaissance (port scanning, enumeration) directly probes target systems and may trigger alerts."
      incorrect:
        - "Both passive and active reconnaissance can be manual or automated — the distinction is about interaction with the target."
        - "Not directly touching target systems (public sources) vs. directly probing — this correctly distinguishes passive and active reconnaissance."
        - "Both require authorization in penetration testing contexts — passive reconnaissance of public information generally doesn't require authorization but active probing does."
        - "Both passive and active reconnaissance apply to websites, networks, applications, and infrastructure."
    difficulty: "medium"
    tags: ["reconnaissance", "pen-testing"]

  - id: q-d6-033
    domain: domain6
    question: "A security team runs automated vulnerability scans against production systems weekly. However, critical vulnerabilities from 3 months ago remain unpatched. What security program failure does this represent?"
    options:
      - "Insufficient scanning frequency"
      - "Failure in vulnerability management — scanning without remediation"
      - "Incorrect scanning tool configuration"
      - "Lack of vulnerability disclosure policy"
    correct_answer: 1
    explanations:
      correct: "Scanning identifies vulnerabilities but does not fix them. Vulnerability management requires a complete lifecycle: discover → assess → prioritize → remediate → verify. Having scan data with no remediation represents a critical program failure — scanning creates false assurance while risks remain. Critical vulnerabilities should have defined SLAs for remediation (e.g., critical within 30 days)."
      incorrect:
        - "Weekly scans are generally adequate frequency for most environments — the problem is remediation failure, not scan frequency."
        - "Having vulnerabilities identified but unremediated is the correct failure — scanning without remediation provides false assurance."
        - "Tool configuration affects what vulnerabilities are found — the described scenario is about remediation failure, not detection gaps."
        - "A vulnerability disclosure policy governs how external researchers report vulnerabilities — not the organization's internal remediation program."
    difficulty: "medium"
    tags: ["vulnerability", "management"]

  - id: q-d6-034
    domain: domain6
    question: "What is the key difference between a vulnerability assessment and a penetration test?"
    options:
      - "Vulnerability assessments cost more than penetration tests"
      - "Vulnerability assessments identify potential weaknesses without exploiting them; penetration tests actively exploit vulnerabilities to confirm impact"
      - "Penetration tests only test web applications; vulnerability assessments test all systems"
      - "Vulnerability assessments require source code access; penetration tests do not"
    correct_answer: 1
    explanations:
      correct: "A vulnerability assessment uses automated tools to identify potential security weaknesses but does not attempt to exploit them — it reports potential vulnerabilities. A penetration test actively exploits discovered vulnerabilities to confirm they are exploitable, demonstrate actual impact, and discover privilege escalation chains that scanners cannot find."
      incorrect:
        - "Penetration tests are generally more expensive due to the manual expertise required — vulnerability assessments using automated tools are typically less costly."
        - "Non-exploitation (vulnerability assessment) vs. active exploitation (penetration test) is the correct distinction."
        - "Both assessments can target web applications, networks, and systems — scope depends on engagement objectives, not the assessment type."
        - "White-box penetration testing uses source code access, but black-box pen tests do not — vulnerability assessment does not require source code."
    difficulty: "easy"
    tags: ["assessment", "pen-testing", "vulnerability"]

  - id: q-d6-035
    domain: domain6
    question: "A CVSS base score of 9.8 with Attack Vector: Network, Attack Complexity: Low, Privileges Required: None, User Interaction: None indicates which type of vulnerability?"
    options:
      - "A local privilege escalation requiring user interaction"
      - "A remotely exploitable, easy-to-use vulnerability requiring no authentication or user interaction — a critical threat"
      - "A moderate vulnerability with difficult exploitation requirements"
      - "A physical access vulnerability affecting a single component"
    correct_answer: 1
    explanations:
      correct: "CVSS scores break down the attack scenario: Network vector means exploitable remotely over the internet, Low complexity means no special conditions or expertise needed, No privileges means authentication is not required, No user interaction means the attacker doesn't need to trick a user. Combined, this describes a trivially exploitable internet-facing vulnerability — the most dangerous category (9.8/10 = Critical)."
      incorrect:
        - "Local privileges escalation would have Attack Vector: Local, not Network — this is a remote vulnerability requiring no local access."
        - "Remotely exploitable, easy to use, requiring no authentication or user interaction (Critical severity) is the correct characterization of this CVSS profile."
        - "Low CVSS scores reflect difficult exploitation — a 9.8 Critical reflects the easiest possible exploitation conditions."
        - "Physical access would be Attack Vector: Physical — the Network vector means internet-accessible."
    difficulty: "hard"
    tags: ["vulnerability", "CVSS", "metrics"]

  - id: q-d6-036
    domain: domain6
    question: "SOC 2 Type II differs from SOC 2 Type I in which key way?"
    options:
      - "Type II covers 5 trust service criteria; Type I covers only 2"
      - "Type II evaluates controls over a period of time (6-12 months); Type I evaluates controls at a point in time"
      - "Type II is required for government contractors; Type I is for commercial organizations"
      - "Type II examines source code; Type I reviews policies only"
    correct_answer: 1
    explanations:
      correct: "SOC 2 Type I evaluates whether controls are designed appropriately at a single point in time — a snapshot. Type II evaluates whether controls are designed appropriately AND operating effectively over a period (typically 6-12 months). Enterprise clients increasingly require Type II reports as they demonstrate sustained control effectiveness, not just a point-in-time snapshot."
      incorrect:
        - "Both Type I and Type II can cover all five Trust Services Criteria — the difference is the evaluation period, not the number of criteria."
        - "Evaluation over a period (Type II) vs. point in time (Type I) is the correct distinction — Type II is more valuable for demonstrating sustained effectiveness."
        - "Neither type is exclusively required for government vs. commercial — both are used across sectors based on client requirements."
        - "Neither type examines source code — SOC 2 examines security, availability, processing integrity, confidentiality, and privacy controls."
    difficulty: "medium"
    tags: ["compliance", "audit", "SOC2"]

  - id: q-d6-037
    domain: domain6
    question: "In threat modeling, which STRIDE category is most relevant to an API endpoint that accepts user-controlled object IDs and returns records without verifying the requester owns them?"
    options:
      - "Spoofing"
      - "Tampering"
      - "Information Disclosure"
      - "Denial of Service"
    correct_answer: 2
    explanations:
      correct: "Information Disclosure (the 'I' in STRIDE) occurs when data is exposed to unauthorized parties. An API returning another user's records without ownership verification exposes confidential information — this is Insecure Direct Object Reference (IDOR/BOLA), which directly violates confidentiality. The attacker accesses data they should not be able to see."
      incorrect:
        - "Spoofing involves impersonating another identity — the described scenario involves accessing data without impersonation."
        - "Tampering involves modifying data — this scenario involves reading/accessing unauthorized data, not modifying it."
        - "Information Disclosure (unauthorized access to another user's records) is the correct STRIDE category for this IDOR vulnerability."
        - "Denial of Service involves making services unavailable — unauthorized data access is an availability concern, not DoS."
    difficulty: "hard"
    tags: ["threat-modeling", "STRIDE", "assessment"]

  - id: q-d6-038
    domain: domain6
    question: "A penetration tester receives only the target organization's name and public IP ranges before testing. No credentials, network diagrams, or internal documentation are provided. What type of test is this?"
    options:
      - "White box test"
      - "Gray box test"
      - "Black box test"
      - "Crystal box test"
    correct_answer: 2
    explanations:
      correct: "A black box test (also called opaque-box testing) gives the tester no prior knowledge of internal systems, credentials, or architecture — only the target name and publicly available information. The tester must discover the attack surface through reconnaissance, simulating an external attacker's perspective. It is the most realistic simulation of an external threat."
      incorrect:
        - "White box testing provides full knowledge: source code, architecture, credentials, network diagrams — the tester has complete insider information."
        - "Gray box testing provides partial knowledge (some credentials, documentation, or network diagrams) — the described scenario provides none."
        - "Black box testing (no internal knowledge, tester must discover everything) is the correct answer."
        - "Crystal box is another term for white box testing (full knowledge) — not the scenario described."
    difficulty: "easy"
    tags: ["pen-testing", "testing-types"]

  - id: q-d6-039
    domain: domain6
    question: "Which security testing technique is most effective for discovering business logic vulnerabilities in a web application?"
    options:
      - "Automated SAST scanning"
      - "Automated DAST scanning"
      - "Manual penetration testing"
      - "Fuzzing"
    correct_answer: 2
    explanations:
      correct: "Business logic vulnerabilities (e.g., price manipulation, workflow bypass, privilege abuse) require understanding of how the application is supposed to work and creative thinking about how to abuse it. Automated tools lack the contextual understanding to identify these — a human tester who understands the application's business purpose can discover logic flaws that scanners will never find."
      incorrect:
        - "SAST analyzes source code for known vulnerability patterns — it cannot understand business logic or test application behavior."
        - "DAST tests a running application but uses pattern-matching and predefined attack sequences — it lacks the contextual understanding to find logic flaws."
        - "Manual penetration testing by an experienced tester who understands the business context is the most effective for logic vulnerabilities."
        - "Fuzzing sends random/malformed inputs to find crashes and input handling bugs — it is not effective for business logic vulnerabilities that require understanding intended behavior."
    difficulty: "medium"
    tags: ["pen-testing", "testing-types", "business-logic"]

  - id: q-d6-040
    domain: domain6
    question: "What is the purpose of including 'rules of engagement' in a penetration testing contract?"
    options:
      - "To establish payment terms between the tester and client"
      - "To define scope, authorized targets, test timing, and emergency contacts to ensure testing stays within legal and operational boundaries"
      - "To guarantee that all vulnerabilities will be found"
      - "To specify which vulnerability scanning tools must be used"
    correct_answer: 1
    explanations:
      correct: "Rules of Engagement define: what systems are in-scope vs. out-of-scope, testing timeframes (can you test during business hours?), authorized techniques (can you use destructive tests?), emergency escalation contacts (if a tester accidentally takes down a critical system), and communication procedures. They protect both the tester (legal authorization) and the client (prevent unintended disruption)."
      incorrect:
        - "Payment terms are part of the engagement contract but not the rules of engagement — rules of engagement focus on technical and operational scope."
        - "Defining authorized scope, targets, timing, and emergency contacts to ensure legal and safe testing is the correct purpose of rules of engagement."
        - "No penetration testing engagement can guarantee complete vulnerability coverage — rules of engagement define scope and authorization, not completeness guarantees."
        - "Tool selection may be discussed but is typically the tester's professional judgment — rules of engagement focus on authorization and scope."
    difficulty: "medium"
    tags: ["pen-testing", "governance"]

  - id: q-d6-041
    domain: domain6
    question: "A red team exercise differs from a standard penetration test primarily in which way?"
    options:
      - "Red teams only test network security; pen tests cover all attack surfaces"
      - "Red teams simulate a persistent, targeted threat actor to test detection and response capabilities; pen tests focus on finding and documenting vulnerabilities"
      - "Red teams are always internal; pen tests are always external"
      - "Red teams report to the CEO; pen testers report to the CISO"
    correct_answer: 1
    explanations:
      correct: "Red team exercises simulate a realistic, persistent advanced threat actor attempting to achieve specific objectives (e.g., access financial data, disrupt operations). They test not just vulnerabilities but also the organization's detection capabilities and incident response. The blue team (SOC) doesn't know the red team is active. Standard pen tests focus on comprehensive vulnerability identification and documentation."
      incorrect:
        - "Red teams test all attack surfaces — physical, social, and technical — typically a broader scope than traditional pen tests."
        - "Simulating a persistent threat actor to test detection and response (vs. finding and documenting vulnerabilities) is the key red team differentiator."
        - "Both red teams and pen testers can be internal employees or external consultants — organizational location is not the distinction."
        - "Reporting structure varies by organization and doesn't define the difference between red teaming and pen testing."
    difficulty: "medium"
    tags: ["pen-testing", "red-team", "assessment"]

  - id: q-d6-042
    domain: domain6
    question: "NIST SP 800-115 defines which four phases of information security assessment?"
    options:
      - "Reconnaissance, Scanning, Exploitation, Reporting"
      - "Planning, Discovery, Attack, Reporting"
      - "Identify, Protect, Detect, Respond"
      - "Pre-engagement, Intelligence Gathering, Vulnerability Analysis, Exploitation"
    correct_answer: 1
    explanations:
      correct: "NIST SP 800-115 (Technical Guide to Information Security Testing and Assessment) defines four phases: Planning (objectives, rules of engagement, logistics), Discovery (information gathering, system identification, network scanning), Attack (vulnerability testing and exploitation), Reporting (findings documentation, risk rating, recommendations). This is the NIST-specific methodology."
      incorrect:
        - "Reconnaissance, Scanning, Exploitation, Reporting describes the Penetration Testing Execution Standard (PTES) phases — not specifically NIST SP 800-115."
        - "Planning, Discovery, Attack, Reporting are the four NIST SP 800-115 phases — this is the correct answer."
        - "Identify, Protect, Detect, Respond describes the NIST Cybersecurity Framework (CSF) functions — not SP 800-115 assessment phases."
        - "Pre-engagement, Intelligence Gathering, Vulnerability Analysis, Exploitation describes the PTES (Penetration Testing Execution Standard) — not NIST SP 800-115."
    difficulty: "hard"
    tags: ["standards", "NIST", "pen-testing", "SP800-115"]

  - id: q-d6-043
    domain: domain6
    question: "A security assessment team tests an application by attempting to access admin features using a regular user account. Which testing category does this represent?"
    options:
      - "Denial of service testing"
      - "Authentication bypass testing"
      - "Privilege escalation and authorization testing"
      - "SQL injection testing"
    correct_answer: 2
    explanations:
      correct: "Testing whether a regular user can access administrative features that should require elevated privileges is authorization testing — specifically testing for vertical privilege escalation (a lower-privileged user gaining higher-privileged access). This directly tests whether authorization controls enforce proper access boundaries."
      incorrect:
        - "Denial of service testing attempts to make services unavailable — accessing admin features with a regular account doesn't involve disrupting availability."
        - "Authentication bypass tests whether users can skip the authentication process entirely — the described scenario involves an authenticated user attempting to exceed their authorization."
        - "Privilege escalation and authorization testing (testing whether lower-privileged users can access higher-privileged functionality) is the correct answer."
        - "SQL injection tests database query manipulation through user input — not testing authorization boundaries between user roles."
    difficulty: "medium"
    tags: ["pen-testing", "authorization", "assessment"]

  - id: q-d6-044
    domain: domain6
    question: "Which of the following best describes the purpose of a 'compensating control' in a PCI DSS compliance context?"
    options:
      - "A control that provides additional security beyond what PCI DSS requires"
      - "An alternative control used when the primary PCI DSS requirement cannot be met, providing equivalent risk reduction"
      - "A temporary control while the primary control is being installed"
      - "A control that compensates for the high cost of other security investments"
    correct_answer: 1
    explanations:
      correct: "PCI DSS allows compensating controls when an organization cannot implement a specific required control due to legitimate technical or business constraints. The compensating control must: address the risk of the original requirement, provide equivalent or greater security, and be formally documented and validated by a QSA. It is not a permanent replacement — the primary control should be implemented when feasible."
      incorrect:
        - "Additional security beyond PCI DSS requirements describes an 'enhanced control' or defense-in-depth addition — not a compensating control."
        - "An alternative control providing equivalent risk reduction when the primary control cannot be implemented is the correct PCI DSS definition of a compensating control."
        - "Temporary controls during installation are operational workarounds — PCI compensating controls are formal documented alternatives, not just interim measures."
        - "Compensating controls are about meeting security requirements when primary controls can't be implemented — not about cost management."
    difficulty: "medium"
    tags: ["compliance", "PCI", "controls"]

  - id: q-d6-045
    domain: domain6
    question: "A security team wants to assess their organization's susceptibility to phishing attacks. What is the MOST appropriate approach?"
    options:
      - "Block all external email without warning users"
      - "Conduct authorized simulated phishing campaigns and use results for targeted training"
      - "Review email server logs for past phishing attempts"
      - "Ask employees to self-report how often they click suspicious links"
    correct_answer: 1
    explanations:
      correct: "Authorized simulated phishing campaigns (using platforms like KnowBe4, Proofpoint Security Awareness) send realistic phishing emails to employees and measure click rates, credential submission rates, and reporting rates. Results reveal actual susceptibility and identify employees needing additional training. The simulation must be authorized by leadership and results used for education, not punishment."
      incorrect:
        - "Blocking all external email destroys business communication — it is not an assessment approach and would not improve resilience to phishing."
        - "Authorized simulated phishing campaigns followed by targeted training is the most appropriate and measurable assessment approach."
        - "Log review shows past attack attempts but not employee susceptibility — it doesn't reveal who would click a well-crafted phishing email."
        - "Self-reporting is highly inaccurate — employees either don't remember, underreport to avoid embarrassment, or don't recognize what constitutes suspicious behavior."
    difficulty: "easy"
    tags: ["social-engineering", "assessment", "awareness"]

  - id: q-d6-046
    domain: domain6
    question: "Which metric best measures the effectiveness of a vulnerability management program over time?"
    options:
      - "Total number of vulnerabilities discovered per scan"
      - "Mean time to remediate (MTTR) critical vulnerabilities"
      - "Number of vulnerability scanners deployed"
      - "Total security budget allocated to patching"
    correct_answer: 1
    explanations:
      correct: "Mean Time to Remediate (MTTR) critical vulnerabilities measures how quickly identified vulnerabilities are actually fixed — the most important outcome of a vulnerability management program. A program that finds many vulnerabilities but remedates them slowly provides limited security value. MTTR tracks the end-to-end cycle from discovery to verified remediation."
      incorrect:
        - "Total vulnerabilities found measures the scan's coverage but not program effectiveness — a system might find all vulnerabilities but never fix them."
        - "MTTR for critical vulnerabilities measures actual remediation speed — the most meaningful effectiveness metric."
        - "Number of scanners measures tool deployment, not program effectiveness — more scanners with poor remediation is still ineffective."
        - "Budget allocated to patching measures investment but not outcomes — a large budget with poor execution produces poor results."
    difficulty: "medium"
    tags: ["vulnerability", "metrics", "management"]

  - id: q-d6-047
    domain: domain6
    question: "A security team is conducting a fuzzing test against a new API. What types of vulnerabilities is fuzzing most likely to discover?"
    options:
      - "Broken authentication and session management"
      - "Business logic errors and workflow bypasses"
      - "Input handling crashes, buffer overflows, and format string vulnerabilities"
      - "SQL injection in ORM-based database queries"
    correct_answer: 2
    explanations:
      correct: "Fuzzing sends large volumes of random, malformed, or unexpected inputs to discover how a program handles invalid data. It is most effective at finding: crashes from unhandled exceptions, buffer overflows from oversized inputs, format string bugs, null pointer dereferences, and integer overflows — essentially any bug triggered by unexpected input that causes abnormal behavior."
      incorrect:
        - "Authentication and session management vulnerabilities require understanding of application logic and state — fuzzing's random inputs don't specifically target these."
        - "Business logic vulnerabilities require understanding of intended application behavior — fuzzing cannot reason about business rules."
        - "Input handling crashes, buffer overflows, and format string vulnerabilities are the primary targets of fuzzing — this is correct."
        - "ORM-based queries with parameterization are generally not vulnerable to injection — and fuzzing doesn't specifically target database layer vulnerabilities."
    difficulty: "medium"
    tags: ["fuzzing", "testing", "vulnerabilities"]

  - id: q-d6-048
    domain: domain6
    question: "A risk register entry shows: Risk = 'Database backup failure', Likelihood = High, Impact = Critical, Current Controls = 'Manual backup verification monthly', Residual Risk = High. What does this entry suggest the organization should do?"
    options:
      - "Accept the residual risk since current controls are documented"
      - "Implement additional or stronger controls to reduce the high residual risk"
      - "Transfer the risk to a third-party backup provider immediately"
      - "Remove this item from the risk register as it is already controlled"
    correct_answer: 1
    explanations:
      correct: "A high residual risk (remaining after current controls) on a Critical Impact risk indicates the current controls are insufficient. The risk register is a living document that drives action. High residual risk on critical assets requires implementing additional controls — perhaps automated backup verification, more frequent testing, offsite replication, and regular recovery testing — to reduce residual risk to an acceptable level."
      incorrect:
        - "Documented controls do not make residual risk acceptable if the residual risk level remains High/Critical — documentation records the state, it doesn't resolve the risk."
        - "Implementing additional controls to reduce the unacceptably high residual risk is the correct response."
        - "Risk transfer may be appropriate but should be evaluated after considering additional mitigation options — immediate transfer without analysis may be premature."
        - "Active high-residual-risk items must remain in the risk register with updated treatment plans — removing them creates false assurance."
    difficulty: "medium"
    tags: ["risk", "governance", "risk-register"]

  - id: q-d6-051
    domain: domain6
    question: "Security regression testing is performed primarily to verify which of the following?"
    options:
      - "That new features do not introduce new security vulnerabilities"
      - "That previously identified and patched vulnerabilities have not been reintroduced"
      - "That all user input is validated correctly"
      - "That the application meets performance benchmarks"
    correct_answer: 1
    explanations:
      correct: "Regression testing in security retests previously fixed vulnerabilities to verify: the fix works correctly, the fix hasn't been accidentally removed by subsequent code changes, and related code areas haven't been broken. It is a critical part of vulnerability management lifecycle — without regression testing, vulnerabilities can silently return."
      incorrect:
        - "Testing new features for new vulnerabilities is standard security testing — regression testing specifically retests previously known issues."
        - "Verifying that previously fixed vulnerabilities haven't been reintroduced is the correct definition of security regression testing."
        - "Input validation testing is a type of functional security testing — not regression testing specifically."
        - "Performance benchmarks are non-functional testing — security regression testing focuses on verifying security fixes remain effective."
    difficulty: "medium"
    tags: ["testing", "vulnerability", "SDLC"]

  - id: q-d6-052
    domain: domain6
    question: "A security manager wants to demonstrate the ROI of the security program to executive leadership. Which type of metric is most persuasive for this purpose?"
    options:
      - "Number of security tools deployed"
      - "Percentage of systems with antivirus installed"
      - "Reduction in mean time to detect (MTTD) and mean time to respond (MTTR) over the past year"
      - "Number of phishing emails blocked by email gateway"
    correct_answer: 2
    explanations:
      correct: "Executives care about outcomes and risk reduction — not tool counts. Demonstrating that MTTD decreased from 45 days to 8 days and MTTR from 15 days to 3 days shows measurable improvement in security capability directly linked to reduced breach impact. These outcome metrics connect security investment to business risk reduction."
      incorrect:
        - "Number of tools deployed is an input metric — executives need outcome metrics showing whether the security program is making the organization safer."
        - "Antivirus coverage is an implementation metric — it shows deployment but not effectiveness or risk reduction."
        - "MTTD/MTTR improvement over time demonstrates measurable, business-relevant security program effectiveness — these are outcome metrics executives can relate to breach risk and cost."
        - "Emails blocked is a volume metric — it shows activity but not whether the organization is more secure as a result."
    difficulty: "medium"
    tags: ["governance", "metrics", "management"]

  - id: q-d6-049
    domain: domain6
    question: "Which log source would be MOST useful for detecting a successful SQL injection attack that exfiltrated data from a web application database?"
    options:
      - "Network firewall logs"
      - "Web application and database query logs"
      - "Physical access control logs"
      - "DNS query logs"
    correct_answer: 1
    explanations:
      correct: "SQL injection attacks occur at the application layer — firewall logs typically only see TCP connections, not the payload content. Web application logs capture HTTP requests (revealing injection payloads in URL parameters or POST bodies) and database query logs capture the malformed SQL queries that actually executed. Together they provide the clearest evidence of SQL injection attacks."
      incorrect:
        - "Firewall logs show connection-level data (source IP, destination port) — they typically cannot inspect or log HTTP request content or SQL queries."
        - "Web application and database query logs capturing the injection payload and executed queries are the most useful sources."
        - "Physical access logs track building entry — irrelevant to detecting a web-layer attack."
        - "DNS logs might show exfiltration via DNS tunneling — but for SQL injection data exfiltration through the application, web and database logs are more directly relevant."
    difficulty: "medium"
    tags: ["monitoring", "logs", "assessment"]

  - id: q-d6-050
    domain: domain6
    question: "An organization uses CIS Benchmarks to evaluate its system configurations. These benchmarks represent which type of security standard?"
    options:
      - "Regulatory compliance mandates"
      - "Vendor-neutral, community-developed configuration security best practices"
      - "Government-classified security requirements"
      - "Application-specific secure coding standards"
    correct_answer: 1
    explanations:
      correct: "CIS (Center for Internet Security) Benchmarks are consensus-based, vendor-neutral configuration guides developed by security communities, government agencies, and industry experts. They define secure configuration baselines for operating systems, cloud platforms, and applications. Organizations use them as starting points for security hardening and compliance evidence."
      incorrect:
        - "CIS Benchmarks are voluntary best practice guides — they are not regulatory mandates (HIPAA, PCI DSS are regulatory). However, they are often used as evidence of compliance."
        - "Community-developed, vendor-neutral configuration security best practices is the correct description of CIS Benchmarks."
        - "CIS Benchmarks are public, unclassified documents freely available for any organization — not government-classified requirements."
        - "CIS Benchmarks cover system and infrastructure configurations — not application source code security."
    difficulty: "easy"
    tags: ["standards", "compliance", "configuration"]
