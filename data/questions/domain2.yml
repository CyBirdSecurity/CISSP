    tags: ["data-quality", "integrity"]

  - id: q-d2-053
    domain: domain2
    question: "A healthcare organization needs to share patient data with a research team but wants to ensure the research team cannot identify individual patients. Which technique is most appropriate?"
    options:
      - "Tokenization"
      - "Encryption"
      - "Anonymization"
      - "Pseudonymization"
    correct_answer: 2
    explanations:
