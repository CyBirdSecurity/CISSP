  - id: q-d2-043
    domain: domain2
    question: "What is a key challenge with protecting 'data in use'?"
    options:
      - "Data in use is always encrypted so it requires no additional protection"
      - "Data must be decrypted in memory to be processed, making it temporarily exposed and difficult to protect"
      - "Data in use cannot be accessed by the operating system"
      - "Data in use can only be protected by physical security controls"
    correct_answer: 1
    explanations:
      correct: "Data in use (actively processed in RAM/CPU) must be decrypted to be processed, creating a window of exposure. Technologies addressing this include Trusted Execution Environments (TEE), Intel SGX enclaves, and homomorphic encryption (which allows computation on encrypted data without decryption)."
      incorrect:
        - "Data in use is typically in plaintext in memory — encryption must be removed for computation, making it the hardest state to protect."
        - "Decryption in memory creating temporary exposure is the key challenge with data in use protection — this is correct."
        - "The OS does access data in use — memory-based attacks like cold boot attacks exploit this."
        - "Physical controls alone cannot protect data in use from software-based memory attacks — TEEs and hardware security modules are needed."
    difficulty: "hard"
    tags: ["data-states", "encryption"]

  - id: q-d2-044
    domain: domain2
    question: "What is the primary purpose of 'data classification' in an organization?"
