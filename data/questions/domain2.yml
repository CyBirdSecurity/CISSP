      - "Replacing a person's name with a consistent but artificial identifier while keeping the record otherwise intact"
      - "Encrypting an entire database with AES-256"
      - "Printing data on paper instead of storing it digitally"
    correct_answer: 1
    explanations:
      correct: "Pseudonymization replaces directly identifying information (like a name) with a pseudonym (like a patient ID) while keeping other data fields usable. The mapping can be reversed with additional information. GDPR recognizes pseudonymization as a risk reduction measure but not full anonymization."
      incorrect:
        - "Deleting a field is data minimization or anonymization — pseudonymization keeps the record usable with a substituted identifier."
        - "Replacing identifying info with a consistent artificial identifier is pseudonymization — this is correct."
        - "Full database encryption is a confidentiality control — pseudonymization specifically substitutes identifiers while keeping data functionally useful."
        - "Printing on paper is a media format change — not a pseudonymization technique."
