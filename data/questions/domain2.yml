        - "Encryption protects data confidentiality but the data remains identifiable once decrypted — it does not de-identify the data."
        - "Anonymization (irreversible de-identification) is the correct approach when researchers must not be able to identify individuals."
        - "Pseudonymization replaces identifiers with pseudonyms but maintains a re-identification key — pseudonymized data is still personal data under GDPR and HIPAA."
