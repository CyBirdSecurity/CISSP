      incorrect:
        - "Recovering deleted files is forensic data recovery — DLP is focused on preventing unauthorized disclosure, not recovery."
        - "Monitoring and preventing unauthorized data transmission is the primary purpose of DLP — this is correct."
        - "Endpoint encryption is a separate control (FDE/file encryption) — DLP focuses on detecting and blocking policy violations."
        - "Backup and recovery management is a separate function handled by backup software — not DLP."
