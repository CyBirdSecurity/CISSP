    tags: ["data-protection", "tokenization", "PCI"]

  - id: q-d2-056
    domain: domain2
    question: "An employee leaves an organization but their Active Directory account remains active for 6 months. This best represents which type of security risk?"
    options:
      - "Privilege creep"
      - "Orphaned accounts"
      - "Credential stuffing"
      - "Excessive access"
    correct_answer: 1
    explanations:
      correct: "Orphaned accounts are accounts belonging to users who are no longer with the organization (departed employees, contractors, vendors) that were not deprovisioned. They represent a significant risk because they may be exploited by former employees for unauthorized access or by external attackers who compromise the abandoned credentials."
      incorrect:
        - "Privilege creep refers to the gradual accumulation of access rights beyond what is needed for a current role — it describes excessive permissions in active accounts, not accounts of departed users."
        - "Orphaned accounts (active accounts of departed users) is the correct answer."
        - "Credential stuffing is an attack where breached credentials are used against other services — not an internal account management issue."
        - "Excessive access describes active users having more permissions than needed — not accounts that should have been disabled entirely."
