questions:
  - id: q-d2-001
    domain: domain2
    question: "Who is responsible for determining the classification level and access requirements for a dataset?"
    options:
      - "Data custodian"
      - "Data owner"
      - "Security administrator"
      - "Data processor"
    correct_answer: 1
    explanations:
      correct: "The data owner (typically a senior manager or executive) is responsible for classifying data and determining who should have access. They are accountable for the data and set the protection requirements."
      incorrect:
        - "The data custodian implements the security controls defined by the owner — they do not determine classification or access requirements."
        - "The data owner determines classification — not the security administrator, who helps implement technical controls."
        - "The data processor (under GDPR) processes data on behalf of the controller — they do not set classification levels."
    difficulty: "easy"
    tags: ["roles", "classification"]

  - id: q-d2-002
    domain: domain2
    question: "An organization is disposing of hard drives from a system that processed classified government information. What is the most secure disposal method?"
    options:
      - "Delete all files and format the drives"
      - "Overwrite the drives with random data seven times"
      - "Degauss and physically destroy the drives"
      - "Use the OS secure delete function"
    correct_answer: 2
    explanations:
      correct: "For classified media, the most secure method is degaussing (for magnetic drives) combined with physical destruction. This ensures no data recovery is possible and meets requirements for sensitive data disposal."
      incorrect:
        - "Deleting files and formatting only removes the file system references — data remains recoverable using forensic tools."
        - "Overwriting is effective for non-classified data but for classified information, physical destruction is required to meet strict standards."
        - "Degauss and physical destruction is the correct answer for classified data — it ensures complete, irreversible elimination."
        - "OS secure delete functions vary in effectiveness and are not certified for classified data disposal."
    difficulty: "medium"
    tags: ["data-destruction", "media"]

  - id: q-d2-003
    domain: domain2
    question: "Under GDPR, which party determines the purposes and means of processing personal data and bears primary legal responsibility?"
    options:
      - "Data subject"
      - "Data processor"
      - "Data controller"
      - "Supervisory authority"
    correct_answer: 2
    explanations:
      correct: "The data controller determines why (purposes) and how (means) personal data is processed and bears primary legal responsibility for GDPR compliance. They can be fined up to 4% of global annual turnover for violations."
      incorrect:
        - "The data subject is the individual whose data is being processed — they have rights but are not responsible for processing decisions."
        - "The data processor processes data on behalf of and under instruction from the controller — they have obligations but the controller bears primary responsibility."
        - "The data controller is the correct answer — they determine purposes and means and bear primary legal responsibility."
        - "Supervisory authorities (like the ICO) enforce GDPR — they do not process or control personal data."
    difficulty: "medium"
    tags: ["privacy", "GDPR"]

  - id: q-d2-004
    domain: domain2
    question: "What is 'data remanence' and why is it a security concern?"
    options:
      - "Data that is copied to multiple locations, increasing exposure"
      - "Residual data that remains on storage media after deletion attempts"
      - "Encrypted data that can no longer be decrypted"
      - "Data retained beyond its required retention period"
    correct_answer: 1
    explanations:
      correct: "Data remanence refers to residual representations of data that persist on storage media after deletion. Standard deletion only removes file system pointers — the actual data remains until overwritten and may be recoverable forensically."
      incorrect:
        - "Data copied to multiple locations is a data sprawl or data proliferation issue — not data remanence."
        - "Data remanence is residual data after deletion — this is the correct answer."
        - "Unrecoverable encrypted data describes cryptographic erasure or key destruction — not remanence."
        - "Data kept beyond retention requirements is a compliance issue but not data remanence."
    difficulty: "medium"
    tags: ["data-destruction", "remanence"]

  - id: q-d2-005
    domain: domain2
    question: "Which data state requires encryption using protocols like TLS or IPsec?"
    options:
      - "Data at rest"
      - "Data in transit"
      - "Data in use"
      - "Data in archive"
    correct_answer: 1
    explanations:
      correct: "Data in transit (moving across a network) should be protected with TLS, IPsec, or other transport encryption protocols. This prevents interception and eavesdropping during transmission."
      incorrect:
        - "Data at rest (stored) requires encryption solutions like AES-256 for disk/database encryption — not TLS/IPsec."
        - "Data in transit is the correct answer — TLS and IPsec protect data moving across networks."
        - "Data in use (actively processed in RAM) is the hardest state to protect — technologies like Trusted Execution Environments (TEE) and homomorphic encryption address this."
        - "Data in archive is a form of data at rest and requires storage encryption, not TLS/IPsec."
    difficulty: "easy"
    tags: ["data-states", "encryption"]

  - id: q-d2-006
    domain: domain2
    question: "What is the primary difference between 'clearing' and 'purging' storage media?"
    options:
      - "Clearing is physical destruction; purging is overwriting"
      - "Clearing removes data for internal reuse; purging makes data irrecoverable even with lab techniques"
      - "They are equivalent methods that achieve the same level of data removal"
      - "Clearing works on SSDs; purging works on magnetic media"
    correct_answer: 1
    explanations:
      correct: "Clearing (e.g., overwriting) makes data inaccessible through normal means but may be recoverable with lab techniques. Purging (e.g., degaussing, cryptographic erasure) makes data recovery infeasible even with advanced forensic techniques."
      incorrect:
        - "Physical destruction is a separate sanitization method. Clearing is overwriting; purging includes degaussing and more thorough methods."
        - "Clearing is for internal reuse where casual recovery is the concern; purging is for releasing media outside the organization where lab recovery is a concern."
        - "They are not equivalent — they provide different levels of assurance and are appropriate for different situations."
        - "The choice of method is based on the classification of data and the media type, not a simple SSD vs. magnetic distinction."
    difficulty: "hard"
    tags: ["sanitization", "data-destruction"]

  - id: q-d2-007
    domain: domain2
    question: "A cloud provider stores customer data in servers located in Germany. A US government agency issues a subpoena for this data. Which concept most directly governs this situation?"
    options:
      - "Data classification"
      - "Data sovereignty"
      - "Data retention"
      - "Privacy by design"
    correct_answer: 1
    explanations:
      correct: "Data sovereignty holds that data is subject to the laws of the country where it physically resides. This creates jurisdictional conflicts — German data may be protected by GDPR while US law may compel disclosure."
      incorrect:
        - "Data classification determines sensitivity levels but does not govern which country's laws apply to stored data."
        - "Data sovereignty is the correct concept — it addresses jurisdictional authority over data based on its physical location."
        - "Data retention policies determine how long data is kept — not which legal authority can compel access."
        - "Privacy by design is a framework for building privacy into systems from the start — not a legal jurisdiction concept."
    difficulty: "medium"
    tags: ["sovereignty", "legal", "cloud"]

  - id: q-d2-008
    domain: domain2
    question: "Which type of media sanitization renders the device permanently unusable but provides the highest assurance of data destruction?"
    options:
      - "Overwriting"
      - "Degaussing"
      - "Cryptographic erasure"
      - "Physical destruction"
    correct_answer: 3
    explanations:
      correct: "Physical destruction (shredding, incineration, disintegration) renders the media permanently unusable and provides the highest assurance that data cannot be recovered. Required for the highest classification levels."
      incorrect:
        - "Overwriting leaves the media functional for reuse but provides lower assurance as recovery may be possible with advanced tools."
        - "Degaussing works on magnetic media and renders it unusable, but is not effective on SSDs or flash storage."
        - "Cryptographic erasure destroys the encryption key, making data unreadable, but relies on the strength of the encryption."
        - "Physical destruction is correct — it provides the absolute highest assurance of data elimination."
    difficulty: "medium"
    tags: ["sanitization", "data-destruction"]

  - id: q-d2-009
    domain: domain2
    question: "An organization is 'scoping' its NIST SP 800-53 security controls. What does scoping involve?"
    options:
      - "Prioritizing controls by implementation cost"
      - "Identifying and excluding controls that are not applicable to the organization's environment"
      - "Adding additional controls beyond the baseline"
      - "Translating controls into specific technical configurations"
    correct_answer: 1
    explanations:
      correct: "Scoping involves reviewing a security control baseline and identifying controls that are not applicable to the organization's specific environment and excluding them. For example, excluding wireless controls from a wired-only environment."
      incorrect:
        - "Prioritizing controls by cost is part of implementation planning, not scoping. Scoping determines applicability, not priority."
        - "Scoping is about excluding non-applicable controls — this is the correct answer."
        - "Adding controls beyond the baseline is called supplementation, not scoping."
        - "Translating controls into technical configurations is implementation — scoping is a pre-implementation selection activity."
    difficulty: "hard"
    tags: ["compliance", "frameworks"]

  - id: q-d2-010
    domain: domain2
    question: "What is the key difference between a data owner and a data steward?"
    options:
      - "Data owners handle technical implementation; stewards set policy"
      - "Data owners have business accountability; stewards manage day-to-day data quality and governance"
      - "They are interchangeable roles in most organizations"
      - "Data owners only exist in government organizations; stewards are the commercial equivalent"
    correct_answer: 1
    explanations:
      correct: "Data owners have business accountability and make high-level decisions about data classification and access. Data stewards handle operational data governance — ensuring data quality, consistency, and adherence to the owner's policies on a day-to-day basis."
      incorrect:
        - "This is reversed. Data owners set business policy and accountability; technical implementation is the custodian's role."
        - "Data owners have business accountability; data stewards manage day-to-day governance — this is the correct distinction."
        - "They are distinct roles with different responsibilities, though role definitions may vary by organization."
        - "Both roles exist across all sectors, not just government."
    difficulty: "hard"
    tags: ["roles", "governance"]

  - id: q-d2-011
    domain: domain2
    question: "Which privacy principle requires that data collection be limited to only what is necessary for the specific stated purpose?"
    options:
      - "Purpose limitation"
      - "Data minimization"
      - "Storage limitation"
      - "Accuracy"
    correct_answer: 1
    explanations:
      correct: "Data minimization (under GDPR Article 5) requires that personal data be 'adequate, relevant and limited to what is necessary in relation to the purposes for which it is processed.' Collect only what you need."
      incorrect:
        - "Purpose limitation means data collected for one purpose cannot be reprocessed for a different incompatible purpose — it does not limit the volume of collection."
        - "Data minimization is correct — it limits collection to what is necessary for the stated purpose."
        - "Storage limitation addresses how long data is retained — not how much is collected."
        - "Accuracy requires that data be kept correct and up to date — not limited in scope."
    difficulty: "medium"
    tags: ["privacy", "GDPR"]

  - id: q-d2-012
    domain: domain2
    question: "Degaussing is an effective data sanitization method for which type of storage media?"
    options:
      - "Solid State Drives (SSDs)"
      - "USB flash drives"
      - "Magnetic hard disk drives (HDDs)"
      - "Optical discs (CD/DVD)"
    correct_answer: 2
    explanations:
      correct: "Degaussing uses a strong magnetic field to erase data on magnetic storage media (HDDs, magnetic tapes). It is effective on magnetic media but does NOT work on SSDs, flash drives, or optical media."
      incorrect:
        - "Degaussing is NOT effective on SSDs because they use NAND flash memory, which is not affected by magnetic fields."
        - "USB flash drives use NAND flash memory and are not affected by degaussing — overwriting or physical destruction must be used."
        - "Magnetic HDDs are correctly identified as the media type where degaussing is effective."
        - "Optical discs (CD/DVD/Blu-ray) store data using physical pits and lands on the disc surface — magnetic fields have no effect."
    difficulty: "easy"
    tags: ["sanitization", "media"]

    - id: q-d2-013
    domain: domain2
    question: "Which of the following is the most important factor when determining the classification of an asset?"
    options:
      - "The cost to replace the asset"
      - "The value of the asset to the organization"
      - "The age of the asset"
      - "The physical location of the asset"
    correct_answer: 1
    explanations:
      correct: "The value of the asset to the organization (including its sensitivity and the impact of its loss) is the primary driver for classification."
      incorrect:
        - "Replacement cost is a factor in valuation, but classification is more broadly based on the sensitivity of the information."
        - "Age does not necessarily correlate with the sensitivity or importance of data."
        - "Location is a factor for physical protection, but classification is based on the data's inherent value."
    difficulty: "easy"
    tags: ["classification", "valuation"]

  - id: q-d2-014
    domain: domain2
    question: "Which role is responsible for ensuring that data is backed up according to the frequency defined by the data owner?"
    options:
      - "Data steward"
      - "Data custodian"
      - "Privacy officer"
      - "System auditor"
    correct_answer: 1
    explanations:
      correct: "The Data Custodian is responsible for the technical implementation of security controls, including performing backups and ensuring data integrity."
      incorrect:
        - "Data stewards focus on data quality and business metadata, not technical backup tasks."
        - "The privacy officer oversees regulatory compliance regarding personal data."
        - "An auditor reviews controls but does not perform the day-to-day backup operations."
    difficulty: "medium"
    tags: ["roles"]

  - id: q-d2-015
    domain: domain2
    question: "What is the primary purpose of 'Data Labeling' in a security program?"
    options:
      - "To identify the creator of the data"
      - "To ensure that users know how to handle the data according to its classification"
      - "To make the data easier to search in a database"
      - "To prevent the data from being encrypted"
    correct_answer: 1
    explanations:
      correct: "Labels (or markings) provide a clear visual or metadata indicator of a file's classification, ensuring handlers follow the appropriate protection standards."
      incorrect:
        - "While metadata might include the creator, the primary security purpose of a label is to communicate classification."
        - "Searchability is a benefit of indexing, not the primary goal of security labeling."
        - "Labels are often used as a trigger *to* encrypt data, not to prevent it."
    difficulty: "easy"
    tags: ["classification", "labeling"]

  - id: q-d2-016
    domain: domain2
    question: "Which of the following is a drawback of using 'Symmetric Encryption' for data at rest across a large enterprise?"
    options:
      - "It is significantly slower than asymmetric encryption"
      - "Key management and distribution become complex as the number of users increases"
      - "It cannot be used to protect large volumes of data"
      - "It does not provide confidentiality"
    correct_answer: 1
    explanations:
      correct: "In a purely symmetric environment, the number of keys required grows exponentially with the number of users ($n(n-1)/2$), making management difficult."
      incorrect:
        - "Symmetric encryption is actually much faster than asymmetric encryption."
        - "Symmetric encryption is the preferred method for bulk data protection."
        - "Confidentiality is the primary goal of symmetric encryption."
    difficulty: "medium"
    tags: ["encryption", "key-management"]

  - id: q-d2-017
    domain: domain2
    question: "When an organization moves to a public cloud, who is ultimately responsible for the classification of data stored in that cloud?"
    options:
      - "The Cloud Service Provider (CSP)"
      - "The customer (organization)"
      - "The third-party auditor"
      - "The cloud architect"
    correct_answer: 1
    explanations:
      correct: "Under the Shared Responsibility Model, the customer always retains ownership and responsibility for their data and its classification."
      incorrect:
        - "The CSP is responsible for the 'security of the cloud' (infrastructure), not the data inside it."
        - "Auditors verify compliance but do not own the classification process."
        - "Architects design the environment, but the Data Owner within the organization sets classification."
    difficulty: "medium"
    tags: ["cloud", "roles"]

  - id: q-d2-018
    domain: domain2
    question: "Which of the following describes 'Cryptographic Erasure' (Crypto-Erase)?"
    options:
      - "Overwriting every sector of a drive with zeros"
      - "Physically shredding a TPM chip"
      - "Deleting the encryption key for encrypted data to make it unrecoverable"
      - "Using a magnet to scramble the data on an SSD"
    correct_answer: 2
    explanations:
      correct: "Cryptographic erasure involves destroying the decryption key. Without the key, the encrypted data becomes mathematically impossible to recover."
      incorrect:
        - "Overwriting is a different form of sanitization (Clearing)."
        - "Shredding is physical destruction."
        - "Magnets (degaussing) do not work on SSDs."
    difficulty: "medium"
    tags: ["sanitization", "encryption"]

  - id: q-d2-019
    domain: domain2
    question: "What is the primary risk of using 'Link Encryption' instead of 'End-to-End Encryption'?"
    options:
      - "The data is unencrypted at each intermediate node/router"
      - "It is slower than end-to-end encryption"
      - "It does not protect the packet headers"
      - "It requires more expensive hardware"
    correct_answer: 0
    explanations:
      correct: "Link encryption decrypts and re-encrypts data at every hop. This means the data is in 'clear text' inside the memory of every router/switch along the path."
      incorrect:
        - "Link encryption is often faster because it is handled in hardware."
        - "Link encryption actually *does* protect headers; end-to-end typically only protects the payload."
        - "Cost varies, but the primary security risk is exposure at intermediate nodes."
    difficulty: "hard"
    tags: ["encryption", "network-security"]

  - id: q-d2-020
    domain: domain2
    question: "Which standard is most commonly used for the classification and labeling of government information in the United States?"
    options:
      - "ISO 27001"
      - "NIST SP 800-53"
      - "Executive Order 13526"
      - "COBIT 5"
    correct_answer: 2
    explanations:
      correct: "Executive Order 13526 establishes the uniform system for classifying, safeguarding, and declassifying national security information."
      incorrect:
        - "ISO 27001 is an international management standard."
        - "NIST 800-53 provides security controls, but EO 13526 defines the classification levels themselves."
        - "COBIT is a framework for IT governance."
    difficulty: "medium"
    tags: ["legal", "government"]

  - id: q-d2-021
    domain: domain2
    question: "What is 'Data Sprawl'?"
    options:
      - "The process of spreading data across multiple backup tapes"
      - "The unauthorized or accidental duplication of data across various systems and locations"
      - "A method of increasing database performance"
      - "The use of wide-area networks to move data"
    correct_answer: 1
    explanations:
      correct: "Data sprawl occurs when data is copied to various locations (email, USBs, cloud storage) without oversight, making it difficult to protect and manage."
      incorrect:
        - "Redundancy is intentional; sprawl is usually uncontrolled."
        - "Sprawl generally decreases performance and increases security risk."
        - "Moving data over a WAN is simply data transfer."
    difficulty: "easy"
    tags: ["data-management"]

  - id: q-d2-022
    domain: domain2
    question: "Which of the following is an example of 'Data in Use'?"
    options:
      - "An Excel file saved on a network drive"
      - "A database record being updated in a server's RAM"
      - "An email being sent over a VPN"
      - "A backup stored on an off-site tape"
    correct_answer: 1
    explanations:
      correct: "Data in use refers to data actively being processed by a CPU or residing in system memory (RAM)."
      incorrect:
        - "Saved files are 'Data at Rest'."
        - "Emails in transit are 'Data in Motion'."
        - "Backups are 'Data at Rest'."
    difficulty: "easy"
    tags: ["data-states"]

  - id: q-d2-023
    domain: domain2
    question: "Why is 'Physical Destruction' often required for SSDs instead of 'Degaussing'?"
    options:
      - "SSDs are too small for degaussers"
      - "SSDs do not store data magnetically"
      - "SSDs are too expensive to degauss"
      - "Degaussing only works on files, not hardware"
    correct_answer: 1
    explanations:
      correct: "SSDs use flash memory (integrated circuits). Degaussing only works by disrupting magnetic fields, which SSDs do not use."
      incorrect:
        - "Size is not the limiting factor; the storage technology is."
        - "Cost is irrelevant to the effectiveness of the physics."
        - "Degaussing is a hardware-level process, but it requires magnetic media."
    difficulty: "easy"
    tags: ["sanitization", "media"]

  - id: q-d2-024
    domain: domain2
    question: "In the context of asset security, what does 'Curie Temperature' relate to?"
    options:
      - "The temperature at which a CPU fails"
      - "The temperature at which magnetic media loses its magnetic properties"
      - "The heat required to incinerate paper documents"
      - "The ideal temperature for a cold site"
    correct_answer: 1
    explanations:
      correct: "The Curie point is the temperature at which a ferromagnetic material becomes paramagnetic, effectively erasing magnetic data. This is used in thermal destruction/degaussing."
      incorrect:
        - "CPU failure is a thermal throttling or hardware damage issue."
        - "Incineration is physical destruction, but 'Curie Temperature' is a specific magnetic threshold."
        - "Cold sites relate to business continuity, not magnetic physics."
    difficulty: "hard"
    tags: ["sanitization", "media"]

  - id: q-d2-025
    domain: domain2
    question: "Which of the following is a key requirement for 'Data Retention' policies?"
    options:
      - "Keeping all data forever just in case"
      - "Deleting data as soon as the user finishes reading it"
      - "Aligning storage duration with legal, regulatory, and business requirements"
      - "Using the highest level of encryption for all data"
    correct_answer: 2
    explanations:
      correct: "Retention policies must balance business needs with legal requirements (like Sarbanes-Oxley or GDPR) to ensure data is kept only as long as necessary."
      incorrect:
        - "Keeping data forever increases storage costs and legal liability."
        - "Premature deletion can violate laws and hurt business operations."
        - "Encryption is a protection mechanism, not a retention policy."
    difficulty: "medium"
    tags: ["retention", "compliance"]

  - id: q-d2-026
    domain: domain2
    question: "What is the primary goal of 'Data Masking'?"
    options:
      - "To compress data for faster storage"
      - "To protect sensitive data by replacing it with realistic but false data"
      - "To hide a file's extension"
      - "To encrypt data for transmission"
    correct_answer: 1
    explanations:
      correct: "Data masking (or obfuscation) allows developers or analysts to work with functional datasets without seeing actual sensitive information (like PII)."
      incorrect:
        - "Compression is for space saving."
        - "Hiding extensions is a file system trick, not a data security strategy."
        - "Encryption is used for confidentiality; masking is used for usability without exposure."
    difficulty: "medium"
    tags: ["privacy", "obfuscation"]

  - id: q-d2-027
    domain: domain2
    question: "Which of the following describes 'Digital Rights Management' (DRM)?"
    options:
      - "A law that gives users the right to access their data"
      - "Technological tools that control the use, modification, and distribution of copyrighted material"
      - "The process of assigning IP addresses to devices"
      - "A framework for ethical hacking"
    correct_answer: 1
    explanations:
      correct: "DRM uses technology (like persistent encryption) to enforce licensing and prevent unauthorized copying of digital assets."
      incorrect:
        - "The right to access data is part of privacy laws like GDPR."
        - "IP assignment is DHCP."
        - "DRM is a protection technology, not a hacking framework."
    difficulty: "easy"
    tags: ["drm", "protection"]

  - id: q-d2-028
    domain: domain2
    question: "An organization uses 'Scoping' to determine which ISO 27002 controls to implement. What is 'Tailoring' in this context?"
    options:
      - "Removing controls that don't apply"
      - "Adjusting the scoped controls to fit the organization's specific technical environment"
      - "Hiring a consultant to write the policy"
      - "Using a different framework entirely"
    correct_answer: 1
    explanations:
      correct: "Tailoring is the follow-up to scoping. It involves refining the selected controls to ensure they are effective and appropriate for the specific systems in use."
      incorrect:
        - "Removing non-applicable controls is Scoping."
        - "Tailoring is an internal engineering/policy process, not just a hiring action."
        - "Tailoring happens within a framework, not by replacing it."
    difficulty: "hard"
    tags: ["compliance", "frameworks"]

  - id: q-d2-029
    domain: domain2
    question: "Which type of 'Data Discovery' tool is used to find PII across an entire network?"
    options:
      - "Endpoint Detection and Response (EDR)"
      - "Data Loss Prevention (DLP)"
      - "Intrusion Prevention System (IPS)"
      - "Vulnerability Scanner"
    correct_answer: 1
    explanations:
      correct: "DLP tools are specifically designed to scan for patterns (like credit card or social security numbers) to identify and protect sensitive data."
      incorrect:
        - "EDR focuses on malware and threat detection on hosts."
        - "IPS focuses on stopping network attacks."
        - "Vulnerability scanners find weak software/configurations, not specific data types."
    difficulty: "medium"
    tags: ["dlp", "pii"]

  - id: q-d2-030
    domain: domain2
    question: "In the 'Information Life Cycle,' which stage follows 'Store'?"
    options:
      - "Create"
      - "Use"
      - "Archive"
      - "Destroy"
    correct_answer: 1
    explanations:
      correct: "The standard life cycle is Create, Store, Use, Share, Archive, and Destroy. Once data is stored, it is typically accessed for use."
      incorrect:
        - "Create is the first stage."
        - "Archive and Destroy occur much later in the life cycle."
    difficulty: "medium"
    tags: ["lifecycle"]

  - id: q-d2-031
    domain: domain2
    question: "Which of the following is a primary concern for 'Inventory Management' in security?"
    options:
      - "The color of the hardware"
      - "Identifying 'Shadow IT' or unauthorized assets"
      - "Ensuring the cheapest vendors are used"
      - "Tracking the electricity usage of each server"
    correct_answer: 1
    explanations:
      correct: "You cannot protect what you don't know exists. Identifying unauthorized assets is a critical security function of inventory management."
      incorrect:
        - "Physical aesthetics (color) do not impact security."
        - "Procurement handles vendor costs."
        - "Power monitoring is an operational/environmental task."
    difficulty: "easy"
    tags: ["inventory", "governance"]

  - id: q-d2-032
    domain: domain2
    question: "Which security control is most effective against a 'Lost Laptop' scenario involving sensitive data?"
    options:
      - "A complex BIOS password"
      - "Full Disk Encryption (FDE)"
      - "A laptop cable lock"
      - "Anti-virus software"
    correct_answer: 1
    explanations:
      correct: "FDE (like BitLocker) ensures that if the physical device is stolen, the data cannot be read without the decryption key, even if the drive is removed."
      incorrect:
        - "BIOS passwords can often be bypassed or the drive can be moved to another machine."
        - "A cable lock prevents the theft itself, but not the data access if the lock is cut."
        - "Anti-virus does nothing to protect data on a powered-down, stolen device."
    difficulty: "easy"
    tags: ["protection", "encryption"]

  - id: q-d2-033
    domain: domain2
    question: "What is the primary purpose of a 'Data Loss Prevention' (DLP) system?"
    options:
      - "To recover deleted files from storage media"
      - "To monitor, detect, and prevent unauthorized transmission or exfiltration of sensitive data"
      - "To encrypt all data stored on endpoints"
      - "To manage backup and recovery processes"
    correct_answer: 1
    explanations:
      correct: "DLP systems monitor data in motion (network), data at rest (storage), and data in use (endpoints) to detect and prevent unauthorized disclosure of sensitive information. They use content inspection and contextual analysis to enforce data handling policies."
      incorrect:
        - "Recovering deleted files is forensic data recovery — DLP is focused on preventing unauthorized disclosure, not recovery."
        - "Monitoring and preventing unauthorized data transmission is the primary purpose of DLP — this is correct."
        - "Endpoint encryption is a separate control (FDE/file encryption) — DLP focuses on detecting and blocking policy violations."
        - "Backup and recovery management is a separate function handled by backup software — not DLP."
    difficulty: "easy"
    tags: ["dlp", "data-protection"]

  - id: q-d2-034
    domain: domain2
    question: "Which classification level in the US government system represents information whose unauthorized disclosure could cause 'serious damage' to national security?"
    options:
      - "Confidential"
      - "Secret"
      - "Top Secret"
      - "Sensitive But Unclassified (SBU)"
    correct_answer: 1
    explanations:
      correct: "Under Executive Order 13526: Confidential = 'damage'; Secret = 'serious damage'; Top Secret = 'exceptionally grave damage' to national security. Secret is the correct level for 'serious damage.'"
      incorrect:
        - "Confidential covers information whose unauthorized disclosure could cause 'damage' (not 'serious damage') to national security."
        - "Secret = 'serious damage' — this is the correct classification level."
        - "Top Secret covers information whose disclosure could cause 'exceptionally grave damage' — a higher threshold than serious damage."
        - "SBU (Sensitive But Unclassified) covers sensitive information that doesn't meet classified thresholds — it is not a formal national security classification level."
    difficulty: "medium"
    tags: ["classification", "government"]

  - id: q-d2-035
    domain: domain2
    question: "What is the concept of 'Privacy by Design' (PbD)?"
    options:
      - "A method of physically securing paper records"
      - "Embedding privacy protections into systems and processes from the beginning rather than adding them later"
      - "A legal framework for consent management"
      - "The practice of anonymizing all data before storage"
    correct_answer: 1
    explanations:
      correct: "Privacy by Design (PbD), developed by Ann Cavoukian, embeds privacy protections into system design from the start — not as an afterthought. It has seven foundational principles including proactive not reactive, privacy as the default, and end-to-end security. GDPR Article 25 requires 'data protection by design and default.'"
      incorrect:
        - "Physical security of paper records is a physical control — not Privacy by Design."
        - "Embedding privacy into system design from the start is the correct definition of Privacy by Design."
        - "PbD is an engineering/design principle — not a legal framework for consent, though it supports compliance."
        - "Anonymization is one privacy technique — PbD is a broader design philosophy encompassing many privacy-enhancing approaches."
    difficulty: "medium"
    tags: ["privacy", "design"]

  - id: q-d2-036
    domain: domain2
    question: "Under GDPR, what is the maximum timeframe for notifying the supervisory authority after discovering a personal data breach?"
    options:
      - "24 hours"
      - "48 hours"
      - "72 hours"
      - "30 days"
    correct_answer: 2
    explanations:
      correct: "GDPR Article 33 requires notification to the supervisory authority 'without undue delay and, where feasible, not later than 72 hours after having become aware' of a personal data breach. If notification exceeds 72 hours, the reasons for the delay must be provided."
      incorrect:
        - "24 hours is not the GDPR breach notification timeline — 72 hours is the requirement."
        - "48 hours is not the correct GDPR timeframe — it is 72 hours under Article 33."
        - "72 hours is the correct GDPR supervisory authority notification deadline."
        - "30 days is too long — GDPR requires notification within 72 hours. Some US state laws and other regulations use 30-day windows."
    difficulty: "medium"
    tags: ["privacy", "GDPR", "compliance"]

  - id: q-d2-037
    domain: domain2
    question: "What is 'data tokenization' and how does it differ from encryption?"
    options:
      - "Tokenization and encryption are equivalent — both reverse to the original value"
      - "Tokenization replaces sensitive data with a non-sensitive placeholder (token) with no mathematical relationship; encryption uses an algorithm that is reversible with the key"
      - "Tokenization uses stronger algorithms than encryption"
      - "Tokenization is used for data at rest; encryption is used for data in transit"
    correct_answer: 1
    explanations:
      correct: "Tokenization replaces sensitive data (like a credit card number) with a random token stored in a vault. There is no mathematical relationship between the token and original data — the original can only be retrieved by querying the token vault. Encryption is algorithmically reversible with the correct key."
      incorrect:
        - "They are not equivalent — tokenization has no mathematical relationship between token and original; encryption is reversible with a key."
        - "Tokenization is a non-mathematical substitution; encryption is algorithmic and reversible — this correctly distinguishes them."
        - "Tokenization doesn't use 'stronger algorithms' — it uses a mapping in a secure vault rather than cryptographic algorithms."
        - "Both can be used in any data state context — the distinction is about reversibility, not where data lives."
    difficulty: "hard"
    tags: ["data-protection", "tokenization"]

  - id: q-d2-038
    domain: domain2
    question: "Which of the following is an example of a 'Pseudonymization' technique?"
    options:
      - "Deleting the name field from a dataset"
      - "Replacing a person's name with a consistent but artificial identifier while keeping the record otherwise intact"
      - "Encrypting an entire database with AES-256"
      - "Printing data on paper instead of storing it digitally"
    correct_answer: 1
    explanations:
      correct: "Pseudonymization replaces directly identifying information (like a name) with a pseudonym (like a patient ID) while keeping other data fields usable. The mapping can be reversed with additional information. GDPR recognizes pseudonymization as a risk reduction measure but not full anonymization."
      incorrect:
        - "Deleting a field is data minimization or anonymization — pseudonymization keeps the record usable with a substituted identifier."
        - "Replacing identifying info with a consistent artificial identifier is pseudonymization — this is correct."
        - "Full database encryption is a confidentiality control — pseudonymization specifically substitutes identifiers while keeping data functionally useful."
        - "Printing on paper is a media format change — not a pseudonymization technique."
    difficulty: "medium"
    tags: ["privacy", "pseudonymization"]

  - id: q-d2-039
    domain: domain2
    question: "What is the primary security concern with 'shadow IT'?"
    options:
      - "It increases IT department workload"
      - "Unsanctioned systems and services bypass security controls, creating unmanaged risk"
      - "It violates software licensing agreements"
      - "Shadow IT systems are slower than approved systems"
    correct_answer: 1
    explanations:
      correct: "Shadow IT (systems, applications, or services used without IT/security approval) bypasses security vetting, patch management, DLP controls, and access management. Data stored in unsanctioned cloud services or applications is outside the security perimeter and may not be protected or recoverable."
      incorrect:
        - "Increased workload is an operational concern — the primary security concern is unmanaged risk and bypassed controls."
        - "Unsanctioned systems bypassing security controls and creating unmanaged risk is the primary security concern."
        - "Licensing violations are a legal/compliance concern — the security concern is the uncontrolled access to sensitive data."
        - "Performance is not a security concern — the risk is the lack of security oversight and controls."
    difficulty: "medium"
    tags: ["governance", "data-management"]

  - id: q-d2-040
    domain: domain2
    question: "What does NIST SP 800-88 provide guidance on?"
    options:
      - "Encryption standards for federal systems"
      - "Media sanitization — guidelines for sanitizing storage media before disposal or reuse"
      - "Password policy requirements"
      - "Network segmentation for sensitive systems"
    correct_answer: 1
    explanations:
      correct: "NIST SP 800-88 (Guidelines for Media Sanitization) provides guidance on sanitizing storage media including categorizing media types, choosing appropriate sanitization methods (Clear, Purge, Destroy), and documenting the process. It is the authoritative reference for data destruction decisions."
      incorrect:
        - "Encryption standards are covered in other NIST publications (FIPS 140-2/3, SP 800-57) — not SP 800-88."
        - "Media sanitization guidelines is the correct subject of NIST SP 800-88."
        - "Password policies are addressed in NIST SP 800-63B — not SP 800-88."
        - "Network segmentation is covered in NIST SP 800-53 and other guidance — not SP 800-88."
    difficulty: "medium"
    tags: ["sanitization", "NIST"]

  - id: q-d2-041
    domain: domain2
    question: "What is the difference between 'anonymization' and 'pseudonymization'?"
    options:
      - "They are the same process — both terms are used interchangeably in GDPR"
      - "Anonymization is irreversible (re-identification is not possible); pseudonymization is reversible with additional information"
      - "Anonymization is stronger but only applies to medical data; pseudonymization applies to all data"
      - "Pseudonymization is irreversible; anonymization retains a link to the original"
    correct_answer: 1
    explanations:
      correct: "True anonymization is irreversible — re-identifying individuals is not reasonably possible. GDPR does not apply to truly anonymized data. Pseudonymization is reversible if you have the mapping/key — it reduces risk but GDPR still applies to pseudonymized personal data."
      incorrect:
        - "They are distinct under GDPR — anonymized data is outside GDPR scope; pseudonymized data is still personal data under GDPR."
        - "Anonymization is irreversible; pseudonymization is reversible — this correctly distinguishes them."
        - "Both apply to all types of personal data — not just medical."
        - "This is reversed — anonymization is irreversible; pseudonymization retains a reversible link."
    difficulty: "hard"
    tags: ["privacy", "GDPR"]

  - id: q-d2-042
    domain: domain2
    question: "Which concept describes the security practice of ensuring that data is only accessible to users who have a legitimate need for it?"
    options:
      - "Least privilege"
      - "Need to know"
      - "Separation of duties"
      - "Data minimization"
    correct_answer: 1
    explanations:
      correct: "Need to know restricts access to information to only those who require it to perform their specific job function — even if they hold an adequate clearance level. A cleared individual still must have a need to know to access specific information."
      incorrect:
        - "Least privilege limits the access rights and permissions a user holds — need to know specifically addresses whether information should be shared with a cleared individual."
        - "Need to know is the principle restricting information access to those with legitimate operational need — this is correct."
        - "Separation of duties divides critical functions among multiple people — it is about task division, not information access."
        - "Data minimization limits the collection of personal data — need to know restricts access to already-collected data."
    difficulty: "easy"
    tags: ["access-control", "principles"]

  - id: q-d2-043
    domain: domain2
    question: "What is a key challenge with protecting 'data in use'?"
    options:
      - "Data in use is always encrypted so it requires no additional protection"
      - "Data must be decrypted in memory to be processed, making it temporarily exposed and difficult to protect"
      - "Data in use cannot be accessed by the operating system"
      - "Data in use can only be protected by physical security controls"
    correct_answer: 1
    explanations:
      correct: "Data in use (actively processed in RAM/CPU) must be decrypted to be processed, creating a window of exposure. Technologies addressing this include Trusted Execution Environments (TEE), Intel SGX enclaves, and homomorphic encryption (which allows computation on encrypted data without decryption)."
      incorrect:
        - "Data in use is typically in plaintext in memory — encryption must be removed for computation, making it the hardest state to protect."
        - "Decryption in memory creating temporary exposure is the key challenge with data in use protection — this is correct."
        - "The OS does access data in use — memory-based attacks like cold boot attacks exploit this."
        - "Physical controls alone cannot protect data in use from software-based memory attacks — TEEs and hardware security modules are needed."
    difficulty: "hard"
    tags: ["data-states", "encryption"]

  - id: q-d2-044
    domain: domain2
    question: "What is the primary purpose of 'data classification' in an organization?"
    options:
      - "To make data easier to find in search systems"
      - "To ensure data receives appropriate protection proportional to its sensitivity and value"
      - "To comply with every applicable regulation simultaneously"
      - "To reduce storage costs by deleting unimportant data"
    correct_answer: 1
    explanations:
      correct: "Data classification assigns sensitivity levels to data assets so that appropriate (proportional) security controls can be applied. High-value/sensitive data gets stronger controls; less sensitive data gets lighter controls. This enables efficient security spending and appropriate risk management."
      incorrect:
        - "Search indexing and data discovery are separate functions — classification is about sensitivity-based protection."
        - "Ensuring data receives protection proportional to its sensitivity is the primary purpose of classification."
        - "While classification aids compliance, the fundamental purpose is matching protection to sensitivity — not achieving simultaneous regulatory compliance."
        - "Deleting unimportant data is data lifecycle management — classification determines protection levels, not what to delete."
    difficulty: "easy"
    tags: ["classification", "fundamentals"]

  - id: q-d2-045
    domain: domain2
    question: "Which cloud service model places the most data security responsibility on the customer?"
    options:
      - "SaaS (Software as a Service)"
      - "PaaS (Platform as a Service)"
      - "IaaS (Infrastructure as a Service)"
      - "All models share responsibility equally"
    correct_answer: 2
    explanations:
      correct: "In IaaS, the customer manages the OS, middleware, runtime, applications, and data — only physical infrastructure and hypervisor are managed by the provider. This gives the most customer control but also the most customer responsibility for data security."
      incorrect:
        - "In SaaS, the provider manages nearly everything including data security controls — the customer has the least control and responsibility."
        - "In PaaS, the customer manages applications and data — more responsibility than SaaS but less than IaaS."
        - "IaaS places the most data security responsibility on the customer — the shared responsibility model differs significantly across service models."
    difficulty: "medium"
    tags: ["cloud", "shared-responsibility"]

  - id: q-d2-046
    domain: domain2
    question: "What is 'data aggregation' and why is it a privacy concern?"
    options:
      - "Combining databases for performance optimization — not a security concern"
      - "Combining individually innocuous pieces of data to create a more sensitive profile that enables re-identification or reveals private information"
      - "A backup technique for storing data in multiple locations"
      - "The process of encrypting data from multiple sources together"
    correct_answer: 1
    explanations:
      correct: "Data aggregation combines multiple data points (each seemingly harmless alone) to create a detailed profile. Example: name + employer + neighborhood + physical description + daily schedule — individually non-sensitive, combined they enable stalking or targeted attacks. This is a key concern in both privacy and intelligence contexts."
      incorrect:
        - "Database aggregation for performance is a technical optimization — the security concern is about combining sensitive data points to reveal protected information."
        - "Combining innocuous data to create sensitive profiles or enable re-identification is the privacy concern with data aggregation — this is correct."
        - "Storing data in multiple locations is replication/redundancy — not aggregation."
        - "Encrypting combined data is a protection technique — not the definition of data aggregation."
    difficulty: "medium"
    tags: ["privacy", "data-management"]

  - id: q-d2-047
    domain: domain2
    question: "What is the purpose of a 'data retention schedule'?"
    options:
      - "To determine how quickly data can be accessed"
      - "To define how long different types of data must be kept and when they must be destroyed"
      - "To schedule regular backups of all business data"
      - "To prioritize which data is most important to protect"
    correct_answer: 1
    explanations:
      correct: "A data retention schedule defines retention periods for different data categories based on legal requirements, regulatory mandates, and business needs. It ensures data is kept long enough to meet legal obligations (e.g., 7 years for tax records) and destroyed when no longer needed, reducing storage costs and legal liability."
      incorrect:
        - "Data access speed is an availability/performance concern — retention schedules address duration, not speed."
        - "Defining how long data is kept and when to destroy it is the correct purpose of a data retention schedule."
        - "Backup scheduling is an operational continuity activity — retention schedules address the lifecycle of data, not backup frequency."
        - "Data prioritization for protection is part of classification — retention schedules address timing, not protection levels."
    difficulty: "easy"
    tags: ["retention", "lifecycle"]

  - id: q-d2-048
    domain: domain2
    question: "What is a 'data custodian' primarily responsible for?"
    options:
      - "Determining what data the organization should collect"
      - "Classifying data and setting access requirements"
      - "Implementing and maintaining the technical controls that protect data as defined by the data owner"
      - "Negotiating data sharing agreements with third parties"
    correct_answer: 2
    explanations:
      correct: "The data custodian (often IT or system administrators) is responsible for the technical implementation of security controls protecting data — backups, encryption, access control enforcement, patch management. They protect data according to the classification and policies set by the data owner."
      incorrect:
        - "Determining what data to collect is a business and data governance decision — typically the data owner's responsibility."
        - "Classifying data and setting access requirements is the data owner's responsibility — the custodian implements those decisions."
        - "Implementing and maintaining technical controls as defined by the data owner is the custodian's core responsibility — this is correct."
        - "Negotiating data sharing agreements is a legal and governance function — typically data owner, legal counsel, or procurement."
    difficulty: "medium"
    tags: ["roles", "governance"]

  - id: q-d2-049
    domain: domain2
    question: "What is the purpose of 'data masking' in development and testing environments?"
    options:
      - "To prevent developers from accessing production systems directly"
      - "To allow development and testing using realistic data without exposing actual sensitive production data"
      - "To compress data to reduce storage in test environments"
      - "To encrypt test databases using production encryption keys"
    correct_answer: 1
    explanations:
      correct: "Data masking replaces real sensitive data (PII, financial data) with realistic but fictitious substitutes in development and test environments. Developers get functional test data without exposure to live customer information, reducing the risk of test environment breaches exposing production data."
      incorrect:
        - "Access controls prevent direct production access — masking is about what data is in the test environment, not access to production."
        - "Allowing testing with realistic but non-sensitive data is the primary purpose of data masking — this is correct."
        - "Compression reduces storage — masking is a privacy protection technique, not a storage optimization."
        - "Test environments should not use production encryption keys — masking replaces sensitive data values, not encryption keys."
    difficulty: "medium"
    tags: ["privacy", "obfuscation"]

  - id: q-d2-050
    domain: domain2
    question: "Which of the following is the BEST description of 'information asset valuation'?"
    options:
      - "Calculating only the purchase price of hardware and software"
      - "Determining the value of information assets based on replacement cost, business impact of loss, and regulatory exposure"
      - "Rating assets by their age and depreciation schedule"
      - "Counting the number of files stored on each system"
    correct_answer: 1
    explanations:
      correct: "Information asset valuation considers: replacement/recreation cost, revenue generated, competitive value, liability if disclosed, and business impact of unavailability. This holistic valuation supports risk prioritization — assets with higher value warrant stronger controls."
      incorrect:
        - "Purchase price captures tangible asset cost but ignores the business value and impact of data itself — especially for intangible information assets."
        - "Valuation based on replacement cost, business impact, and regulatory exposure is the comprehensive and correct approach."
        - "Depreciation schedules apply to physical assets — information assets often appreciate over time and don't depreciate like hardware."
        - "Counting files measures volume, not value — a single file containing trade secrets may be worth millions."
    difficulty: "medium"
    tags: ["classification", "valuation"]

  - id: q-d2-051
    domain: domain2
    question: "What does 'data sovereignty' mean for an organization using a multinational cloud provider?"
    options:
      - "The organization owns all data stored in the cloud"
      - "Data is subject to the laws of the country where it physically resides, which may create conflicting legal obligations"
      - "The cloud provider has no access to stored data"
      - "Data can only be accessed by employees in the country of origin"
    correct_answer: 1
    explanations:
      correct: "Data sovereignty means that data stored in a particular country is subject to that country's laws — including laws that may compel disclosure (e.g., US CLOUD Act, Russian data localization laws, GDPR). Organizations must consider where data physically resides when choosing cloud regions to avoid conflicting legal obligations."
      incorrect:
        - "Data ownership is separate from sovereignty — even customer-owned data is subject to the laws of the country where it is stored."
        - "Data sovereignty creates jurisdictional obligations based on physical storage location — potential conflicting laws is the key concern."
        - "Cloud providers may have technical access to data depending on encryption arrangements — sovereignty is about legal jurisdiction, not access."
        - "Data sovereignty is about legal jurisdiction — not a restriction on who can access it by geography."
    difficulty: "medium"
    tags: ["sovereignty", "cloud", "legal"]

  - id: q-d2-052
    domain: domain2
    question: "What is the primary difference between 'data integrity' and 'data accuracy'?"
    options:
      - "They are the same concept expressed differently"
      - "Data integrity means data has not been improperly altered; data accuracy means data correctly reflects the real-world fact it represents"
      - "Data integrity is a technical control; data accuracy is a business metric"
      - "Data integrity only applies to databases; data accuracy applies to all data types"
    correct_answer: 1
    explanations:
      correct: "Data integrity (a security property) ensures data has not been modified without authorization — it focuses on unauthorized or accidental alteration. Data accuracy (a data quality property) means the data correctly represents the real-world value — accurate data has not drifted from truth. Data can be integral (unaltered) but inaccurate (if it was entered incorrectly from the start)."
      incorrect:
        - "They are distinct concepts — integrity is about unauthorized modification; accuracy is about correctness relative to reality."
        - "Integrity = protection from unauthorized alteration; accuracy = correct reflection of reality — this correctly distinguishes them."
        - "Both can be technical or business concerns — the distinction is not about where they apply."
        - "Both apply to all types of data regardless of storage format."
    difficulty: "hard"
    tags: ["data-quality", "integrity"]
