    tags: ["IAM", "lifecycle", "accounts"]

  - id: q-d2-057
    domain: domain2
    question: "What is the primary purpose of a Data Loss Prevention (DLP) solution?"
    options:
      - "To encrypt all data stored in organizational databases"
      - "To detect and prevent unauthorized transfer or disclosure of sensitive data"
      - "To control user access to classified systems"
      - "To backup critical data to offsite storage"
    correct_answer: 1
    explanations:
      correct: "DLP monitors, detects, and blocks the unauthorized exfiltration or disclosure of sensitive data. It can monitor: email (blocking attachments containing SSNs), network traffic (detecting credit card numbers in uploads), endpoints (blocking USB copy of sensitive files), and cloud storage. DLP enforces data handling policies."
      incorrect:
        - "Encrypting database data at rest is a storage encryption function — DLP focuses on data movement and disclosure prevention, not encryption."
        - "Detecting and preventing unauthorized transfer or disclosure of sensitive data is the correct primary purpose of DLP."
        - "Access control systems (IAM) restrict who can access systems — DLP focuses on data movement regardless of who is accessing it."
        - "Backup and recovery is a data availability function — DLP is specifically about preventing data loss through unauthorized disclosure."
