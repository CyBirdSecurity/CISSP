    correct_answer: 1
    explanations:
      correct: "The Synchronizer Token Pattern embeds a unique, secret, per-session CSRF token in all state-changing forms. The server validates the token before processing the request. Since the attacker's malicious page cannot read the token from the victim's session (due to same-origin policy), they cannot forge valid requests."
