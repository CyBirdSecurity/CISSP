        - "CSRF token (Synchronizer Token Pattern) is the correct defense — server validates the hidden token proving the request originated from the legitimate site."
        - "HttpOnly prevents JavaScript from accessing cookies (protecting against XSS cookie theft) — it does not prevent CSRF attacks."
