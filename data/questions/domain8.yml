      - "Web Application Firewall (WAF)"
      - "Parameterized queries (prepared statements)"
      - "Encrypting the database connection string"
    correct_answer: 2
    explanations:
      correct: "Parameterized queries (prepared statements) separate SQL code from data by pre-compiling the SQL structure, then supplying user input as typed parameters. The database treats parameters as data, never as SQL code — making injection impossible regardless of input content. This is the most effective defense because it eliminates the vulnerability at its root."
      incorrect:
        - "Denylist-based input validation is insufficient — SQL injection can be achieved with encoded characters, alternative syntax, and strings that bypass keyword filters."
        - "WAFs can detect and block many SQL injection attempts but can be bypassed with obfuscation and encoding — they are a compensating control, not a primary defense."
        - "Parameterized queries are the gold standard defense against SQL injection — this is correct."
        - "Encrypting the database connection protects credentials in transit but does not prevent SQL injection — injection happens within an authenticated connection."
    difficulty: "easy"
    tags: ["vulnerabilities", "SQL-injection", "secure-coding"]

  - id: q-d8-036
    domain: domain8
    question: "A developer finds a Python pickle.loads() call that processes user-submitted data in a web API. Why is this a critical security vulnerability?"
