  - id: q-d8-046
    domain: domain8
    question: "A developer uses strcpy() to copy user input into a fixed-size buffer in a C program without checking the input length. This can result in which vulnerability?"
    options:
      - "SQL Injection"
      - "Buffer Overflow"
      - "Insecure Deserialization"
      - "Integer Overflow"
    correct_answer: 1
    explanations:
      correct: "strcpy() copies bytes until it encounters a null terminator without checking if the destination buffer is large enough. If the input is longer than the buffer, it overwrites adjacent memory — a stack buffer overflow. This can allow attackers to overwrite the return address, redirect execution flow, and achieve code execution. Safe alternatives: strncpy(), strlcpy(), or bounds-checked string functions."
      incorrect:
        - "SQL Injection involves manipulating database queries through user input — not related to buffer operations in C programs."
        - "Buffer Overflow (overwriting adjacent memory due to unbounded copy into fixed-size buffer) is the correct vulnerability."
        - "Insecure Deserialization involves processing untrusted serialized object data — not buffer operations."
        - "Integer Overflow involves arithmetic exceeding integer type bounds — not copying beyond buffer boundaries."
    difficulty: "easy"
    tags: ["vulnerabilities", "buffer-overflow", "secure-coding"]

