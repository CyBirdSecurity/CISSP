      - "Running SAST only before production releases"
      - "Having the security team run SAST independently from the development team"
    correct_answer: 1
    explanations:
      correct: "Integrating SAST into the CI/CD pipeline to run on every commit is the 'shift left' approach — providing immediate feedback to developers when vulnerabilities are introduced. Blocking merges for critical findings prevents vulnerable code from progressing. This makes security a continuous activity rather than a late-stage gate and dramatically reduces remediation cost."
      incorrect:
        - "Quarterly SAST scans leave vulnerabilities undetected for months — by the time they're found, the code is far from the developer's mind and expensive to fix."
        - "SAST in CI/CD pipeline on every commit with merge blocking for critical findings is the optimal DevSecOps integration."
        - "Pre-production only testing is late in the SDLC — vulnerabilities found then are expensive to fix and may delay releases."
        - "Security team-driven SAST separate from development creates silos — findings arrive late, out of context, and developers haven't yet adopted security accountability."
    difficulty: "medium"
    tags: ["DevSecOps", "SAST", "SDLC"]

  - id: q-d8-048
    domain: domain8
    question: "The 'fail-secure' principle requires that when a system encounters an error, it should:"
    options:
      - "Automatically restart and resume normal operations"
      - "Default to a secure, restricted state rather than an open, permissive state"
      - "Immediately alert all users about the failure"
      - "Preserve all current user sessions to prevent data loss"
    correct_answer: 1
    explanations:
      correct: "Fail-secure (fail-closed) means that when a system fails or encounters an error, it defaults to the most secure state — denying access or halting operations rather than opening up. Example: if authentication fails due to a system error, deny access. If a firewall crashes, block all traffic. Security is prioritized over availability in failure scenarios."
      incorrect:
        - "Automatic restart and resume may be appropriate for availability but does not describe the security posture during the failure window — which is the focus of fail-secure."
        - "Defaulting to a secure, restricted state when a failure occurs is the correct definition of fail-secure."
        - "Alerting users is a notification mechanism, not the definition of fail-secure behavior."
        - "Preserving user sessions prioritizes availability and user experience over security — fail-secure may require terminating sessions during failure."
    difficulty: "easy"
    tags: ["principles", "secure-design"]

  - id: q-d8-049
    domain: domain8
    question: "An organization discovers that a malicious package named 'coIors' (with capital 'i' instead of lowercase 'l') was installed from npm as a transitive dependency. This is an example of which supply chain attack?"
    options:
      - "Dependency confusion"
      - "Typosquatting"
      - "Watering hole"
      - "Malicious maintainer takeover"
    correct_answer: 1
    explanations:
      correct: "Typosquatting involves publishing packages with names visually similar to (but slightly different from) popular legitimate packages, hoping developers or automated systems will install them by mistake. 'coIors' (capital I) looks identical to 'colors' (lowercase l) in many fonts. Automated dependency resolution may install the wrong package."
      incorrect:
        - "Dependency confusion uses the exact same name as an internal package — typosquatting uses a visually similar but different name targeting public packages."
        - "Typosquatting (visually similar name designed to trick users into installing the wrong package) is the correct answer."
        - "A watering hole attack compromises websites visited by target users — not package registry name manipulation."
        - "Maintainer takeover involves compromising the account of a legitimate package maintainer — not creating a new package with a deceptive name."
    difficulty: "medium"
    tags: ["supply-chain", "attacks"]

  - id: q-d8-050
    domain: domain8
    question: "Path traversal attacks use which technique to escape an application's intended file directory?"
    options:
      - "SQL metacharacters to bypass database directory controls"
      - "Sequences like '../' to navigate up the directory hierarchy beyond the intended root"
      - "Encoded null bytes to terminate file path strings early"
      - "HTTP verb tampering to access restricted file endpoints"
    correct_answer: 1
    explanations:
      correct: "Path traversal exploits insufficient path validation by using '../' (and variants like URL-encoded %2e%2e%2f or double-encoded %252e%252e%252f) to navigate up directory levels beyond the intended web root. For example, requesting '/download?file=../../../etc/passwd' navigates three directories up from the web root to read the system password file."
      incorrect:
        - "SQL metacharacters are used in SQL injection attacks against databases — not for file system path manipulation."
        - "Using '../' sequences to navigate beyond the intended directory root is the path traversal technique."
        - "Null byte injection (%00) can terminate strings in some languages (C-based), but it's a different attack technique — path traversal specifically uses directory traversal sequences."
        - "HTTP verb tampering exploits differences in how servers handle different HTTP methods — not directly related to directory traversal."
    difficulty: "medium"
    tags: ["vulnerabilities", "path-traversal", "web-security"]

  - id: q-d8-051
    domain: domain8
    question: "Which container security practice most directly addresses the risk of a container escape leading to host system compromise?"
    options:
      - "Using Alpine Linux as the base image"
      - "Running containers as a non-root user with minimal Linux capabilities"
      - "Scanning container images for known CVEs"
      - "Encrypting container image layers at rest"
    correct_answer: 1
    explanations:
      correct: "Container escapes often rely on kernel exploits or container misconfigurations. Running containers as a non-root user and dropping all unnecessary Linux capabilities (using --cap-drop ALL and adding only needed capabilities) dramatically limits what an escaped process can do on the host. Root inside a container maps to root on the host if escape occurs."
      incorrect:
        - "Alpine Linux reduces attack surface through a smaller footprint but does not directly limit what an escaped container can do on the host."
        - "Running as non-root with minimal capabilities directly limits the impact of a container escape — this is the most directly relevant control."
        - "CVE scanning identifies known vulnerable components but does not prevent a successful escape from escalating privileges on the host."
        - "Image layer encryption protects data confidentiality — it does not limit runtime privileges or prevent escape escalation."
    difficulty: "hard"
    tags: ["container-security", "DevSecOps"]

  - id: q-d8-052
    domain: domain8
    question: "Which software development approach produces applications with the smallest attack surface by default?"
    options:
      - "Agile development with two-week sprints"
      - "Building only essential features, disabling all unused functionality, and following the principle of economy of mechanism"
      - "Using only open-source frameworks with active security communities"
      - "Requiring code reviews for all pull requests"
    correct_answer: 1
    explanations:
      correct: "Minimizing attack surface requires building only what is needed (economy of mechanism), disabling all unused features/services/ports, and following the principle of minimization. Every feature, API endpoint, and enabled service is a potential attack entry point. The smallest attack surface comes from deliberate minimalism in design and configuration."
      incorrect:
        - "Agile sprint methodology is a development process — it does not inherently produce smaller attack surfaces without security-focused practices."
        - "Building only essential features, disabling unused functionality, and economy of mechanism directly minimizes attack surface — this is the correct answer."
        - "Open-source frameworks can have security communities but still introduce significant attack surface if enabled features are not needed."
        - "Code reviews improve code quality and can catch vulnerabilities but do not reduce attack surface — that requires architectural and design decisions."
    difficulty: "medium"
    tags: ["secure-design", "principles", "attack-surface"]
