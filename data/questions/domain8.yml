  - id: q-d8-039
    domain: domain8
    question: "A developer implements a function that checks a file's permissions and then opens it. An attacker replaces the file between the check and the open. This vulnerability is called:"
    options:
      - "Integer overflow"
      - "Time-of-Check to Time-of-Use (TOCTOU)"
      - "Buffer overflow"
      - "Command injection"
    correct_answer: 1
    explanations:
      correct: "TOCTOU (Time-of-Check to Time-of-Use) is a race condition where an attacker exploits the window between when a condition is checked and when the result is used. The classic example is checking file permissions, then having the attacker swap the file for a symlink to /etc/passwd before the application opens it."
      incorrect:
        - "Integer overflow occurs when arithmetic exceeds the maximum integer value — not when a resource is modified between check and use."
        - "TOCTOU (race condition between check and use) is the correct vulnerability name for this scenario."
        - "Buffer overflow occurs when more data is written to a buffer than it can hold — not when a resource is modified between operations."
        - "Command injection passes untrusted input to a system shell — not related to file permission checking race conditions."
    difficulty: "medium"
    tags: ["vulnerabilities", "TOCTOU", "race-conditions"]

