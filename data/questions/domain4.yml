    correct_answer: 1
    explanations:
      correct: "On untrusted public Wi-Fi, attackers can: sniff unencrypted traffic, perform ARP poisoning for MitM attacks, set up evil twin access points, and intercept credentials. A VPN encrypts all traffic before it leaves the device, protecting against interception on the local network segment. Even with HTTPS, metadata and non-HTTPS traffic remain exposed without a VPN."
      incorrect:
