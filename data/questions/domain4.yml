      incorrect:
        - "BGP is implemented on standard router hardware that is widely available — cost is not the barrier to security."
        - "BGP lacking origin authentication (any AS can announce any prefix) is the root cause of hijacking vulnerabilities."
        - "BGP is the internet's backbone routing protocol used by all ISPs, enterprises, and carriers globally."
        - "BGP routing announcements are typically transmitted in plaintext between peers — they can be monitored, which is actually how hijacking incidents are often detected."
    difficulty: "hard"
    tags: ["networking", "BGP", "attacks"]

  - id: q-d4-048
    domain: domain4
    question: "When implementing network segmentation for a payment card environment, which network should process and store cardholder data be most isolated from?"
