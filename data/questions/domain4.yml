questions:
  - id: q-d4-001
    domain: domain4
    question: "At which OSI layer does a standard packet-filtering firewall primarily operate?"
    options:
      - "Layer 2 (Data Link)"
      - "Layer 3 (Network) and Layer 4 (Transport)"
      - "Layer 7 (Application)"
      - "Layer 5 (Session)"
    correct_answer: 1
    explanations:
      correct: "Packet-filtering firewalls operate at Layer 3 (Network) using IP addresses and Layer 4 (Transport) using port numbers and protocol types (TCP/UDP) to make allow/deny decisions."
      incorrect:
        - "Layer 2 switches operate at the Data Link layer — packet filters work at Layer 3/4, not Layer 2."
        - "Layers 3 and 4 are correct for packet-filtering firewalls — they inspect IP addresses and port numbers."
        - "Layer 7 is where application-layer firewalls (WAFs, Next-Gen Firewalls with deep packet inspection) operate."
        - "Layer 5 (Session) is not where packet filters operate — they work at network and transport layers."
    difficulty: "medium"
    tags: ["firewalls", "OSI"]

  - id: q-d4-002
    domain: domain4
    question: "What is the primary security advantage of IPsec's Tunnel mode compared to Transport mode?"
    options:
      - "Tunnel mode is faster than Transport mode"
      - "Tunnel mode encrypts the original IP header, protecting source and destination addresses"
      - "Tunnel mode uses stronger encryption algorithms"
      - "Tunnel mode works without requiring both endpoints to support IPsec"
    correct_answer: 1
    explanations:
      correct: "In Tunnel mode, IPsec encapsulates the entire original IP packet (including its IP header) within a new IP packet, protecting source and destination addresses from eavesdroppers. This is used in VPNs connecting networks."
      incorrect:
        - "Tunnel mode is generally slower than Transport mode because it adds additional headers and encapsulation overhead."
        - "Tunnel mode encrypts the entire original IP packet (including headers) — hiding the original source/destination."
        - "Both modes support the same encryption algorithms — the choice of mode doesn't determine encryption strength."
        - "Both endpoints must support IPsec for it to work in either mode."
    difficulty: "hard"
    tags: ["IPsec", "VPN"]

  - id: q-d4-003
    domain: domain4
    question: "A network administrator wants to separate guest Wi-Fi traffic from internal corporate traffic. Which network security control is most appropriate?"
    options:
      - "Implementing WPA3 on the guest network"
      - "Creating separate VLANs for guest and corporate traffic"
      - "Deploying an IDS on the corporate network"
      - "Using MAC address filtering on the guest network"
    correct_answer: 1
    explanations:
      correct: "VLANs logically separate network traffic regardless of physical infrastructure. Creating separate VLANs for guest and corporate traffic isolates them and prevents guests from accessing corporate resources, even on the same physical switches."
      incorrect:
        - "WPA3 improves wireless security but does not separate guest traffic from corporate traffic on the network layer."
        - "VLANs correctly separate guest and corporate traffic at the network level."
        - "An IDS detects intrusions but does not segment traffic or prevent guest access to corporate resources."
        - "MAC address filtering is easy to bypass (MAC spoofing) and does not provide network-level traffic separation."
    difficulty: "medium"
    tags: ["VLAN", "segmentation"]

  - id: q-d4-004
    domain: domain4
    question: "Which of the following best describes a Man-in-the-Middle (MitM) attack?"
    options:
      - "An attacker overwhelms a server with traffic to make it unavailable"
      - "An attacker secretly intercepts and potentially alters communications between two parties"
      - "An attacker gains access by guessing passwords repeatedly"
      - "An attacker tricks a user into visiting a malicious website"
    correct_answer: 1
    explanations:
      correct: "A MitM attack occurs when an attacker positions themselves between two communicating parties, secretly intercepting (and potentially modifying) their communications. Both parties believe they are communicating directly with each other."
      incorrect:
        - "Overwhelming a server with traffic describes a Denial of Service (DoS) attack, not a MitM attack."
        - "Secretly intercepting communications between two parties is the correct definition of a MitM attack."
        - "Repeatedly guessing passwords is a brute force or password spraying attack."
        - "Tricking users into visiting malicious websites is phishing or a social engineering attack."
    difficulty: "easy"
    tags: ["attacks", "networking"]

  - id: q-d4-005
    domain: domain4
    question: "What is 'split tunneling' in the context of VPNs, and what is its primary security risk?"
    options:
      - "Dividing VPN traffic between two providers; risk is higher latency"
      - "Routing only corporate traffic through the VPN while other traffic goes directly to the internet; risk is creating a bridged path into the corporate network"
      - "Using two separate VPN connections simultaneously; risk is authentication complexity"
      - "Encrypting traffic with two different keys; risk is key management"
    correct_answer: 1
    explanations:
      correct: "Split tunneling routes only traffic destined for corporate resources through the VPN, while other internet traffic goes directly to the internet without VPN protection. Security risk: the remote device becomes a bridge — malware on the internet could potentially reach the corporate network through the VPN tunnel."
      incorrect:
        - "Split tunneling is about routing decisions, not provider redundancy."
        - "Split tunneling routes corporate traffic through VPN and other traffic directly — creating a bridged path is the key security risk."
        - "Split tunneling refers to traffic routing, not simultaneous connections."
        - "Split tunneling is about traffic routing, not key management or encryption."
    difficulty: "hard"
    tags: ["VPN", "networking"]

  - id: q-d4-006
    domain: domain4
    question: "What is the purpose of DNSSEC?"
    options:
      - "To encrypt DNS queries and responses from eavesdropping"
      - "To add cryptographic signatures to DNS records to prevent DNS spoofing"
      - "To block malicious domains using reputation-based filtering"
      - "To speed up DNS resolution through caching"
    correct_answer: 1
    explanations:
      correct: "DNSSEC adds digital signatures to DNS records, allowing resolvers to verify that DNS responses are authentic and haven't been tampered with. It prevents DNS cache poisoning and spoofing. Note: DNSSEC does NOT encrypt DNS queries — it only provides integrity and authentication."
      incorrect:
        - "DNSSEC does not encrypt DNS traffic — it only authenticates it. DNS over HTTPS (DoH) and DNS over TLS (DoT) provide encryption."
        - "DNSSEC adds cryptographic signatures to verify DNS record authenticity — preventing spoofing. This is correct."
        - "Reputation-based DNS filtering is done by DNS security services (e.g., Cisco Umbrella) — not DNSSEC."
        - "DNS caching improves performance but is not what DNSSEC provides."
    difficulty: "medium"
    tags: ["DNS", "protocols"]

  - id: q-d4-007
    domain: domain4
    question: "Which wireless attack involves setting up a rogue access point that mimics a legitimate network to intercept user traffic?"
    options:
      - "Deauthentication attack"
      - "Evil twin attack"
      - "WPS attack"
      - "KRACK attack"
    correct_answer: 1
    explanations:
      correct: "An evil twin attack creates a rogue wireless access point with the same SSID as a legitimate network. When users connect to the evil twin, the attacker can intercept all their traffic, performing a wireless MitM attack."
      incorrect:
        - "A deauthentication attack sends forged deauthentication frames to disconnect users from a legitimate AP — often used to force users to reconnect to an evil twin."
        - "An evil twin creates a rogue AP mimicking a legitimate one to intercept traffic — this is correct."
        - "A WPS (Wi-Fi Protected Setup) attack exploits vulnerabilities in the WPS PIN authentication protocol."
        - "KRACK (Key Reinstallation Attack) exploits vulnerabilities in the WPA2 handshake to reinstall encryption keys."
    difficulty: "medium"
    tags: ["wireless", "attacks"]

  - id: q-d4-008
    domain: domain4
    question: "What is the core principle of Zero Trust Architecture?"
    options:
      - "Trust all internal traffic and verify all external traffic"
      - "Never trust, always verify — no implicit trust for any user, device, or network segment"
      - "Encrypt all data in transit regardless of source"
      - "Block all incoming connections and allow only outgoing connections"
    correct_answer: 1
    explanations:
      correct: "Zero Trust's core principle is 'never trust, always verify.' No entity — internal or external — is implicitly trusted. Every access request must be authenticated, authorized, and continuously validated regardless of network location."
      incorrect:
        - "Trusting internal traffic is the traditional perimeter-based model that Zero Trust replaces. Lateral movement attacks (like the SolarWinds breach) exploit this implicit internal trust."
        - "'Never trust, always verify' is the core Zero Trust principle — correct."
        - "Encrypting all data in transit is a good practice but is not the defining principle of Zero Trust architecture."
        - "Blocking all incoming connections describes an egress-only firewall policy, not Zero Trust."
    difficulty: "easy"
    tags: ["zero-trust", "architecture"]

  - id: q-d4-009
    domain: domain4
    question: "What type of IDS detection method is best at identifying previously unknown (zero-day) attacks?"
    options:
      - "Signature-based detection"
      - "Anomaly-based (behavior-based) detection"
      - "Pattern-matching detection"
      - "Rule-based detection"
    correct_answer: 1
    explanations:
      correct: "Anomaly-based (behavior-based) detection establishes a baseline of normal behavior and alerts on deviations. Since it doesn't rely on known attack signatures, it can detect novel zero-day attacks — though it has higher false positive rates."
      incorrect:
        - "Signature-based detection only detects known attacks with existing signatures — it cannot detect zero-day attacks."
        - "Anomaly-based detection is the correct answer — it detects deviations from baseline, enabling zero-day detection."
        - "Pattern-matching is essentially signature-based detection — relying on known patterns means it cannot detect zero-days."
        - "Rule-based detection uses predefined rules similar to signatures — it cannot detect attacks that don't match known rules."
    difficulty: "medium"
    tags: ["IDS", "detection"]

  - id: q-d4-010
    domain: domain4
    question: "What is the primary purpose of a DMZ (Demilitarized Zone) in network architecture?"
    options:
      - "To create a secure zone where all sensitive data is stored"
      - "To isolate internet-facing servers from the internal network"
      - "To provide redundant connectivity for critical systems"
      - "To monitor and log all network traffic"
    correct_answer: 1
    explanations:
      correct: "A DMZ creates a buffer zone between the internet and the internal network, hosting services that must be accessible externally (web servers, email servers, DNS). If a DMZ server is compromised, the attacker cannot directly reach the protected internal network."
      incorrect:
        - "Sensitive data should NOT be stored in the DMZ — it is a semi-trusted zone exposed to internet traffic."
        - "Isolating internet-facing servers from the internal network is the correct purpose of a DMZ."
        - "Redundant connectivity is provided by technologies like load balancers, HSRP, or OSPF — not a DMZ."
        - "Traffic monitoring is performed by IDS/IPS and SIEM systems — not the DMZ architecture itself."
    difficulty: "easy"
    tags: ["DMZ", "architecture"]

  - id: q-d4-011
    domain: domain4
    question: "Which protocol replaced SSL and provides the current standard for secure web communications?"
    options:
      - "HTTPS"
      - "TLS (Transport Layer Security)"
      - "IPsec"
      - "SSH"
    correct_answer: 1
    explanations:
      correct: "TLS (Transport Layer Security) replaced SSL (which is now deprecated due to multiple critical vulnerabilities). TLS 1.3 is the current standard. HTTPS is HTTP over TLS — it is the application, not the underlying security protocol."
      incorrect:
        - "HTTPS is the application-level designation for HTTP over TLS — it is not the protocol itself that replaced SSL."
        - "TLS is the protocol that replaced SSL for securing web communications — this is correct."
        - "IPsec operates at the network layer (Layer 3) and is primarily used for VPNs — not as a replacement for SSL in web communications."
        - "SSH provides secure shell access and file transfer — it does not replace SSL for general web security."
    difficulty: "easy"
    tags: ["protocols", "TLS"]

  - id: q-d4-012
    domain: domain4
    question: "An attacker sends a large volume of SYN packets to a server without completing the TCP handshake. What type of attack is this?"
    options:
      - "Ping of Death"
      - "Smurf attack"
      - "SYN flood attack"
      - "Session hijacking"
    correct_answer: 2
    explanations:
      correct: "A SYN flood attack exploits the TCP three-way handshake. The attacker sends many SYN packets without completing the handshake (never sending the final ACK), exhausting the server's connection table with half-open connections, causing a DoS condition."
      incorrect:
        - "A Ping of Death sends oversized ICMP packets to crash systems — not the same as flooding with SYN packets."
        - "A Smurf attack uses ICMP broadcast amplification to overwhelm a target — not TCP SYN packets."
        - "A SYN flood correctly describes sending SYN packets without completing the handshake to exhaust connections."
        - "Session hijacking involves taking over an existing authenticated session — it requires established connections, not half-open ones."
    difficulty: "medium"
    tags: ["attacks", "DoS"]

  - id: q-d4-013
    domain: domain4
    question: "What is the purpose of Network Access Control (NAC)?"
    options:
      - "To monitor network bandwidth and enforce QoS policies"
      - "To enforce security policy compliance checks on devices before allowing them to connect to the network"
      - "To authenticate users to web applications"
      - "To filter email for spam and malware"
    correct_answer: 1
    explanations:
      correct: "NAC evaluates connecting devices against security policies (patched OS, active antivirus, encryption enabled) before granting network access. Non-compliant devices may be quarantined or given restricted access. NAC enforces the principle that only healthy, authorized devices connect to the corporate network."
      incorrect:
        - "Bandwidth monitoring and QoS is network management — not the purpose of NAC."
        - "Enforcing security policy compliance before allowing network connection is the correct description of NAC."
        - "Web application authentication uses IAM and web SSO — NAC operates at the network access layer."
        - "Email filtering is handled by email security gateways — NAC governs device access to the network."
    difficulty: "medium"
    tags: ["NAC", "networking"]

  - id: q-d4-014
    domain: domain4
    question: "What is the OSI model layer responsible for end-to-end error detection, flow control, and reliable data delivery?"
    options:
      - "Layer 2 (Data Link)"
      - "Layer 3 (Network)"
      - "Layer 4 (Transport)"
      - "Layer 5 (Session)"
    correct_answer: 2
    explanations:
      correct: "Layer 4 (Transport) handles end-to-end communication, error detection and correction, flow control, and segmentation. TCP (connection-oriented, reliable) and UDP (connectionless, unreliable) both operate at Layer 4. Port numbers are a Layer 4 concept."
      incorrect:
        - "Layer 2 (Data Link) handles frame delivery within a single network segment using MAC addresses — not end-to-end."
        - "Layer 3 (Network) handles routing between networks using IP addresses — not flow control or reliable delivery."
        - "Layer 4 — Transport — handles end-to-end reliability, error detection, and flow control — this is correct."
        - "Layer 5 (Session) manages session establishment, maintenance, and termination — not data reliability."
    difficulty: "easy"
    tags: ["OSI", "networking"]

  - id: q-d4-015
    domain: domain4
    question: "What is ARP poisoning (ARP spoofing) and what attack does it enable?"
    options:
      - "Corrupting DNS records to redirect users to malicious websites"
      - "Sending forged ARP replies to associate the attacker's MAC address with a legitimate IP, enabling MitM attacks on the local network"
      - "Flooding a network switch with fake MAC addresses to fill its table"
      - "Injecting malicious code into ARP protocol packets"
    correct_answer: 1
    explanations:
      correct: "ARP poisoning sends forged ARP reply messages associating the attacker's MAC address with a legitimate IP address (e.g., the default gateway). Other hosts update their ARP caches and send traffic to the attacker instead, enabling a local network MitM attack, credential capture, or traffic injection."
      incorrect:
        - "Corrupting DNS records is DNS poisoning/spoofing — ARP operates at Layer 2 for local network MAC-to-IP resolution."
        - "Sending forged ARP replies to enable local MitM by associating attacker's MAC with a legitimate IP is the correct description of ARP poisoning."
        - "Flooding a switch with fake MACs to fill its table is a MAC flooding attack (CAM table overflow) — different from ARP poisoning."
        - "ARP poisoning is about the ARP cache in hosts — not code injection into protocol packets."
    difficulty: "medium"
    tags: ["attacks", "networking"]

  - id: q-d4-016
    domain: domain4
    question: "What is the difference between a stateful firewall and a stateless (packet filter) firewall?"
    options:
      - "Stateful firewalls are faster; stateless firewalls are more secure"
      - "Stateful firewalls track connection state and context; stateless firewalls evaluate each packet in isolation"
      - "Stateful firewalls operate at Layer 7; stateless operate at Layer 3"
      - "Stateless firewalls log traffic; stateful firewalls do not"
    correct_answer: 1
    explanations:
      correct: "A stateful firewall maintains a connection state table, tracking TCP sessions and allowing response traffic for established connections. Stateless firewalls evaluate each packet independently without session context — they cannot distinguish legitimate response packets from unsolicited traffic, making them less effective."
      incorrect:
        - "Stateless firewalls are generally faster (less processing); stateful firewalls are more secure because they track session context."
        - "Stateful tracks connection context; stateless evaluates packets in isolation — this is the correct distinction."
        - "Both types primarily operate at Layers 3 and 4 — stateful inspection adds session context at these layers."
        - "Both types can log traffic — logging capability is not the defining difference."
    difficulty: "medium"
    tags: ["firewalls", "networking"]

  - id: q-d4-017
    domain: domain4
    question: "What is 'port scanning' and when is it authorized in a security context?"
    options:
      - "Monitoring physical port access to server rooms — always authorized for security teams"
      - "Sending probes to network ports to identify open services and potential vulnerabilities — authorized during penetration testing and vulnerability assessments"
      - "Scanning USB ports for unauthorized devices — authorized in any environment"
      - "Examining switch port configurations — authorized by network administrators"
    correct_answer: 1
    explanations:
      correct: "Port scanning sends connection attempts or probes to IP addresses and port numbers to identify open services, operating systems, and potential vulnerabilities. It requires explicit written authorization from the system/network owner — unauthorized port scanning is illegal in most jurisdictions and may violate computer fraud laws."
      incorrect:
        - "Physical port access monitoring is a physical security control — port scanning is a network reconnaissance technique."
        - "Network port scanning to identify services and vulnerabilities, authorized during pen tests — this correctly describes port scanning and its authorization requirement."
        - "USB port scanning for unauthorized devices is a different activity (endpoint management) — not port scanning."
        - "Switch port configuration review is network management — not port scanning."
    difficulty: "easy"
    tags: ["scanning", "pen-testing"]

  - id: q-d4-018
    domain: domain4
    question: "What protocol is used to securely manage network devices (routers, switches) and provides encrypted terminal sessions?"
    options:
      - "Telnet"
      - "SNMP v1"
      - "SSH (Secure Shell)"
      - "HTTP"
    correct_answer: 2
    explanations:
      correct: "SSH (Secure Shell) provides encrypted terminal sessions for remote device management. It replaces Telnet, which transmits all data including credentials in plaintext. SSH version 2 is the current standard and provides strong encryption, host authentication, and integrity protection."
      incorrect:
        - "Telnet transmits all data including usernames and passwords in plaintext — it is insecure and should not be used for network device management."
        - "SNMP v1 uses community strings as authentication (plaintext) and lacks encryption — SNMPv3 added authentication and encryption."
        - "SSH provides encrypted management sessions and replaces Telnet — this is correct."
        - "HTTP transmits data in plaintext — HTTPS adds encryption, but SSH is the standard for device management, not HTTP/HTTPS."
    difficulty: "easy"
    tags: ["protocols", "networking"]

  - id: q-d4-019
    domain: domain4
    question: "What is a 'denial of service' (DoS) attack's primary objective?"
    options:
      - "To steal sensitive data from the target system"
      - "To make a system, service, or network unavailable to legitimate users"
      - "To gain unauthorized administrative access to a target"
      - "To intercept communications between two parties"
    correct_answer: 1
    explanations:
      correct: "A DoS attack aims to make a resource unavailable to legitimate users by overwhelming it with traffic, exploiting vulnerabilities, or consuming critical resources. A DDoS (Distributed DoS) uses many sources (often a botnet) to amplify the attack, making it harder to block."
      incorrect:
        - "Stealing data is the goal of data exfiltration attacks — DoS targets availability, not confidentiality."
        - "Making systems unavailable to legitimate users is the primary objective of a DoS attack — this is correct."
        - "Gaining admin access is the goal of privilege escalation attacks — DoS attacks target availability."
        - "Intercepting communications is a MitM or eavesdropping attack — not DoS."
    difficulty: "easy"
    tags: ["attacks", "DoS"]

  - id: q-d4-020
    domain: domain4
    question: "What is 'network segmentation' and what security benefit does it provide?"
    options:
      - "Dividing a network into multiple segments to improve bandwidth — no significant security benefit"
      - "Dividing a network into isolated segments so that a compromise in one segment cannot easily spread to others, limiting lateral movement"
      - "Encrypting all network traffic between devices"
      - "Assigning different IP address ranges to different departments"
    correct_answer: 1
    explanations:
      correct: "Network segmentation divides a network into isolated zones (VLANs, subnets, security zones) with access controls between them. If an attacker compromises one segment, they face additional barriers to reach other segments — limiting lateral movement and containing breaches. PCI DSS requires segmentation of cardholder data environments."
      incorrect:
        - "Segmentation does improve bandwidth but the primary security benefit is containing breaches and limiting lateral movement."
        - "Isolating segments to limit lateral movement from a compromised segment is the primary security benefit of network segmentation."
        - "Traffic encryption is a separate control (TLS, IPsec) — segmentation controls network access paths."
        - "IP addressing is a network design activity — segmentation requires enforced access controls between zones, not just different address ranges."
    difficulty: "easy"
    tags: ["segmentation", "networking"]

  - id: q-d4-021
    domain: domain4
    question: "What is the purpose of 802.1X in network security?"
    options:
      - "To define wireless encryption standards (WPA2/WPA3)"
      - "To provide port-based Network Access Control, requiring authentication before granting network access"
      - "To standardize the physical connectors for network cables"
      - "To manage IP address assignment via DHCP"
    correct_answer: 1
    explanations:
      correct: "IEEE 802.1X is a port-based NAC standard that requires devices to authenticate (using EAP methods like EAP-TLS with certificates) before a network port (wired or wireless) is opened. Unauthenticated devices are blocked from the production network, often redirected to a guest VLAN."
      incorrect:
        - "WPA2/WPA3 are wireless security protocols — 802.1X provides the authentication framework used within WPA2/3 Enterprise mode."
        - "Port-based NAC requiring authentication before network access is the correct description of 802.1X."
        - "Physical connectors are defined by other IEEE standards (like 802.3 for Ethernet) — not 802.1X."
        - "DHCP for IP assignment is managed by DHCP servers — 802.1X is an authentication protocol."
    difficulty: "medium"
    tags: ["802.1X", "NAC", "networking"]

  - id: q-d4-022
    domain: domain4
    question: "What type of attack attempts to overwhelm a target by sending traffic that appears to come from a third-party victim (spoofed source), causing responses to flood the victim?"
    options:
      - "SYN flood"
      - "Smurf attack"
      - "Amplification attack"
      - "Fragmentation attack"
    correct_answer: 2
    explanations:
      correct: "An amplification attack (also called a reflective DDoS) uses protocols like DNS, NTP, or SSDP where a small request generates a large response. The attacker spoofs the victim's IP as the source, so the large responses are directed at the victim. DNS amplification can achieve 40-70x traffic multiplication."
      incorrect:
        - "A SYN flood exhausts server connection tables with half-open TCP connections — it doesn't use amplification via spoofed responses."
        - "A Smurf attack was a specific ICMP broadcast amplification attack (now largely mitigated) — amplification attack is the broader modern term."
        - "Amplification attacks use spoofed source IPs to direct large responses at the victim — this is the correct answer."
        - "Fragmentation attacks exploit IP packet reassembly — they don't involve amplification via spoofed sources."
    difficulty: "hard"
    tags: ["attacks", "DoS"]

  - id: q-d4-023
    domain: domain4
    question: "What is the primary security benefit of using IPv6 over IPv4?"
    options:
      - "IPv6 packets are encrypted by default"
      - "IPv6 eliminates the need for NAT, has a larger address space, and includes mandatory IPsec support in the specification (though not always enforced)"
      - "IPv6 is immune to DDoS attacks"
      - "IPv6 uses MAC addresses instead of IP addresses, making tracking impossible"
    correct_answer: 1
    explanations:
      correct: "IPv6 provides a vastly larger address space (128-bit vs 32-bit), making address scanning less practical. The original specification included mandatory IPsec support, though enforcement varies by implementation. IPv6 eliminates NAT, which in IPv4 inadvertently provided some obscurity."
      incorrect:
        - "IPv6 packets are not encrypted by default — encryption requires IPsec or application-layer TLS, same as IPv4."
        - "Larger address space, NAT elimination, and built-in IPsec specification are the key IPv6 improvements — this is correct."
        - "IPv6 networks are also vulnerable to DDoS attacks — the larger address space doesn't prevent volumetric attacks."
        - "IPv6 uses 128-bit IP addresses (not MAC addresses) — MAC addresses remain at Layer 2 in both IPv4 and IPv6."
    difficulty: "medium"
    tags: ["IPv6", "networking"]

  - id: q-d4-024
    domain: domain4
    question: "A next-generation firewall (NGFW) differs from a traditional firewall primarily because it:"
    options:
      - "Operates at Layer 2 instead of Layer 3"
      - "Performs deep packet inspection at Layer 7, including application identification and user-aware policies"
      - "Uses hardware instead of software for packet filtering"
      - "Only blocks known malicious IP addresses"
    correct_answer: 1
    explanations:
      correct: "NGFWs incorporate traditional firewall capabilities plus application-layer (Layer 7) inspection, application identification (regardless of port), user and group-based policies, integrated IPS, TLS/SSL inspection, and threat intelligence. They can distinguish between legitimate HTTPS traffic and tunneled attacks."
      incorrect:
        - "NGFWs operate at multiple layers including Layer 7 — not specifically Layer 2."
        - "Deep packet inspection at Layer 7 with application awareness is what distinguishes NGFWs from traditional firewalls."
        - "Both traditional and next-gen firewalls can use hardware or software — the distinction is inspection depth and capability."
        - "Blocking only known malicious IPs describes a simple reputation-based filter — NGFWs have far more sophisticated inspection capabilities."
    difficulty: "medium"
    tags: ["firewalls", "NGFW"]

  - id: q-d4-025
    domain: domain4
    question: "What is 'wardriving' and what vulnerability does it exploit?"
    options:
      - "A physical security attack on data centers using vehicles"
      - "Driving through areas scanning for wireless networks, often to find unsecured or weakly secured access points"
      - "Intercepting cellular communications from a moving vehicle"
      - "Physically bypassing security at server rooms"
    correct_answer: 1
    explanations:
      correct: "Wardriving involves driving through geographic areas using a laptop or device to scan for and map wireless networks. Attackers look for networks using weak or no encryption, default credentials, or WPS enabled. The information is used to identify targets for further exploitation."
      incorrect:
        - "Wardriving is a wireless network reconnaissance activity — not a physical facility attack."
        - "Scanning for wireless networks to find poorly secured access points while driving — this correctly describes wardriving."
        - "Intercepting cellular communications involves IMSI catchers (stingrays) — wardriving focuses on Wi-Fi networks."
        - "Physical bypass of server room security is a physical intrusion attack — not wardriving."
    difficulty: "easy"
    tags: ["wireless", "reconnaissance"]

  - id: q-d4-026
    domain: domain4
    question: "What is the purpose of a 'proxy server' in network security?"
    options:
      - "To replace the firewall in small networks"
      - "To act as an intermediary between clients and servers, providing content filtering, caching, and hiding client identities"
      - "To directly route packets between network segments"
      - "To provide encrypted VPN tunnels for remote users"
    correct_answer: 1
    explanations:
      correct: "A proxy server sits between clients and external servers, forwarding requests on behalf of clients. Security benefits: content filtering (blocking malicious sites), caching (performance), SSL inspection, and hiding internal IP addresses from external servers. Forward proxies protect clients; reverse proxies protect servers."
      incorrect:
        - "Proxies complement firewalls but don't replace them — they serve different security functions."
        - "Acting as an intermediary for content filtering, caching, and client identity protection is the correct description of a proxy."
        - "Routing packets between segments is a Layer 3 router function — proxies operate at the application layer."
        - "VPN tunnels are provided by VPN gateways (IPsec, SSL/TLS) — proxy servers are application-layer intermediaries."
    difficulty: "easy"
    tags: ["proxy", "networking"]

  - id: q-d4-027
    domain: domain4
    question: "What is a 'honeypot' and what is its primary security purpose?"
    options:
      - "A system for storing sensitive data securely"
      - "A decoy system designed to attract and detect attackers while gathering intelligence about their techniques"
      - "A backup system that activates when production systems fail"
      - "A monitoring tool for employee internet activity"
    correct_answer: 1
    explanations:
      correct: "A honeypot is a deliberately vulnerable decoy system designed to attract attackers. Any access to the honeypot is suspicious by definition (legitimate users shouldn't be there). It provides early warning of attacks, gathers attacker intelligence (techniques, tools, targets), and diverts attackers from production systems."
      incorrect:
        - "Sensitive data should be stored in protected production systems — placing it in a honeypot would be counterproductive."
        - "A decoy system for attracting attackers and gathering intelligence is the correct description of a honeypot."
        - "A backup system that activates on failure is a hot standby or failover system — not a honeypot."
        - "Employee internet monitoring is done by proxies and DLP — honeypots are for external attacker detection."
    difficulty: "easy"
    tags: ["honeypot", "detection"]

  - id: q-d4-028
    domain: domain4
    question: "What is the primary purpose of using 'network traffic analysis' (NTA) for security monitoring?"
    options:
      - "To measure and optimize network bandwidth usage"
      - "To detect anomalies and threats by analyzing network flow data and packet content"
      - "To document network topology for compliance audits"
      - "To manage IP address assignments across the network"
    correct_answer: 1
    explanations:
      correct: "NTA (also called Network Detection and Response, NDR) analyzes network flow data (NetFlow, PCAP) to detect anomalies like data exfiltration, lateral movement, C2 communications, and insider threats. It provides visibility into encrypted traffic patterns even without decryption."
      incorrect:
        - "Bandwidth measurement is network performance management — NTA is security-focused threat detection."
        - "Detecting anomalies and threats through network flow and packet analysis is the correct security purpose of NTA."
        - "Network topology documentation is a configuration management activity — NTA is runtime threat detection."
        - "IP address management is IPAM (IP Address Management) — not network traffic analysis."
    difficulty: "medium"
    tags: ["monitoring", "detection"]

  - id: q-d4-029
    domain: domain4
    question: "What is the purpose of ICMP and why might administrators block it at the perimeter?"
    options:
      - "ICMP manages IP address assignment — blocked to prevent unauthorized DHCP responses"
      - "ICMP provides network diagnostics (ping, traceroute) — blocked to reduce reconnaissance and certain flood attacks"
      - "ICMP encrypts network communications — blocked because it creates key management complexity"
      - "ICMP manages routing tables — blocked to prevent routing protocol attacks"
    correct_answer: 1
    explanations:
      correct: "ICMP is used for network diagnostics (ping for connectivity testing, traceroute for path discovery). Administrators often block ICMP at the perimeter to prevent attackers from using ping sweeps for host discovery, traceroute for network mapping, and ICMP-based flood attacks (Ping of Death, Smurf). Blocking ICMP can complicate troubleshooting."
      incorrect:
        - "IP address assignment is DHCP — ICMP is a diagnostic and error-reporting protocol."
        - "ICMP provides diagnostics and is blocked to prevent reconnaissance and attacks — this is correct."
        - "ICMP does not encrypt communications — it is a control/diagnostic protocol with no encryption capability."
        - "Routing tables are managed by routing protocols (OSPF, BGP) — ICMP handles error reporting and diagnostics."
    difficulty: "medium"
    tags: ["protocols", "networking"]

  - id: q-d4-030
    domain: domain4
    question: "What is 'session hijacking' and which layer does it primarily target?"
    options:
      - "Taking over a user's physical workstation — targets Layer 1"
      - "Taking over an authenticated session by stealing or predicting session tokens — targets Layer 4-7"
      - "Rerouting network packets to a different destination — targets Layer 3"
      - "Cracking encryption keys to read session content — targets Layer 6"
    correct_answer: 1
    explanations:
      correct: "Session hijacking takes over an already authenticated session by stealing session tokens (via XSS, network sniffing) or predicting them (if weakly generated). The attacker uses the stolen token to impersonate the authenticated user without needing credentials. It operates at the transport to application layers (4-7)."
      incorrect:
        - "Physical workstation takeover is not session hijacking — session hijacking is a logical attack on authenticated sessions."
        - "Stealing or predicting session tokens to take over authenticated sessions, targeting Layers 4-7 — this is correct."
        - "Rerouting packets is a routing attack or MitM — session hijacking targets the session credentials/tokens."
        - "Cracking encryption keys is a cryptographic attack — session hijacking steals/predicts tokens, not keys."
    difficulty: "medium"
    tags: ["attacks", "sessions"]

  - id: q-d4-031
    domain: domain4
    question: "What is 'microsegmentation' and how does it differ from traditional network segmentation?"
    options:
      - "They are the same — microsegmentation is just a marketing term for VLANs"
      - "Microsegmentation applies granular security policies at the individual workload/VM level, not just at network perimeters"
      - "Microsegmentation uses smaller hardware — traditional segmentation uses enterprise-grade equipment"
      - "Microsegmentation only applies to wireless networks; traditional segmentation applies to wired"
    correct_answer: 1
    explanations:
      correct: "Traditional segmentation uses VLANs and firewalls to divide the network into zones. Microsegmentation (key to Zero Trust) applies east-west security policies at the individual workload, VM, or container level — limiting lateral movement within a segment. Software-defined networking (SDN) and tools like VMware NSX enable microsegmentation."
      incorrect:
        - "Microsegmentation is more granular than VLANs — it enforces policies at the workload level, not just network zone boundaries."
        - "Granular security at the individual workload level is what distinguishes microsegmentation from traditional zone-based segmentation."
        - "Equipment size is irrelevant — microsegmentation is about policy granularity, often implemented in software."
        - "Microsegmentation applies to any network (wired, wireless, cloud, virtual) — not limited to wireless."
    difficulty: "hard"
    tags: ["microsegmentation", "zero-trust"]

  - id: q-d4-032
    domain: domain4
    question: "What does HTTPS provide that HTTP does not?"
    options:
      - "Faster page loading through compression"
      - "Authentication of the server, encryption of data in transit, and integrity verification"
      - "The ability to load interactive web content"
      - "Protection against SQL injection in web applications"
    correct_answer: 1
    explanations:
      correct: "HTTPS is HTTP over TLS (Transport Layer Security). It provides: Server authentication (via digital certificate verifying the site's identity), Encryption (confidentiality of transmitted data), and Integrity (detection of tampering). It does not protect against application-layer vulnerabilities like SQL injection."
      incorrect:
        - "Compression for faster loading is optional HTTP/2 or HTTP/3 feature — not what HTTPS provides over HTTP."
        - "Server authentication, encryption, and integrity protection are what HTTPS adds over HTTP — this is correct."
        - "Dynamic web content (JavaScript, etc.) works with both HTTP and HTTPS — HTTPS doesn't add content capability."
        - "HTTPS secures the transport layer — SQL injection is an application-layer vulnerability requiring input validation, not transport encryption."
    difficulty: "easy"
    tags: ["TLS", "protocols"]
