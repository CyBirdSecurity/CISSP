      incorrect:
        - "Performance is a secondary concern — security vulnerabilities are the primary reason to disable TLS 1.0/1.1."
        - "Known cryptographic vulnerabilities and weak cipher support are the correct reasons to disable TLS 1.0/1.1."
        - "TLS version does not affect IPv6 compatibility — the two are independent protocol concerns."
        - "TLS version does not affect certificate requirements — certificate management is separate from TLS protocol version."
    difficulty: "medium"
    tags: ["protocols", "TLS", "cryptography"]

  - id: q-d4-050
    domain: domain4
    question: "Which type of firewall provides the most granular application-layer inspection and can identify and control specific application functions?"
    options:
      - "Packet-filtering firewall"
      - "Stateful inspection firewall"
      - "Next-Generation Firewall (NGFW)"
      - "NAT gateway"
    correct_answer: 2
    explanations:
      correct: "Next-Generation Firewalls (NGFWs) combine traditional stateful inspection with application awareness (Layer 7), IPS, SSL/TLS inspection, user identity awareness, and advanced threat protection. They can identify specific applications (even if they use non-standard ports) and enforce policy at the function level — e.g., allow Slack messaging but block Slack file transfers."
      incorrect:
        - "Packet-filtering firewalls operate at Layer 3/4 only — they cannot inspect application content or identify applications."
        - "Stateful inspection tracks connection state but does not perform application-layer content inspection."
        - "NGFWs with application-layer awareness and granular application function control is the correct answer."
        - "NAT gateways translate IP addresses — they are not security inspection devices."
    difficulty: "easy"
    tags: ["networking", "firewalls", "NGFW"]

  - id: q-d4-051
    domain: domain4
    question: "An organization connects multiple branch offices using MPLS circuits provided by a service provider. What is a key security consideration for this deployment?"
    options:
      - "MPLS provides end-to-end encryption by default"
      - "MPLS traffic is logically separated from other customers but not encrypted — sensitive data should be encrypted at the application or VPN layer"
      - "MPLS circuits cannot carry encrypted traffic"
      - "MPLS automatically segments traffic using 802.1X"
    correct_answer: 1
    explanations:
      correct: "MPLS provides traffic separation between customers (using VRFs — Virtual Routing and Forwarding instances) but does NOT encrypt the traffic. The service provider can see the traffic content. For sensitive data, organizations should add IPsec or TLS encryption over MPLS. This is especially important for compliance requirements (PCI DSS, HIPAA) that mandate data encryption in transit."
      incorrect:
        - "MPLS does not provide encryption by default — it provides logical separation, not cryptographic protection."
        - "MPLS logical separation without encryption means sensitive data should be encrypted at application or VPN layer — this is correct."
        - "MPLS can carry encrypted traffic (e.g., IPsec over MPLS) — there is no restriction on encrypted payloads."
        - "802.1X is a network access control standard for endpoint authentication — MPLS uses label switching, not 802.1X."
    difficulty: "medium"
    tags: ["networking", "WAN", "MPLS"]

  - id: q-d4-052
    domain: domain4
    question: "Network Access Control (NAC) performs a posture check on a connecting device and finds it is running an outdated OS without the latest patches. What is the appropriate NAC response?"
    options:
      - "Allow full network access — patching is the user's responsibility"
      - "Quarantine the device to a remediation VLAN with limited access until it meets compliance requirements"
      - "Permanently ban the device's MAC address from the network"
      - "Send an email to the user asking them to patch their device"
    correct_answer: 1
    explanations:
      correct: "NAC quarantine places non-compliant devices in a restricted VLAN with access only to remediation resources (Windows Update, patch servers, helpdesk). The device cannot access production resources until it meets the compliance policy. Once remediated and re-assessed, the device is granted appropriate access. This enforces security posture without permanently blocking users."
      incorrect:
        - "Allowing full access to unpatched devices defeats the purpose of NAC — unpatched devices can be exploited and spread malware to other network resources."
        - "Quarantine to a remediation VLAN until compliance requirements are met is the appropriate NAC response."
        - "Permanent MAC ban is overly punitive for a patching issue — devices should be remediated and allowed back. MAC addresses can also be spoofed."
        - "Email notification alone does not enforce compliance — the device still has full network access during the time the user decides to patch."
    difficulty: "medium"
    tags: ["networking", "NAC", "access-control"]
