      incorrect:
        - "Backup networks, if they handle CDE backups, must also be within scope — isolation from backup is important but not the primary CDE segmentation concern."
        - "Isolation from all networks outside the defined CDE (especially untrusted networks) is the correct primary segmentation requirement."
        - "Building management systems (HVAC, physical security) are a significant concern — they are often on converged networks but the primary requirement is isolation from untrusted networks."
        - "Executive networks are internal corporate networks — while they should be isolated from CDE, the primary concern is external-facing untrusted networks."
    difficulty: "hard"
    tags: ["networking", "PCI", "segmentation"]

  - id: q-d4-049
    domain: domain4
    question: "An organization's TLS 1.0 and 1.1 support on its web servers should be disabled primarily because:"
    options:
      - "TLS 1.0/1.1 is slower than TLS 1.3"
      - "TLS 1.0/1.1 have known cryptographic vulnerabilities (POODLE, BEAST) and weak cipher support"
