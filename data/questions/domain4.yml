    tags: ["networking", "authentication", "NAC"]

  - id: q-d4-035
    domain: domain4
    question: "The key security difference between RADIUS and TACACS+ is:"
    options:
      - "RADIUS uses TCP; TACACS+ uses UDP"
      - "RADIUS encrypts only the password; TACACS+ encrypts the entire authentication payload"
