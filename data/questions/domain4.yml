    correct_answer: 1
    explanations:
      correct: "Zero Trust replaces perimeter-based trust with identity-centric, context-aware verification. 'Never trust, always verify' means every request — even from within the corporate network — must be authenticated, authorized, and validated. This assumes breach: attackers may already be inside the network. Controls: microsegmentation, MFA, device health checks, and continuous verification."
      incorrect:
