    tags: ["protocols", "AAA", "authentication"]

  - id: q-d4-036
    domain: domain4
    question: "A VLAN hopping attack using 'double tagging' requires which network configuration to be exploitable?"
    options:
      - "Spanning Tree Protocol must be disabled"
      - "The attacker must be on a trunk port with the same native VLAN as the target switch"
      - "DHCP snooping must be disabled on all switches"
      - "The attacker must have physical access to the network closet"
    correct_answer: 1
    explanations:
      correct: "Double-tag VLAN hopping works by sending frames with two 802.1Q tags. The outer tag matches the native VLAN of the trunk link (which is stripped by the first switch). The inner tag then directs the frame to a different VLAN on the next switch. This only works when the attacker's port shares the native VLAN with the trunk link between switches."
      incorrect:
        - "STP status does not affect VLAN hopping via double tagging — STP prevents loops, not VLAN traversal attacks."
        - "The attacker being on a port with the same native VLAN as the inter-switch trunk is the required condition for double-tag VLAN hopping."
        - "DHCP snooping prevents rogue DHCP servers — it is not related to VLAN hopping attacks."
        - "Double-tag VLAN hopping is a logical/software attack — physical access is not required."
    difficulty: "hard"
    tags: ["attacks", "networking", "VLAN"]

  - id: q-d4-037
    domain: domain4
    question: "A network administrator discovers that the ARP table on a Windows workstation shows the gateway's IP address mapped to an attacker's MAC address. Which attack has most likely occurred?"
    options:
      - "DNS poisoning"
      - "MAC flooding"
      - "ARP poisoning"
      - "IP spoofing"
    correct_answer: 2
    explanations:
      correct: "ARP poisoning (ARP spoofing) involves sending forged ARP replies that associate the attacker's MAC address with a legitimate IP address (like the default gateway). Any traffic the victim sends to the gateway is intercepted by the attacker, enabling Man-in-the-Middle attacks. The incorrect ARP table entry (gateway IP → attacker MAC) is the telltale sign."
      incorrect:
        - "DNS poisoning substitutes false DNS records to redirect domain lookups — it would appear in DNS cache entries, not ARP tables."
        - "MAC flooding overwhelms the switch's CAM table to force broadcast mode — it doesn't modify ARP tables on endpoints."
        - "ARP poisoning (forging ARP replies to map legitimate IPs to attacker's MAC) is the attack indicated by the incorrect ARP table entry."
        - "IP spoofing forges the source IP address in packets — it does not modify ARP tables."
    difficulty: "medium"
    tags: ["attacks", "networking", "ARP"]

  - id: q-d4-038
    domain: domain4
    question: "IPsec ESP in Tunnel mode is most appropriate for which scenario?"
    options:
      - "Encrypting traffic between two individual hosts on the same LAN"
      - "Securing communications between two network gateways, encrypting the entire original packet"
      - "Providing integrity-only protection for network management traffic"
      - "Authenticating individual users to a web application"
    correct_answer: 1
    explanations:
      correct: "IPsec Tunnel mode encrypts the entire original IP packet (header + payload) and encapsulates it in a new IP packet. This hides internal addressing and is used for site-to-site VPN connections between gateways. Transport mode encrypts only the payload (not the outer IP header) and is used for host-to-host communications where IP addresses don't need to be hidden."
      incorrect:
        - "Host-to-host communication on the same LAN typically uses IPsec Transport mode — Tunnel mode adds unnecessary overhead for same-LAN traffic."
        - "Gateway-to-gateway VPN with full packet encryption (Tunnel mode) is the correct use case for IPsec ESP Tunnel mode."
        - "Integrity-only protection (no encryption) is provided by AH (Authentication Header) — not ESP (Encapsulating Security Payload) which always encrypts."
        - "Web application authentication is handled at the application layer (forms, OAuth) — not IPsec."
    difficulty: "hard"
    tags: ["protocols", "IPsec", "VPN"]

  - id: q-d4-039
    domain: domain4
    question: "DNS Security Extensions (DNSSEC) protects against which specific attack?"
    options:
      - "DDoS amplification attacks using DNS"
      - "DNS cache poisoning by cryptographically signing DNS resource records"
      - "DNS tunneling for data exfiltration"
      - "Unauthorized zone transfers"
    correct_answer: 1
    explanations:
      correct: "DNSSEC adds cryptographic signatures to DNS resource records, allowing resolvers to verify that responses came from the legitimate zone and have not been tampered with. This directly counters DNS cache poisoning (Kaminsky attack) where attackers inject false DNS records. Resolvers validate the signature chain back to the DNSSEC-signed root zone."
      incorrect:
        - "DDoS amplification uses DNS as a reflection/amplification tool — DNSSEC does not prevent the DNS service from being used for amplification."
        - "Cryptographically signing DNS records to prevent cache poisoning is the correct DNSSEC protection."
        - "DNS tunneling encodes data in DNS queries/responses — DNSSEC authenticates record integrity but does not inspect or block DNS query content."
        - "Unauthorized zone transfers are prevented by ACLs on DNS servers and TSIG (Transaction Signatures) — not DNSSEC, which focuses on response authenticity."
    difficulty: "medium"
    tags: ["protocols", "DNS", "DNSSEC"]

  - id: q-d4-040
    domain: domain4
    question: "In a Zero Trust Architecture, which principle replaces the traditional concept of a trusted internal network perimeter?"
    options:
      - "All traffic inside the corporate firewall is trusted by default"
      - "Never trust, always verify — every access request is authenticated and authorized regardless of network location"
      - "Trust is established by physical network location (wired vs. wireless)"
