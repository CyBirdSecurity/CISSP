  - id: q-d4-042
    domain: domain4
    question: "WPA3 improves upon WPA2 in authentication primarily through which mechanism?"
    options:
      - "Using AES-128 instead of TKIP for encryption"
      - "Simultaneous Authentication of Equals (SAE) replacing PSK, making offline dictionary attacks impractical"
      - "Requiring certificates for all connecting devices"
      - "Eliminating the need for passwords entirely"
    correct_answer: 1
    explanations:
      correct: "WPA3 replaces the Pre-Shared Key (PSK) handshake (used in WPA2) with Simultaneous Authentication of Equals (SAE), also known as Dragonfly. SAE is resistant to offline dictionary attacks because each authentication attempt requires online interaction with the AP — captured handshakes cannot be dictionary-attacked offline. WPA2-PSK handshakes (PMKID/4-way handshake) can be captured and cracked offline."
      incorrect:
        - "WPA2 with AES was already an improvement over TKIP — WPA3's key innovation is SAE for key exchange, not just changing the encryption cipher."
        - "SAE replacing PSK to prevent offline dictionary attacks is the primary WPA3 authentication improvement."
        - "WPA3-Personal uses passwords — it does not require certificates (that is WPA3-Enterprise using 802.1X)."
        - "WPA3-Personal still uses passwords — the improvement is in how the password is used for authentication (SAE vs. PSK handshake)."
    difficulty: "medium"
    tags: ["wireless", "WPA3", "authentication"]

  - id: q-d4-043
    domain: domain4
    question: "A network architect segments the corporate network into zones with firewall controls between each zone. This design follows which security principle?"
    options:
      - "Single point of control"
      - "Security through obscurity"
      - "Defense in depth through network segmentation"
      - "Fail open design"
    correct_answer: 2
    explanations:
      correct: "Separating a network into zones with firewall controls between them implements defense in depth — if one zone is compromised, the attacker faces additional barriers to reach other zones. Segmentation limits lateral movement, contains breaches, and reduces blast radius. Common zones: internet, DMZ, internal network, sensitive data zone, management network."
      incorrect:
        - "Single point of control would centralize all security decisions — segmentation creates multiple independent checkpoints."
        - "Security through obscurity relies on hiding system details — network segmentation is an explicit, structural security control."
        - "Defense in depth through network segmentation is the correct security principle implemented."
        - "Fail open design defaults to permissive access during failures — network segmentation is a restrictive control that limits unauthorized access."
    difficulty: "easy"
    tags: ["networking", "architecture", "segmentation"]

  - id: q-d4-044
    domain: domain4
    question: "HSTS (HTTP Strict Transport Security) prevents which specific attack against HTTPS?"
    options:
      - "SQL injection through HTTPS connections"
      - "SSL stripping, where an attacker downgrades HTTPS to HTTP"
      - "Certificate spoofing using self-signed certificates"
      - "Brute-force attacks on TLS session keys"
    correct_answer: 1
    explanations:
      correct: "SSL stripping (discovered by Moxie Marlinspike) intercepts the initial HTTP request before the HTTPS redirect, maintaining HTTP with the victim while connecting to the server via HTTPS. HSTS tells browsers to only ever connect via HTTPS for the specified domain — the browser refuses HTTP connections and upgrades to HTTPS automatically, blocking the downgrade attack."
      incorrect:
        - "SQL injection is an application vulnerability — HSTS enforces transport encryption but does not protect against application-layer injection attacks."
        - "HSTS preventing SSL stripping (HTTP downgrade attacks) is the correct answer."
        - "Certificate validation and revocation prevent certificate spoofing — HSTS enforces HTTPS use but relies on normal certificate validation."
        - "TLS session key brute-force resistance comes from key length and algorithm strength — not HSTS."
    difficulty: "medium"
    tags: ["web-security", "TLS", "HSTS"]

