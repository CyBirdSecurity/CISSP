      incorrect:
        - "IEEE 802.11 is the wireless networking standard (Wi-Fi) — not port-based network access control."
        - "IEEE 802.1Q is the VLAN tagging standard — it segments network traffic but does not authenticate devices before granting access."
        - "IEEE 802.1X (port-based NAC requiring device authentication before network access) is the correct standard."
        - "IEEE 802.3 is the wired Ethernet standard — it defines physical and data link specifications, not access control."
