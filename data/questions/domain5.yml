    tags: ["OIDC", "SSO", "JWT"]

  - id: q-d5-032
    domain: domain5
    question: "What is 'zero standing privileges' (ZSP) and how does it relate to least privilege?"
    options:
      - "Requiring all users to have zero access to start, then granting access via requests"
      - "Eliminating all persistent privileged access so accounts have no elevated rights until explicitly needed, then access is granted JIT and revoked after use"
      - "Revoking all access when an employee leaves the organization"
      - "A firewall policy blocking all inbound connections by default"
    correct_answer: 1
    explanations:
      correct: "Zero Standing Privileges (ZSP) extends least privilege to its logical conclusion: no account maintains permanent elevated privileges. Access is granted just-in-time for specific tasks and automatically revoked upon completion. This eliminates the standing privilege attack surface that attackers target in lateral movement."
      incorrect:
        - "Starting with zero access is a good onboarding practice but is not specifically ZSP — ZSP focuses on eliminating persistent elevated/admin rights."
        - "Eliminating persistent elevated access with JIT grants that auto-revoke is the correct description of ZSP."
        - "Revoking access upon termination is access lifecycle management — ZSP applies to active, ongoing privileged access for all users."
        - "Default-deny firewall policies are network security controls — ZSP is an identity and access management principle."
    difficulty: "hard"
    tags: ["PAM", "least-privilege"]

  - id: q-d5-033
    domain: domain5
    question: "A biometric system has a False Accept Rate (FAR) of 0.001% and a False Reject Rate (FRR) of 5%. What does the FAR indicate in terms of security?"
    options:
      - "The system incorrectly rejects 0.001% of legitimate users"
      - "The system incorrectly accepts 0.001% of unauthorized users — indicating high security but potential inconvenience for legitimate users"
      - "The system requires 0.001% more processing time than standard authentication"
      - "The system has a 0.001% chance of hardware failure"
    correct_answer: 1
    explanations:
      correct: "FAR (False Accept Rate) measures how often the system grants access to unauthorized users — a security failure. FAR of 0.001% means 1 in 100,000 unauthorized attempts succeeds — a very secure setting. However, the high FRR of 5% means 5% of legitimate users are rejected — a usability problem. Security and usability are inversely related in biometrics; sensitivity adjustment trades one for the other."
      incorrect:
        - "Incorrectly rejecting legitimate users is measured by FRR (False Reject Rate), not FAR. 5% is the FRR in this scenario."
        - "FAR of 0.001% indicating very few unauthorized users are accepted (high security, but high false rejection for legitimate users) is the correct interpretation."
        - "FAR measures authentication accuracy, not processing time performance."
        - "FAR measures authentication error rates, not hardware reliability metrics."
    difficulty: "medium"
    tags: ["biometrics", "IAM", "metrics"]

  - id: q-d5-034
    domain: domain5
    question: "SAML-based federation allows an organization's employees to access a SaaS application without creating new accounts in the SaaS platform. The employee's company acts as which SAML role?"
    options:
      - "Service Provider (SP)"
      - "Identity Provider (IdP)"
      - "Relying Party"
      - "Certificate Authority (CA)"
    correct_answer: 1
    explanations:
      correct: "In SAML federation, the Identity Provider (IdP) is the entity that authenticates users and asserts their identity. The employee's company (which manages their accounts and credentials) is the IdP. The SaaS application is the Service Provider (SP) — it relies on the IdP's assertion to grant access without managing authentication itself."
      incorrect:
        - "The Service Provider is the SaaS application that accepts SAML assertions from the IdP to grant access — not the employee's company."
        - "The employee's company managing authentication and providing SAML assertions to the SaaS platform is the Identity Provider — this is correct."
        - "Relying Party is a general term (sometimes used in OIDC) for the party that relies on identity assertions — in SAML terminology, this is the Service Provider role."
        - "A Certificate Authority issues digital certificates — not a SAML federation role."
    difficulty: "medium"
    tags: ["federation", "SAML", "IAM"]

  - id: q-d5-035
    domain: domain5
    question: "Which authentication protocol uses tickets and a Key Distribution Center (KDC) to enable single sign-on across an enterprise network?"
    options:
      - "RADIUS"
      - "LDAP"
      - "Kerberos"
      - "TACACS+"
    correct_answer: 2
    explanations:
      correct: "Kerberos uses a trusted third party (KDC consisting of Authentication Service and Ticket-Granting Service) to issue tickets proving authentication. Users authenticate once to get a Ticket-Granting Ticket (TGT), then exchange it for service-specific tickets without re-entering credentials. Windows Active Directory uses Kerberos for enterprise SSO."
      incorrect:
        - "RADIUS is an AAA protocol for network access control — it does not use tickets or a KDC for SSO."
        - "LDAP is a directory access protocol for querying user information — it does not provide authentication ticket-granting mechanisms."
        - "Kerberos (tickets + KDC for SSO) is the correct answer."
        - "TACACS+ is a Cisco AAA protocol for device administration authentication — it does not use the Kerberos ticket system."
    difficulty: "easy"
    tags: ["protocols", "authentication", "Kerberos"]

  - id: q-d5-036
    domain: domain5
    question: "An attacker captures an NTLM hash from a Windows system's memory using Mimikatz. They then use this hash to authenticate to a file server without cracking it. This attack is called:"
    options:
      - "Pass-the-Ticket"
      - "Kerberoasting"
      - "Pass-the-Hash"
      - "Golden Ticket attack"
    correct_answer: 2
    explanations:
      correct: "Pass-the-Hash (PtH) exploits Windows NTLM authentication, which accepts the hash directly as proof of identity. The attacker extracts the NTLM hash from LSASS memory and uses it to authenticate to remote services without needing the plaintext password. Mitigation: Credential Guard, Protected Users group, LAPS, and disabling NTLM where possible."
      incorrect:
        - "Pass-the-Ticket uses a stolen Kerberos ticket (TGT or service ticket) — not an NTLM hash."
        - "Kerberoasting extracts and cracks Kerberos service tickets offline — it involves Kerberos, not NTLM hashes."
        - "Pass-the-Hash (using captured NTLM hash to authenticate without the plaintext password) is the correct answer."
        - "A Golden Ticket attack forges a Kerberos TGT using the KRBTGT account hash — it uses Kerberos, not NTLM."
    difficulty: "hard"
    tags: ["attacks", "Windows", "authentication"]

  - id: q-d5-037
    domain: domain5
    question: "Password spraying differs from traditional brute-force attacks in which key way?"
    options:
      - "Password spraying uses GPU acceleration to test passwords faster"
      - "Password spraying tries a few common passwords against many accounts to avoid triggering lockout policies"
      - "Password spraying only targets web applications"
      - "Password spraying uses leaked password databases from previous breaches"
    correct_answer: 1
    explanations:
      correct: "Traditional brute-force tries many passwords against one account — quickly triggering lockout. Password spraying inverts this: it tries one or few very common passwords (like 'Summer2024!') across thousands of accounts. The low attempt count per account avoids lockout detection while the high account volume increases success probability."
      incorrect:
        - "GPU acceleration is used in offline hash cracking — password spraying is an online attack against live authentication endpoints."
        - "Trying few passwords against many accounts to avoid lockout detection is the correct description of password spraying."
        - "Password spraying targets any authentication interface — VPN, Office 365, SSH, domain logons — not exclusively web applications."
        - "Using leaked credential databases for login attempts describes credential stuffing — not password spraying."
    difficulty: "medium"
    tags: ["attacks", "authentication"]

  - id: q-d5-038
    domain: domain5
    question: "Role-Based Access Control (RBAC) provides which primary administrative advantage over assigning permissions directly to users?"
    options:
      - "RBAC automatically encrypts all data accessed by role members"
      - "RBAC simplifies administration — changing a role's permissions automatically updates all users assigned to that role"
      - "RBAC prevents users from accessing any data outside their department"
      - "RBAC eliminates the need for user authentication"
    correct_answer: 1
    explanations:
      correct: "With RBAC, permissions are assigned to roles, and users are assigned to roles. When job requirements change (e.g., all developers now need access to a new repository), an administrator updates the role once — automatically affecting all role members. Direct user-to-permission assignment requires updating each user individually, creating high administrative overhead and inconsistency."
      incorrect:
        - "RBAC manages access permissions — it does not provide data encryption functionality."
        - "Simplified administration through role-level permission management (one change updates all users) is the correct primary RBAC advantage."
        - "RBAC controls what resources a role can access but doesn't automatically enforce departmental boundaries — those must be designed into the role structure."
        - "RBAC is an authorization model — it does not replace authentication. Users must still authenticate before RBAC determines what they can access."
    difficulty: "easy"
    tags: ["access-control", "RBAC", "IAM"]

  - id: q-d5-039
    domain: domain5
    question: "What is the primary security risk of maintaining orphaned service accounts (accounts used by applications that no longer exist)?"
    options:
      - "They consume excessive system resources"
      - "They can be exploited by attackers for persistent access, often having elevated privileges and no monitoring"
      - "They prevent legitimate users from logging in"
      - "They cause application performance degradation"
    correct_answer: 1
    explanations:
      correct: "Orphaned service accounts often have elevated privileges (apps need broad access) and are not monitored for unusual activity (nobody owns them). Attackers who discover these accounts can use them for persistent access — no legitimate owner will notice the account is being used. Service accounts are prime targets in Active Directory attacks."
      incorrect:
        - "Unused accounts do not consume significant resources — the security risk is unauthorized access, not resource consumption."
        - "Orphaned service accounts enabling persistent attacker access (with elevated privileges and no monitoring) is the correct security risk."
        - "Orphaned accounts don't affect other users' login capabilities — they are simply inactive accounts that can be exploited."
        - "Unused accounts do not affect application performance — they are idle, not actively processing requests."
