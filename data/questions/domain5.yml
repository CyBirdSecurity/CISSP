  - id: q-d5-026
    domain: domain5
    question: "What is 'account harvesting' and how can organizations defend against it?"
    options:
      - "Physically stealing servers — defended by physical security"
      - "Enumerating valid usernames from application error messages or timing differences — defended by generic error messages and consistent response times"
      - "Intercepting account credentials over the network — defended by TLS"
      - "Creating fake accounts to access resources — defended by identity verification"
    correct_answer: 1
    explanations:
      correct: "Account harvesting (username enumeration) exploits different application responses to valid vs. invalid usernames (different error messages or response times). Attackers build a list of valid accounts for targeted attacks. Defense: return the same generic message ('invalid credentials') regardless of whether the username exists."
      incorrect:
        - "Server theft is a physical security issue — account harvesting is a logical attack against application responses."
        - "Enumerating valid accounts via error message or timing differences, defended by generic responses — this correctly describes account harvesting."
        - "Network credential interception is a sniffing/MitM attack — account harvesting exploits application feedback."
        - "Creating fake accounts is account fraud — harvesting collects existing valid account names."
