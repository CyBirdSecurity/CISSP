questions:
  - id: q-d5-001
    domain: domain5
    question: "A user authenticates with a password and a hardware token. What type of authentication is this?"
    options:
      - "Single-factor authentication"
      - "Multi-factor authentication"
      - "Two-step verification"
      - "Biometric authentication"
    correct_answer: 1
    explanations:
      correct: "Using a password (something you know) AND a hardware token (something you have) combines two different authentication factor categories, making this multi-factor authentication (MFA)."
      incorrect:
        - "Single-factor authentication uses only one factor — using two separate factors from different categories is MFA."
        - "MFA combines factors from different categories (know, have, are) — password + hardware token is MFA."
        - "Two-step verification (using the same factor category twice, like two passwords) is not MFA. Using factors from different categories is MFA."
        - "Biometric authentication uses 'something you are' (fingerprint, face, iris) — a hardware token is 'something you have.'"
    difficulty: "easy"
    tags: ["authentication", "MFA"]

  - id: q-d5-002
    domain: domain5
    question: "What is the primary security risk associated with Single Sign-On (SSO)?"
    options:
      - "Users must remember too many passwords"
      - "Compromised SSO credentials provide access to all integrated systems"
      - "SSO increases authentication latency"
      - "SSO cannot support multi-factor authentication"
    correct_answer: 1
    explanations:
      correct: "SSO creates a single point of failure for authentication. If an attacker compromises SSO credentials (or the SSO provider itself), they gain access to all systems integrated with that SSO. This risk must be mitigated with strong MFA and monitoring."
      incorrect:
        - "SSO reduces password complexity — users only need one set of credentials. Password fatigue is reduced, not increased."
        - "Compromised credentials granting access to all systems is the correct and critical security risk of SSO."
        - "SSO is generally faster — authentication happens once. Latency increase is not the primary concern."
        - "SSO providers typically support and encourage MFA — this is not a limitation of SSO."
    difficulty: "medium"
    tags: ["SSO", "IAM"]

  - id: q-d5-003
    domain: domain5
    question: "In the RBAC model, what is the correct relationship between users, roles, and permissions?"
    options:
      - "Users are assigned permissions directly, and roles organize related users"
      - "Permissions are assigned to roles, and users are assigned to roles"
      - "Roles are assigned to objects, and users receive access through object ownership"
      - "Users and permissions are directly linked without intermediate roles"
    correct_answer: 1
    explanations:
      correct: "In RBAC, permissions are assigned to roles (not to users directly), and then users are assigned to appropriate roles. This simplifies administration — changing a role's permissions updates all users in that role automatically."
      incorrect:
        - "In RBAC, permissions are NOT assigned directly to users — they are assigned to roles, then users get roles."
        - "Permissions to roles, then users to roles — this correctly describes the RBAC model."
        - "RBAC is not about object ownership — that describes DAC (Discretionary Access Control)."
        - "Direct user-to-permission assignment is characteristic of DAC, not RBAC."
    difficulty: "easy"
    tags: ["RBAC", "access-control"]

  - id: q-d5-004
    domain: domain5
    question: "Which access control model is typically enforced by the operating system and uses security labels to control access, with users unable to override policy?"
    options:
      - "DAC (Discretionary Access Control)"
      - "RBAC (Role-Based Access Control)"
      - "MAC (Mandatory Access Control)"
      - "ABAC (Attribute-Based Access Control)"
    correct_answer: 2
    explanations:
      correct: "MAC is enforced by the OS/system — not by individual users or object owners. Security labels (classification levels) are assigned to subjects and objects, and the system enforces access based on these labels. Users cannot override or change the policy."
      incorrect:
        - "DAC allows the resource owner to determine access — users CAN override/grant access. This is the opposite of MAC."
        - "RBAC assigns permissions through roles — it is an administrative model, not a system-enforced label-based model."
        - "MAC is enforced by the OS with security labels that users cannot override — this is correct."
        - "ABAC uses policy attributes for access decisions — it is more flexible and not based on hierarchical security labels."
    difficulty: "medium"
    tags: ["MAC", "access-control"]

  - id: q-d5-005
    domain: domain5
    question: "What is the purpose of a Kerberos Ticket Granting Ticket (TGT)?"
    options:
      - "To authorize access to a specific network service"
      - "To prove the user's identity to the Ticket Granting Service so they can obtain service tickets"
      - "To encrypt all communications between client and server"
      - "To store user credentials securely in the KDC database"
    correct_answer: 1
    explanations:
      correct: "The TGT is issued by the Authentication Service (AS) after initial login. The user presents the TGT to the Ticket Granting Service (TGS) to obtain specific service tickets for individual resources — without re-entering their password."
      incorrect:
        - "Access to a specific service is granted through a service ticket, not the TGT. The TGT only grants access to the TGS."
        - "The TGT proves identity to the TGS to obtain service tickets — this correctly describes the TGT's role."
        - "Communication encryption uses session keys within tickets — the TGT is an authentication mechanism, not an encryption service."
        - "User credentials are stored in the AS database — the TGT is issued after authentication, not used to store credentials."
    difficulty: "hard"
    tags: ["Kerberos", "authentication"]

  - id: q-d5-006
    domain: domain5
    question: "What is the key difference between authentication and authorization?"
    options:
      - "Authentication verifies what you can do; authorization verifies who you are"
      - "Authentication verifies who you are; authorization determines what you are permitted to do"
      - "They are the same process with different names in different frameworks"
      - "Authentication is for humans; authorization is for systems and services"
    correct_answer: 1
    explanations:
      correct: "Authentication answers 'Who are you?' by verifying identity (password, biometrics, tokens). Authorization answers 'What can you do?' by determining what resources and actions the authenticated identity is permitted to access."
      incorrect:
        - "This is reversed. Authentication verifies identity (who you are); authorization determines what you're permitted to do."
        - "Authentication verifies identity; authorization determines permissions — this is correct."
        - "They are distinct processes. Authentication must succeed before authorization can occur."
        - "Both authentication and authorization apply to humans, systems, services, and applications."
    difficulty: "easy"
    tags: ["authentication", "authorization", "IAM"]

  - id: q-d5-007
    domain: domain5
    question: "SAML is primarily used to enable which capability?"
    options:
      - "Encrypting database credentials"
      - "Single Sign-On between identity providers and service providers"
      - "Two-factor authentication for mobile devices"
      - "Certificate-based authentication for network devices"
    correct_answer: 1
    explanations:
      correct: "SAML (Security Assertion Markup Language) is an XML-based standard that enables SSO by allowing Identity Providers (IdPs) to securely communicate authentication and authorization data to Service Providers (SPs), enabling federated identity."
      incorrect:
        - "SAML is not used for database credential encryption — it is an authentication/authorization communication standard."
        - "SSO between identity and service providers is the primary use case for SAML."
        - "While SAML can include MFA assertions, its primary purpose is SSO federation, not 2FA specifically."
        - "Certificate-based authentication for network devices uses protocols like EAP-TLS or 802.1X, not SAML."
    difficulty: "medium"
    tags: ["SAML", "SSO", "federation"]

  - id: q-d5-008
    domain: domain5
    question: "Which access control principle requires that when an employee changes roles, their old access permissions should be removed and only new, appropriate permissions granted?"
    options:
      - "Least privilege"
      - "Separation of duties"
      - "Privilege revocation"
      - "Access recertification"
    correct_answer: 0
    explanations:
      correct: "Least privilege requires that users have only the minimum access necessary for their current role. When roles change, old permissions should be removed (privilege revocation/access recertification) to maintain least privilege. Accumulating permissions across roles is called 'privilege creep.'"
      incorrect:
        - "Least privilege requires removing old access when roles change — this correctly describes the principle violated by privilege creep."
        - "Separation of duties divides critical functions among multiple people — it does not specifically address role change access management."
        - "Privilege revocation is the action taken (removing old permissions) — least privilege is the underlying principle that drives this requirement."
        - "Access recertification is a periodic review process to verify access is still appropriate — it is a mechanism to enforce least privilege but not the principle itself."
    difficulty: "medium"
    tags: ["least-privilege", "IAM"]

  - id: q-d5-009
    domain: domain5
    question: "What is 'privilege creep' and how should it be addressed?"
    options:
      - "A system vulnerability where privileges escalate automatically"
      - "The gradual accumulation of access rights beyond what is needed, addressed through access reviews and recertification"
      - "When privileged users misuse their access intentionally"
      - "A type of malware that escalates system privileges"
    correct_answer: 1
    explanations:
      correct: "Privilege creep occurs when users accumulate access rights over time (through job changes, project assignments) beyond what their current role requires. It is addressed through periodic access reviews/recertification and role-change revocation processes."
      incorrect:
        - "Automatic privilege escalation is a technical vulnerability, not privilege creep. Privilege creep is an administrative/process issue."
        - "Gradual accumulation beyond need, addressed through reviews — this correctly describes privilege creep and its remediation."
        - "Intentional misuse of privileges is insider threat — privilege creep describes unintended accumulation, not intentional misuse."
        - "Privilege escalation malware is a technical attack — privilege creep is an administrative access management problem."
    difficulty: "medium"
    tags: ["IAM", "access-control"]

  - id: q-d5-010
    domain: domain5
    question: "What is the primary purpose of Privileged Access Management (PAM) solutions?"
    options:
      - "Managing password complexity requirements for all users"
      - "Controlling, monitoring, and auditing privileged account access to reduce risk from compromised or abused admin credentials"
      - "Providing self-service password reset for end users"
      - "Enforcing multi-factor authentication for all user accounts"
    correct_answer: 1
    explanations:
      correct: "PAM solutions specifically manage privileged accounts (admin, root, service accounts) through credential vaulting, just-in-time access, session recording, and monitoring. Privileged accounts are targeted in 80% of breaches, making PAM critical."
      incorrect:
        - "General password management (complexity, history, expiration) is handled by password policies, not PAM specifically."
        - "PAM controls privileged access with vaulting, JIT provisioning, and session recording — this is the correct description."
        - "Self-service password reset is a standard IAM feature, not specifically PAM. PAM focuses on privileged/administrative accounts."
        - "MFA enforcement is a broader IAM control. PAM specifically addresses privileged accounts beyond just adding MFA."
    difficulty: "medium"
    tags: ["PAM", "privileged-access"]

  - id: q-d5-011
    domain: domain5
    question: "In federated identity management, what is the role of an Identity Provider (IdP)?"
    options:
      - "The service that the user wants to access"
      - "The organization that authenticates users and asserts their identity to service providers"
      - "The protocol used to transmit identity assertions"
      - "The network device that enforces access policies"
    correct_answer: 1
    explanations:
      correct: "The Identity Provider (IdP) authenticates the user and creates identity assertions (e.g., SAML assertions, JWT tokens) that are trusted by Service Providers (SPs). The IdP manages the user's credentials and identity."
      incorrect:
        - "The service the user wants to access is the Service Provider (SP), not the Identity Provider."
        - "The IdP authenticates users and asserts their identity — this correctly describes the IdP role."
        - "The protocol (SAML, OAuth, OIDC) is the communication standard, not the IdP."
        - "Access policy enforcement is done by the SP or an access control system, not the IdP."
    difficulty: "medium"
    tags: ["federation", "SSO", "IAM"]

  - id: q-d5-012
    domain: domain5
    question: "Which biometric authentication factor has the highest accuracy and is considered most secure for identification purposes?"
    options:
      - "Fingerprint recognition"
      - "Facial recognition"
      - "Iris scan"
      - "Voice recognition"
    correct_answer: 2
    explanations:
      correct: "Iris scans are considered among the most accurate biometric identifiers. The iris pattern is highly unique (even between identical twins), remains stable throughout life, and is difficult to forge. It has very low False Acceptance Rate (FAR) and False Rejection Rate (FRR)."
      incorrect:
        - "Fingerprint recognition is widely used and accurate but can be affected by cuts, dirt, or age. It is less accurate than iris scans."
        - "Facial recognition has improved dramatically but can be fooled by photos, twins, or facial changes and is generally less accurate than iris scans in controlled conditions."
        - "Iris scans are the most accurate common biometric — stable, unique, and hard to forge."
        - "Voice recognition is the least reliable biometric — affected by illness, ambient noise, and can be replayed or synthesized."
    difficulty: "hard"
    tags: ["biometrics", "authentication"]

  - id: q-d5-013
    domain: domain5
    question: "What is 'just-in-time' (JIT) access provisioning in privileged access management?"
    options:
      - "Granting permanent privileged access to all administrators to avoid delays"
      - "Providing temporary, time-limited privileged access only when needed for a specific task, automatically expiring afterward"
      - "Requiring privileged users to log in at exactly scheduled times"
      - "Automatically provisioning new user accounts during onboarding"
    correct_answer: 1
    explanations:
      correct: "JIT access provides elevated privileges on demand for a defined time window and specific purpose. When the window expires, privileges are automatically removed. This reduces standing privileged access (a major attack surface) — attackers compromising a JIT-managed account can't abuse persistent elevated access."
      incorrect:
        - "Permanent privileged access (standing privileges) is the problem JIT solves — it creates persistent attack surface."
        - "Temporary, time-limited access for specific tasks that auto-expires is the correct description of JIT access."
        - "JIT refers to provisioning timing (on-demand), not the time of day users log in."
        - "New account provisioning during onboarding is identity lifecycle management — JIT specifically addresses privileged access duration."
    difficulty: "medium"
    tags: ["PAM", "privileged-access"]

  - id: q-d5-014
    domain: domain5
    question: "Which authentication factor category does a hardware security key (like a YubiKey) belong to?"
    options:
      - "Something you know"
      - "Something you have"
      - "Something you are"
      - "Somewhere you are"
    correct_answer: 1
    explanations:
      correct: "A hardware security key (physical token like a YubiKey) is 'something you have' — a physical possession factor. YubiKeys implement FIDO2/WebAuthn, providing strong phishing-resistant MFA. The 'have' factor is compromised by physical theft or loss of the device."
      incorrect:
        - "'Something you know' includes passwords, PINs, and security questions — not physical hardware devices."
        - "'Something you have' correctly describes physical hardware tokens — YubiKey, smart cards, hardware OTP tokens."
        - "'Something you are' includes biometrics — fingerprints, iris scans, facial recognition."
        - "'Somewhere you are' is a location-based factor using IP geolocation or GPS — not a physical hardware device."
    difficulty: "easy"
    tags: ["authentication", "MFA"]

  - id: q-d5-015
    domain: domain5
    question: "What is the primary advantage of FIDO2/WebAuthn over traditional password-based authentication?"
    options:
      - "FIDO2 uses longer passwords that are harder to guess"
      - "FIDO2 uses public key cryptography tied to the specific website, making credentials phishing-resistant and eliminating shared secrets"
      - "FIDO2 is cheaper to implement than password systems"
      - "FIDO2 allows users to use the same password on all websites"
    correct_answer: 1
    explanations:
      correct: "FIDO2/WebAuthn uses asymmetric cryptography where the private key never leaves the authenticator device. Credentials are site-specific (the public key is registered per site) — credentials for site A cannot be used on a fake site B, making phishing impossible. No shared secret is transmitted or stored on the server."
      incorrect:
        - "FIDO2 replaces passwords entirely — it doesn't use longer passwords."
        - "Public key cryptography tied to specific sites, eliminating phishing and shared secrets, is the key FIDO2 advantage."
        - "FIDO2 implementation requires hardware authenticators or device TPMs — it may add infrastructure cost."
        - "FIDO2 generates site-specific credentials (the opposite of reuse) — credential reuse is a password security anti-pattern."
    difficulty: "hard"
    tags: ["authentication", "FIDO2"]

  - id: q-d5-016
    domain: domain5
    question: "In OAuth 2.0, what does the 'authorization code' grant type provide?"
    options:
      - "Direct access to the resource with a username and password"
      - "A short-lived code exchanged server-side for an access token, keeping tokens out of the browser"
      - "Permanent access to resources without user involvement"
      - "A token stored in browser cookies for session management"
    correct_answer: 1
    explanations:
      correct: "The Authorization Code flow redirects the user to the authorization server, which returns a short-lived authorization code to the client. The client then exchanges this code for an access token in a server-to-server call. This keeps the access token out of the browser/URL (preventing token theft via browser history or logs)."
      incorrect:
        - "Direct username/password to the resource server bypasses OAuth's delegation model — this is what OAuth replaces."
        - "A short-lived code exchanged server-side for tokens, keeping them out of the browser — this correctly describes the Authorization Code flow."
        - "Permanent access without user involvement describes the Client Credentials flow for machine-to-machine — not Authorization Code."
        - "Storing tokens in browser cookies is a session management pattern — the Authorization Code grant specifically avoids tokens appearing in the browser."
    difficulty: "hard"
    tags: ["OAuth", "IAM"]

  - id: q-d5-017
    domain: domain5
    question: "What is the purpose of an 'access review' or 'user access recertification' process?"
    options:
      - "To train users on how to use access management systems"
      - "To periodically verify that user access rights are still appropriate and remove unnecessary privileges"
      - "To reset passwords on a scheduled basis"
      - "To document all user login activity for compliance"
    correct_answer: 1
    explanations:
      correct: "Access reviews (recertification campaigns) periodically verify that each user's access is still appropriate for their current role. Data owners or managers review and certify (or revoke) access rights. This addresses privilege creep and ensures terminated or transferred employees don't retain inappropriate access."
      incorrect:
        - "Training users on access management is part of security awareness — recertification is about reviewing and validating access rights."
        - "Periodically verifying access appropriateness and removing unnecessary privileges is the correct purpose of access reviews."
        - "Password resets are an authentication management activity — access reviews examine what resources users can reach."
        - "Login activity logging is audit log management — access reviews evaluate whether existing access permissions remain appropriate."
    difficulty: "easy"
    tags: ["IAM", "access-control"]

  - id: q-d5-018
    domain: domain5
    question: "What distinguishes Attribute-Based Access Control (ABAC) from Role-Based Access Control (RBAC)?"
    options:
      - "ABAC is simpler to implement than RBAC"
      - "ABAC makes access decisions based on multiple attributes (user, resource, environment); RBAC uses predefined roles"
      - "RBAC can handle more complex policies than ABAC"
      - "ABAC is only used in government environments; RBAC is for commercial use"
    correct_answer: 1
    explanations:
      correct: "ABAC makes dynamic access decisions based on attributes — user attributes (clearance, department, location), resource attributes (classification, type), and environmental attributes (time of day, IP address). This enables fine-grained policies. RBAC uses predefined roles which are simpler but less flexible for complex requirements."
      incorrect:
        - "ABAC is generally more complex to implement due to the policy engine and attribute management required."
        - "ABAC uses multiple attribute types for dynamic decisions; RBAC uses predefined roles — this correctly distinguishes them."
        - "ABAC handles more complex, fine-grained policies than RBAC — RBAC is simpler but less flexible."
        - "Both ABAC and RBAC are used across all sectors — neither is limited to a specific type of organization."
    difficulty: "medium"
    tags: ["ABAC", "RBAC", "access-control"]

  - id: q-d5-019
    domain: domain5
    question: "What is a 'service account' and what special security controls should be applied to it?"
    options:
      - "An account for customer-facing service staff — requires regular password changes"
      - "A non-human account used by applications and services — requires long/complex passwords, limited privileges, and regular rotation or managed service accounts"
      - "An account with read-only access to service logs"
      - "A temporary account created for vendor support visits"
    correct_answer: 1
    explanations:
      correct: "Service accounts are non-interactive accounts used by applications, scripts, and services. Security controls: strong/random passwords, principle of least privilege (only what the service needs), no interactive login, no email inbox, documented ownership, and preferably managed via PAM or gMSA (Group Managed Service Accounts). They are a common attack target."
      incorrect:
        - "Service accounts are for applications/services, not human service staff — they require different controls than user accounts."
        - "Non-human accounts for applications requiring strong credentials, minimal privileges, and managed rotation — this is correct."
        - "Read-only access is one possible configuration — service accounts have varying privileges depending on what the application needs."
        - "Temporary vendor accounts are a different category — service accounts are persistent application accounts."
    difficulty: "medium"
    tags: ["IAM", "service-accounts"]

  - id: q-d5-020
    domain: domain5
    question: "What is the difference between 'identification' and 'authentication' in the AAA framework?"
    options:
      - "They are the same process in modern systems"
      - "Identification is the claim of identity (who you are); authentication is proving that claim (verifying you are who you say)"
      - "Identification is automated; authentication requires human review"
      - "Authentication occurs first, then identification confirms who authenticated"
    correct_answer: 1
    explanations:
      correct: "The AAA framework has three distinct steps: 1) Identification — presenting an identity claim (entering a username). 2) Authentication — proving the claim (entering a password, biometric scan). 3) Authorization — determining what the authenticated identity can do. Identification without authentication provides no security."
      incorrect:
        - "They are distinct steps — identification presents a claim; authentication verifies it."
        - "Identification is the claim of identity; authentication proves it — this correctly describes both steps."
        - "Both can be automated — the distinction is about claim versus proof, not automation level."
        - "Identification always comes first (you must state who you are before proving it) — not authentication first."
    difficulty: "easy"
    tags: ["IAM", "authentication", "fundamentals"]

  - id: q-d5-021
    domain: domain5
    question: "What biometric performance metric measures the rate at which unauthorized users are incorrectly accepted?"
    options:
      - "False Rejection Rate (FRR)"
      - "False Acceptance Rate (FAR)"
      - "Crossover Error Rate (CER)"
      - "Equal Error Rate (EER)"
    correct_answer: 1
    explanations:
      correct: "The False Acceptance Rate (FAR) — also called Type II error — measures the percentage of unauthorized users incorrectly granted access. A low FAR is critical for high-security systems. FAR is the security metric; FRR is the usability metric. Lower FAR = more secure but may increase FRR."
      incorrect:
        - "False Rejection Rate (FRR / Type I error) measures legitimate users incorrectly denied access — this is a usability concern, not a security failure."
        - "FAR (False Acceptance Rate) measures unauthorized users incorrectly accepted — this is the security failure metric."
        - "Crossover Error Rate (CER) is the point where FAR and FRR are equal — it provides an overall accuracy metric but doesn't specifically measure unauthorized acceptance."
        - "EER (Equal Error Rate) is the same as CER — a balance point, not the specific unauthorized acceptance metric."
    difficulty: "medium"
    tags: ["biometrics", "authentication"]

  - id: q-d5-022
    domain: domain5
    question: "What is the primary security concern with 'pass-the-hash' attacks?"
    options:
      - "Attackers guess passwords using dictionary attacks"
      - "Attackers use a captured password hash directly to authenticate without knowing the plaintext password"
      - "Attackers intercept and replay authentication tokens"
      - "Attackers crack hashed passwords using GPU acceleration"
    correct_answer: 1
    explanations:
      correct: "Pass-the-hash exploits Windows NTLM authentication by using a captured password hash directly to authenticate — the attacker never needs the plaintext password. Defenders can mitigate this by using Kerberos over NTLM, Protected Users security group, credential guard, and least privilege to limit hash exposure."
      incorrect:
        - "Dictionary attacks try to crack the hash by guessing — pass-the-hash uses the hash directly without cracking it."
        - "Using a captured hash to authenticate without knowing the plaintext is the correct description of pass-the-hash."
        - "Token replay attacks (Pass-the-Ticket in Kerberos) are a related but different technique — pass-the-hash specifically uses NTLM hashes."
        - "GPU hash cracking aims to recover the plaintext — pass-the-hash doesn't bother cracking, it just uses the hash."
    difficulty: "hard"
    tags: ["attacks", "authentication"]

  - id: q-d5-023
    domain: domain5
    question: "What is 'context-aware authentication' (adaptive authentication)?"
    options:
      - "Authentication that adapts to different operating systems"
      - "Authentication that dynamically adjusts requirements based on risk signals such as device, location, behavior, and time"
      - "Authentication that learns user preferences over time"
      - "Multi-language support in authentication portals"
    correct_answer: 1
    explanations:
      correct: "Adaptive/context-aware authentication evaluates risk signals — device health, IP reputation, geolocation, time of day, behavioral patterns — and adjusts authentication requirements accordingly. Low-risk logins may succeed with just a password; high-risk scenarios (new device, unusual location) trigger step-up MFA."
      incorrect:
        - "OS compatibility is a software engineering concern — adaptive authentication is about risk-based security decisions."
        - "Dynamically adjusting authentication requirements based on risk signals is the correct description of adaptive authentication."
        - "Learning preferences improves UX — adaptive authentication is a security mechanism that increases friction for risky scenarios."
        - "Language support is a localization feature — adaptive authentication is risk-based policy enforcement."
    difficulty: "medium"
    tags: ["authentication", "IAM"]

  - id: q-d5-024
    domain: domain5
    question: "What is a 'Discretionary Access Control' (DAC) model and what is its primary weakness?"
    options:
      - "Access is controlled by the system based on security labels — weakness is inflexibility"
      - "Resource owners control access to their resources — weakness is that owners can grant access to anyone, including malicious users"
      - "Access is based on job roles — weakness is role explosion with many users"
      - "Access is based on user attributes — weakness is complex policy management"
    correct_answer: 1
    explanations:
      correct: "In DAC, the resource owner decides who gets access (e.g., file permissions on Windows/Unix where users control their own files). The weakness: owners may grant excessive access; malware running as the user inherits their access rights; and there's no system-enforced minimum — a single owner's poor decision can expose data."
      incorrect:
        - "System-controlled access based on security labels is MAC (Mandatory Access Control) — not DAC."
        - "Owner-controlled access where owners can grant to anyone is the correct description of DAC and its weakness."
        - "Role-based access is RBAC — 'role explosion' is RBAC's weakness, not DAC's."
        - "Attribute-based access is ABAC — complex policy management is ABAC's weakness."
    difficulty: "medium"
    tags: ["DAC", "access-control"]

  - id: q-d5-025
    domain: domain5
    question: "What is 'OpenID Connect' (OIDC) and how does it differ from OAuth 2.0?"
    options:
      - "They are the same protocol with different versions"
      - "OIDC is an identity layer on top of OAuth 2.0 that adds authentication and ID tokens; OAuth 2.0 handles authorization only"
      - "OAuth 2.0 provides identity; OIDC provides authorization"
      - "OIDC is for mobile apps; OAuth 2.0 is for web applications"
    correct_answer: 1
    explanations:
      correct: "OAuth 2.0 is an authorization framework — it grants access to resources but doesn't specify who the user is. OpenID Connect (OIDC) adds an authentication layer on top of OAuth 2.0, introducing the ID Token (a JWT) that contains user identity claims. OIDC answers 'who is this user?'; OAuth answers 'what can this app access?'"
      incorrect:
        - "They are distinct — OAuth 2.0 is authorization; OIDC adds authentication identity on top of OAuth 2.0."
        - "OIDC adds authentication/ID tokens on top of OAuth 2.0 which handles authorization — this correctly distinguishes them."
