flashcards:
  - id: fc-d8-001
    domain: domain8
    term: "Software Development Life Cycle (SDLC)"
    definition: "A structured process for planning, creating, testing, deploying, and maintaining software applications"
    explanation: "Common models: Waterfall (sequential), Agile (iterative), Spiral (risk-driven). Security must be integrated at every phase — security requirements in planning, threat modeling in design, code review in development, pen testing before release."
    tags: ["SDLC", "development"]

  - id: fc-d8-002
    domain: domain8
    term: "DevSecOps"
    definition: "A culture and practice that integrates security into the DevOps pipeline, making security a shared responsibility throughout the development lifecycle"
    explanation: "'Shift left' — move security testing earlier in the pipeline (from testing to development). Automate security checks: SAST in CI, dependency scanning, secrets detection, container scanning, DAST against staging. Security becomes continuous, not a gate."
    tags: ["DevSecOps", "SDLC"]

  - id: fc-d8-003
    domain: domain8
    term: "Buffer Overflow"
    definition: "A vulnerability where a program writes more data to a buffer than it can hold, overwriting adjacent memory and potentially enabling code execution"
    explanation: "Stack overflow: overwrites return address, enabling attacker control of execution flow. Heap overflow: corrupts heap structures. Mitigations: stack canaries, ASLR (Address Space Layout Randomization), DEP/NX (Data Execution Prevention), safe string functions."
    tags: ["vulnerabilities", "secure-coding"]

  - id: fc-d8-004
    domain: domain8
    term: "SQL Injection"
    definition: "An attack where malicious SQL code is inserted into an input field to manipulate the database query"
    explanation: "Example: input 'admin'--  comments out password check. Impact: unauthorized data access, modification, or deletion. Mitigations: parameterized queries/prepared statements (most effective), input validation, WAF, least privilege database accounts."
    tags: ["vulnerabilities", "web-security"]

  - id: fc-d8-005
    domain: domain8
    term: "Cross-Site Scripting (XSS)"
    definition: "An attack where malicious scripts are injected into web pages viewed by other users, executing in their browsers"
    explanation: "Types: Reflected XSS (script in URL/request), Stored XSS (script saved in database, most dangerous), DOM-based XSS (client-side manipulation). Mitigations: output encoding, Content Security Policy (CSP), input validation, HttpOnly cookies."
    tags: ["vulnerabilities", "web-security"]

  - id: fc-d8-006
    domain: domain8
    term: "Cross-Site Request Forgery (CSRF)"
    definition: "An attack that tricks a user's browser into making unintended requests to a site where they are authenticated"
    explanation: "Exploits the trust a site has in the user's browser. Example: clicking a malicious link transfers money from your bank. Mitigations: CSRF tokens (synchronizer token pattern), SameSite cookie attribute, Origin/Referer header checking."
    tags: ["vulnerabilities", "web-security"]

  - id: fc-d8-007
    domain: domain8
    term: "OWASP Top 10"
    definition: "A regularly updated list of the 10 most critical web application security risks published by the Open Web Application Security Project"
    explanation: "2021 OWASP Top 10: Broken Access Control, Cryptographic Failures, Injection, Insecure Design, Security Misconfiguration, Vulnerable Components, Auth Failures, Software Integrity Failures, Logging/Monitoring Failures, SSRF. Essential reference for secure coding."
    tags: ["OWASP", "web-security"]

  - id: fc-d8-008
    domain: domain8
    term: "Input Validation"
    definition: "The practice of verifying that all data received from external sources conforms to expected format, type, length, and range before processing"
    explanation: "Validate on the server side (client-side validation is easily bypassed). Approaches: allowlist (only accept known good) is preferred over denylist (block known bad). Validate all inputs: user forms, API parameters, file uploads, headers."
    tags: ["secure-coding", "vulnerabilities"]

  - id: fc-d8-009
    domain: domain8
    term: "Secure Coding Standards"
    definition: "A set of guidelines and best practices for writing code that is resistant to security vulnerabilities"
    explanation: "Major standards: OWASP Secure Coding Practices, CERT Secure Coding Standards, MISRA (safety-critical systems). Key practices: never trust user input, fail securely, use security libraries, minimize attack surface, keep it simple."
    tags: ["secure-coding", "standards"]

  - id: fc-d8-010
    domain: domain8
    term: "Code Review (Security)"
    definition: "The systematic examination of source code by peers or security specialists to identify security vulnerabilities, logic errors, and policy violations"
    explanation: "Types: Manual review (thorough but slow), automated SAST tools (fast but false positives), combination. Effective for finding logic flaws, auth errors, and hardcoded credentials that automated tools miss. Part of defense-in-depth."
    tags: ["code-review", "SDLC"]

  - id: fc-d8-011
    domain: domain8
    term: "Software Supply Chain Security"
    definition: "The practice of verifying the integrity and security of all third-party code, libraries, and tools used in software development"
    explanation: "Risks: malicious packages (typosquatting), compromised packages (SolarWinds, Log4Shell), outdated dependencies. Controls: SBOM (Software Bill of Materials), dependency scanning (Snyk, Dependabot), signed artifacts, private registries."
    tags: ["supply-chain", "SDLC"]

  - id: fc-d8-012
    domain: domain8
    term: "Principle of Fail Secure"
    definition: "The design principle that when a system fails, it should default to a secure state rather than an open/insecure state"
    explanation: "Example: if authentication fails due to a system error, deny access (not grant it). If a firewall fails, block all traffic (fail closed). Contrast with fail open (defaulting to accessible state) which prioritizes availability over security."
    tags: ["principles", "secure-design"]

  - id: fc-d8-013
    domain: domain8
    term: "Race Condition (TOCTOU)"
    definition: "A vulnerability where a system's behavior depends on the timing of events, allowing an attacker to manipulate the state between a check and its use"
    explanation: "Time of Check to Time of Use (TOCTOU): attacker changes a resource after it's checked but before it's used. Example: checking file permissions, then attacker replaces file before it's opened. Mitigations: atomic operations, locks, minimize time between check and use."
    tags: ["vulnerabilities", "secure-coding"]

  - id: fc-d8-014
    domain: domain8
    term: "API Security"
    definition: "The practice of protecting Application Programming Interfaces from attacks by implementing authentication, authorization, rate limiting, and input validation"
    explanation: "OWASP API Top 10 risks: Broken Object Level Authorization (BOLA), Broken Authentication, Excessive Data Exposure, Lack of Rate Limiting, etc. Use API keys or OAuth, validate all inputs, implement rate limiting, log all API calls."
    tags: ["API", "web-security"]

  - id: fc-d8-015
    domain: domain8
    term: "Cryptographic Failures (Sensitive Data Exposure)"
    definition: "Vulnerabilities resulting from inadequate cryptographic protection of sensitive data — using weak algorithms, poor key management, or no encryption"
    explanation: "Common failures: using MD5/SHA1 for password hashing (use bcrypt/Argon2), HTTP instead of HTTPS, weak TLS configurations, hardcoded keys, ECB mode encryption. #2 in OWASP Top 10. Encrypt data at rest and in transit using strong, current algorithms."
    tags: ["cryptography", "vulnerabilities"]

  - id: fc-d8-016
    domain: domain8
    term: "XML External Entity (XXE) Injection"
    definition: "An attack against XML parsers where malicious XML input references external entities, potentially exposing internal files, performing SSRF, or causing denial of service"
    explanation: "Exploits XML processors that evaluate external entity declarations. Payloads can: read /etc/passwd (file disclosure), probe internal network services (SSRF), cause DoS (billion laughs attack via entity expansion). Mitigation: disable external entity processing in XML parsers, use JSON where possible, input validation, WAF. OWASP Top 10 includes XXE as a specific risk."
    tags: ["vulnerabilities", "web-security"]

  - id: fc-d8-017
    domain: domain8
    term: "Server-Side Request Forgery (SSRF)"
    definition: "An attack that tricks the server into making HTTP requests to internal resources or external services on behalf of the attacker, bypassing network controls"
    explanation: "Attacker controls the URL the server fetches. Can access: cloud metadata APIs (AWS IMDSv1 at 169.254.169.254), internal services not exposed externally, localhost services. Impact: credential theft (cloud IAM tokens), internal network mapping, RCE. Mitigation: allowlist permitted destinations, block cloud metadata endpoints, validate/sanitize URLs, use IMDSv2 (requires session tokens)."
    tags: ["vulnerabilities", "web-security"]

  - id: fc-d8-018
    domain: domain8
    term: "Insecure Deserialization"
    definition: "A vulnerability where untrusted data is deserialized (converted from a serialized format back to an object) without validation, potentially allowing remote code execution"
    explanation: "Serialization converts objects to bytes/strings for storage/transmission. Deserialization reconstructs them. If the serialized data is attacker-controlled, they can craft malicious objects that execute code during deserialization. Affects: Java (ObjectInputStream), PHP (unserialize()), Python (pickle), .NET. OWASP Top 10 category. Mitigation: never deserialize untrusted data, use safe formats (JSON), integrity checks on serialized data."
    tags: ["vulnerabilities", "secure-coding"]

  - id: fc-d8-019
    domain: domain8
    term: "Path Traversal (Directory Traversal)"
    definition: "An attack where an attacker uses sequences like '../' in file path inputs to escape the intended directory and access restricted files on the server"
    explanation: "Example: requesting /download?file=../../../../etc/passwd to read the password file. URL encoding (%2e%2e%2f) and double encoding (%252e%252e%252f) can bypass naive filters. Mitigation: canonicalize paths before validation, use allowlists of permitted files, avoid passing user input to file system operations, jail application to a directory (chroot)."
    tags: ["vulnerabilities", "web-security"]

  - id: fc-d8-020
    domain: domain8
    term: "OS Command Injection"
    definition: "An attack where attacker-controlled input is passed to a system shell, allowing execution of arbitrary operating system commands with the application's privileges"
    explanation: "Example: if an app runs 'ping [user_input]', input '8.8.8.8; rm -rf /' executes both commands. Shells interpret metacharacters (; | & ` $ etc.) as command separators/substitution. Mitigation: never pass user input to shell functions (system(), exec()), use parameterized API calls for OS operations, input validation with allowlist."
    tags: ["vulnerabilities", "secure-coding"]

  - id: fc-d8-021
    domain: domain8
    term: "Integer Overflow / Underflow"
    definition: "A vulnerability where arithmetic operations produce results exceeding the maximum (overflow) or minimum (underflow) value for a data type, causing unexpected behavior"
    explanation: "Example: signed 8-bit integer max is 127; adding 1 wraps to -128. If used as array index or allocation size, can cause buffer overflows, logic errors, or security bypasses. Common in C/C++. Real-world example: OpenSSL Heartbleed involved a length field integer that wasn't properly validated. Mitigation: bounds checking, use safe integer libraries, avoid arithmetic on untrusted values."
    tags: ["vulnerabilities", "secure-coding"]

  - id: fc-d8-022
    domain: domain8
    term: "Dependency Confusion Attack"
    definition: "A supply chain attack where a malicious package with the same name as an internal private package is published to a public registry, causing build systems to install the malicious version"
    explanation: "Discovered by Alex Birsan in 2021. Most package managers prefer public over private registries by default. Attacker identifies internal package names (from job postings, leaked configs, error messages), publishes malicious package with higher version number to public registry. Mitigation: scope packages (npm @company/package), configure registry priority, verify package sources, use Artifact Firewall."
    tags: ["supply-chain", "attacks"]

  - id: fc-d8-023
    domain: domain8
    term: "SBOM (Software Bill of Materials)"
    definition: "A formal, machine-readable inventory of all software components, libraries, and their dependencies contained within an application"
    explanation: "Enables: vulnerability management (quickly identify if Log4j is in any product), license compliance, supply chain risk assessment. Formats: SPDX (Linux Foundation), CycloneDX (OWASP). U.S. Executive Order 14028 requires SBOM for software sold to federal government. Generated by: SCA tools during CI/CD, post-build analysis. Critical for managing open-source risk at scale."
    tags: ["supply-chain", "standards"]

  - id: fc-d8-024
    domain: domain8
    term: "Container Security"
    definition: "Security practices for building, deploying, and running containerized workloads (Docker, Kubernetes), addressing unique risks from container isolation, image supply chains, and orchestration"
    explanation: "Risks: using unpatched base images, running as root, excessive container capabilities, exposed Docker socket, secrets in environment variables/images, Kubernetes RBAC misconfigurations. Controls: scan images for vulnerabilities, use minimal base images, run as non-root, implement Pod Security Standards, secrets management (Vault), network policies for pod-to-pod segmentation."
    tags: ["DevSecOps", "cloud", "architecture"]

  - id: fc-d8-025
    domain: domain8
    term: "Infrastructure as Code (IaC) Security"
    definition: "Security practices for managing and validating infrastructure definitions (Terraform, CloudFormation, Ansible) to prevent misconfigurations from being deployed to production"
    explanation: "IaC risks: public S3 buckets, overly permissive security groups, unencrypted storage, hardcoded credentials in templates. Static analysis tools: tfsec, Checkov, cfn-nag scan IaC templates before deployment. Drift detection: compare deployed infrastructure to IaC definitions. Immutable infrastructure: replace rather than modify servers (eliminates configuration drift)."
    tags: ["DevSecOps", "cloud"]

  - id: fc-d8-026
    domain: domain8
    term: "STRIDE Threat Modeling"
    definition: "A structured threat modeling methodology that categorizes threats into six types: Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, Elevation of Privilege"
    explanation: "Spoofing: impersonating users/systems. Tampering: modifying data or code. Repudiation: denying actions without evidence. Information Disclosure: unauthorized data exposure. Denial of Service: preventing legitimate access. Elevation of Privilege: gaining unauthorized higher permissions. Each STRIDE category maps to a violated security property (Authenticity, Integrity, Non-repudiation, Confidentiality, Availability, Authorization)."
    tags: ["threat-modeling", "SDLC"]

  - id: fc-d8-027
    domain: domain8
    term: "Security by Design"
    definition: "The principle and practice of embedding security into the architecture, design, and requirements of a system from its inception rather than retrofitting it after development"
    explanation: "Practices: threat modeling during design, security requirements definition, architecture risk analysis, secure design patterns (fail-safe defaults, complete mediation, economy of mechanism, separation of privilege). Contrast with 'bolt-on security' — retrofitting security is exponentially more expensive and less effective. Mandated by GDPR Article 25 (Privacy by Design)."
    tags: ["secure-design", "principles", "SDLC"]

  - id: fc-d8-028
    domain: domain8
    term: "Memory-Safe Programming"
    definition: "Programming languages and practices that prevent memory corruption vulnerabilities (buffer overflows, use-after-free, null pointer dereference) through automatic memory management or compile-time guarantees"
    explanation: "Memory-unsafe languages (C, C++) rely on developers to manually manage memory — leading to decades of exploitable vulnerabilities. Memory-safe languages: Rust (ownership model enforced at compile time), Go, Java, Python (garbage collection). U.S. government (CISA, NSA) recommends transitioning to memory-safe languages for new development. Critical for eliminating entire vulnerability classes."
    tags: ["secure-coding", "languages"]

  - id: fc-d8-029
    domain: domain8
    term: "Software Composition Analysis (SCA)"
    definition: "Automated security testing that identifies known vulnerabilities, license risks, and version information in open-source and third-party components used in an application"
    explanation: "Scans dependency manifests (package.json, requirements.txt, pom.xml) and matches against vulnerability databases (NVD, GitHub Advisory, Snyk). Generates SBOM. Tools: Snyk, OWASP Dependency-Check, GitHub Dependabot, Black Duck. Critical given that modern applications are 70-90% open-source code. Distinct from SAST (analyzes custom code) — SCA analyzes dependencies."
    tags: ["supply-chain", "SDLC", "tools"]

  - id: fc-d8-030
    domain: domain8
    term: "Secure Software Requirements"
    definition: "Security-specific requirements defined during the requirements phase of the SDLC that specify what security properties, behaviors, and constraints the software must satisfy"
    explanation: "Types: Functional security requirements (system must authenticate users with MFA, data must be encrypted with AES-256), Non-functional security requirements (system must withstand 100 concurrent authentication attempts, response time for auth ≤ 2s). Sources: regulations (HIPAA, PCI DSS), organizational policy, threat model outputs, ASVS (OWASP Application Security Verification Standard). Requirements without security requirements produce insecure systems by default."
    tags: ["SDLC", "requirements"]
